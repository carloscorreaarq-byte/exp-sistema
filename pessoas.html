<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXP · Pessoas</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="exp-design-system.css">
<script>
  (function(){
    var saved = localStorage.getItem('exp-theme');
    var sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if(saved === 'dark' || (!saved && sys))
      document.documentElement.setAttribute('data-theme','dark');
  })();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --tc-bg:   #FBF0EE;
  --az-bg:   #EAF0FB;
  --am-bg:   #FBF3E8;
  --roxo:    #6B4FA0;
  --roxo-bg: #F3EFFE;
  --cinza2:  #ECEAE4;
  --verde-bg:#EAF5EE;
}
body{font-family:var(--font-ui);background:var(--off);color:var(--grafite);min-height:100vh}

#loading{position:fixed;inset:0;background:var(--off);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loading-logo{height:30px;display:block;mix-blend-mode:multiply}
[data-theme="dark"] .loading-logo{filter:invert(1) brightness(.85);mix-blend-mode:screen}
.loading-bar{width:120px;height:2px;background:var(--cinza);border-radius:2px;overflow:hidden;position:relative;margin-top:4px}
.loading-bar::after{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:var(--grafite);border-radius:2px;animation:ldbar 1.4s ease-in-out infinite}
@keyframes ldbar{0%{transform:translateX(-150%)}100%{transform:translateX(350%)}}

#conteudo{display:none;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── LAYOUT ─── */
.ps-wrap{max-width:1120px;margin:0 auto;padding:22px 24px;position:relative;z-index:1}
.ps-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.ps-header-left{flex:1}
.ps-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.ps-sub{font-size:11px;color:#999;margin-top:2px}
.ps-layout{display:grid;grid-template-columns:256px 1fr;gap:14px;align-items:start}

/* ── SIDEBAR ─── */
.ps-sidebar{background:var(--branco);border:1px solid var(--cinza2);border-radius:10px;overflow:hidden;position:sticky;top:14px}
.ps-search-wrap{padding:10px 10px 8px;border-bottom:1px solid var(--cinza2)}
.ps-search{width:100%;padding:7px 10px;border:1px solid var(--cinza2);border-radius:6px;font-family:var(--font-ui);font-size:11px;color:var(--grafite);background:var(--off);outline:none;transition:border-color .12s}
.ps-search:focus{border-color:var(--grafite)}
.ps-search::placeholder{color:#bbb}
.ps-filtros{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid var(--cinza2);flex-wrap:wrap}
.ps-filtro{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 9px;border-radius:99px;border:1px solid var(--cinza2);background:none;cursor:pointer;color:#999;font-family:var(--font-ui);transition:all .12s}
.ps-filtro.ativo{background:var(--grafite);color:#fff;border-color:var(--grafite)}
.ps-filtro:hover:not(.ativo){border-color:#bbb;color:#555}
.ps-lista{overflow-y:auto;max-height:calc(100vh - 230px)}
.ps-lista-empty{padding:24px;text-align:center;font-size:11px;color:#bbb}

/* ── ITEM DA LISTA ─── */
.ps-item{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--cinza2);transition:background .1s;border-left:3px solid transparent}
.ps-item:last-child{border-bottom:none}
.ps-item:hover{background:var(--off)}
.ps-item.sel{background:var(--tc-bg);border-left-color:var(--terracota)}
.ps-item.inativo{opacity:.5}
.ps-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.ps-av img{width:100%;height:100%;object-fit:cover;display:block}
.ps-item-info{min-width:0;flex:1}
.ps-item-nome{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps-item-cargo{font-size:10px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps-item-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}

/* ── BADGES ─── */
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:99px;font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.badge.ativo{background:var(--verde-bg);color:var(--verde)}
.badge.inativo{background:var(--cinza2);color:#888}
.badge.socio{background:var(--roxo-bg);color:var(--roxo)}
.badge.colaborador{background:var(--az-bg);color:var(--azul)}
.badge.coordenador{background:var(--am-bg);color:var(--ouro)}
.badge.estagio{background:var(--cinza2);color:#777}
.badge.pj{background:var(--am-bg);color:var(--ouro)}

/* ── PAINEL DETALHE ─── */
.ps-detalhe{background:var(--branco);border:1px solid var(--cinza2);border-radius:10px;overflow:hidden}
.ps-det-header{padding:18px 20px 14px;border-bottom:1px solid var(--cinza2);display:flex;align-items:flex-start;gap:14px}
.ps-det-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.ps-det-av img{width:100%;height:100%;object-fit:cover;display:block}
.ps-det-info{flex:1;min-width:0}
.ps-det-nome{font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:3px}
.ps-det-cargo{font-size:12px;color:#777;margin-bottom:6px}
.ps-det-badges{display:flex;gap:5px;flex-wrap:wrap}

/* ── TABS ─── */
.ps-tabs{display:flex;border-bottom:1px solid var(--cinza2);padding:0 20px;overflow-x:auto}
.ps-tab{padding:10px 14px;font-size:10px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .12s;margin-bottom:-1px}
.ps-tab:hover{color:var(--grafite)}
.ps-tab.ativo{color:var(--terracota);border-bottom-color:var(--terracota)}

/* ── TAB BODY ─── */
.ps-tab-body{padding:18px 20px;overflow-y:auto;max-height:calc(100vh - 300px)}
.ps-tab-panel{display:none}
.ps-tab-panel.ativo{display:block}

/* ── SEÇÃO INTERNA ─── */
.ps-sec{margin-bottom:20px}
.ps-sec:last-child{margin-bottom:0}
.ps-sec-title{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#bbb;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ps-sec-title::after{content:'';flex:1;height:1px;background:var(--cinza2)}
.ps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.ps-grid.cols2{grid-template-columns:1fr 1fr}
.ps-grid.cols3{grid-template-columns:repeat(3,1fr)}

/* ── CAMPO ─── */
.ps-field{display:flex;flex-direction:column;gap:3px}
.ps-field label{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#bbb}
.ps-field-val{font-size:11px;color:var(--grafite);font-weight:500}
.ps-field-val.muted{color:#aaa;font-weight:400;font-style:italic}

/* ── MÉTRICA ─── */
.ps-metric{background:var(--off);border:1px solid var(--cinza2);border-radius:8px;padding:12px 14px}
.ps-metric-label{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#bbb;margin-bottom:4px}
.ps-metric-val{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1}
.ps-metric-sub{font-size:10px;color:#aaa;margin-top:3px}
.ps-metric-val.pos{color:var(--verde)}
.ps-metric-val.neg{color:var(--terracota)}
.ps-metric-val.neu{color:var(--ouro)}

/* ── BARRA ─── */
.ps-barra-wrap{margin-bottom:10px}
.ps-barra-label{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-bottom:4px}
.ps-barra-label strong{color:var(--grafite)}
.ps-barra-bg{height:6px;background:var(--cinza2);border-radius:99px;overflow:hidden}
.ps-barra-fill{height:100%;border-radius:99px}
.ps-barra-fill.azul{background:var(--azul)}
.ps-barra-fill.ouro{background:var(--ouro)}

/* ── HISTÓRICO ─── */
.ps-hist-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--cinza2)}
.ps-hist-row:last-child{border-bottom:none}
.ps-hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ps-hist-dot.verde{background:var(--verde)}
.ps-hist-dot.azul{background:var(--azul)}
.ps-hist-dot.ouro{background:var(--ouro)}
.ps-hist-dot.tc{background:var(--terracota)}
.ps-hist-dot.cinza{background:var(--cinza)}
.ps-hist-corpo{flex:1}
.ps-hist-title{font-size:11px;font-weight:600;margin-bottom:2px}
.ps-hist-desc{font-size:10px;color:#888;line-height:1.5}
.ps-hist-data{font-size:9px;color:#bbb;margin-top:3px;font-family:var(--font-mono)}

/* ── CARD REGISTRO ─── */
.ps-reg-card{border:1px solid var(--cinza2);border-radius:8px;padding:12px 14px;margin-bottom:8px;background:var(--off)}
.ps-reg-card:last-child{margin-bottom:0}
.ps-reg-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.ps-reg-tipo{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:99px}
.ps-reg-tipo.advertencia{background:var(--tc-bg);color:var(--terracota)}
.ps-reg-tipo.conflito{background:#fff3f3;color:#c0392b}
.ps-reg-tipo.desempenho{background:var(--am-bg);color:var(--ouro)}
.ps-reg-tipo.positivo{background:var(--verde-bg);color:var(--verde)}
.ps-reg-tipo.corretivo{background:var(--am-bg);color:var(--ouro)}
.ps-reg-tipo.desenvolvimento{background:var(--az-bg);color:var(--azul)}
.ps-reg-status{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 7px;border-radius:99px}
.ps-reg-status.aberta{background:var(--tc-bg);color:var(--terracota)}
.ps-reg-status.resolvida{background:var(--verde-bg);color:var(--verde)}
.ps-reg-status.encerrada{background:var(--cinza2);color:#888}
.ps-reg-data{font-size:9px;color:#bbb;font-family:var(--font-mono);margin-left:auto}
.ps-reg-text{font-size:11px;color:#555;line-height:1.55}
.ps-reg-autor{font-size:9px;color:#bbb;margin-top:5px}
.ps-reg-actions{display:flex;gap:6px;margin-top:8px}

/* ── BOTÃO ADICIONAR ─── */
.ps-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:1px dashed var(--cinza2);border-radius:8px;background:none;cursor:pointer;font-family:var(--font-ui);font-size:10px;color:#bbb;transition:all .12s;margin-bottom:12px}
.ps-add-btn:hover{border-color:var(--terracota);color:var(--terracota);background:var(--tc-bg)}

/* ── BOTÃO AÇÃO INLINE ─── */
.ps-btn-sm{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;font-family:var(--font-ui);font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;border:1px solid var(--cinza2);background:none;cursor:pointer;border-radius:5px;color:#888;transition:all .12s}
.ps-btn-sm:hover{border-color:var(--terracota);color:var(--terracota)}
.ps-btn-sm.danger:hover{border-color:var(--terracota);background:var(--tc-bg);color:var(--terracota)}

/* ── AVISO FINANCEIRO ─── */
.ps-fin-aviso{background:var(--az-bg);border:1px solid rgba(74,114,181,.25);border-radius:8px;padding:14px 16px;font-size:11px;line-height:1.6;color:#555;margin-bottom:14px}
.ps-fin-aviso strong{color:var(--azul);display:block;margin-bottom:4px;font-size:10px}
.ps-fin-link{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:10px;font-weight:700;color:var(--azul);text-decoration:none;transition:opacity .12s}
.ps-fin-link:hover{opacity:.75}

/* ── VAZIO / LOADING / ERRO ─── */
.ps-empty{text-align:center;padding:36px 20px;color:#bbb}
.ps-empty-icon{font-size:26px;margin-bottom:8px;opacity:.4}
.ps-empty-text{font-size:11px}
.ps-loading-tab{padding:32px;text-align:center;font-size:11px;color:#bbb}
.ps-sem-tabela{background:var(--am-bg);border:1px solid rgba(196,154,39,.3);border-radius:8px;padding:12px 14px;font-size:10px;color:#8a6010;line-height:1.6;margin-bottom:12px}
.ps-sem-tabela code{font-family:var(--font-mono);font-size:9px;background:rgba(196,154,39,.1);padding:1px 5px;border-radius:3px}

/* ── MODAL REGISTRO ─── */
.ps-modal-overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:500;align-items:center;justify-content:center;padding:20px}
.ps-modal-overlay.open{display:flex}
.ps-modal{background:var(--branco);border-radius:10px;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-modal);border:1px solid var(--cinza2)}
.ps-modal-hdr{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--cinza2);gap:10px}
.ps-modal-title{font-size:13px;font-weight:700;flex:1}
.ps-modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#bbb;padding:0 4px;line-height:1;font-family:var(--font-ui)}
.ps-modal-close:hover{color:var(--grafite)}
.ps-modal-body{padding:16px 18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px}
.ps-modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;border-top:1px solid var(--cinza2)}
.ps-field-modal{display:flex;flex-direction:column;gap:5px}
.ps-field-modal label{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#888}
.ps-field-modal select,.ps-field-modal textarea,.ps-field-modal input{padding:8px 10px;border:1px solid var(--cinza2);border-radius:6px;font-family:var(--font-ui);font-size:11px;color:var(--grafite);background:var(--branco);outline:none;transition:border-color .12s;resize:vertical}
.ps-field-modal select:focus,.ps-field-modal textarea:focus,.ps-field-modal input:focus{border-color:var(--grafite)}

/* ── DARK MODE ─── */
[data-theme="dark"] .ps-sidebar,[data-theme="dark"] .ps-detalhe{background:var(--branco);border-color:var(--cinza)}
[data-theme="dark"] .ps-item:hover{background:var(--off)}
[data-theme="dark"] .ps-item.sel{background:rgba(184,86,56,.08)}
[data-theme="dark"] .ps-metric,.ps-reg-card{background:var(--off);border-color:var(--cinza)}
[data-theme="dark"] .ps-reg-card{background:var(--off);border-color:var(--cinza)}
[data-theme="dark"] .ps-search{background:var(--off);border-color:var(--cinza)}
[data-theme="dark"] .ps-modal{background:var(--branco);border-color:var(--cinza)}
[data-theme="dark"] .ps-field-modal select,[data-theme="dark"] .ps-field-modal textarea,[data-theme="dark"] .ps-field-modal input{background:var(--off);border-color:var(--cinza);color:var(--grafite)}
</style>
</head>
<body>

<div id="loading">
  <img class="loading-logo" src="exp.png" alt="EXP">
  <div class="loading-bar"></div>
</div>

<div id="conteudo">

<nav class="nav">
  <a href="app.html" class="nav-brand"><img src="exp.png" alt="EXP" class="nav-brand-logo"></a>
  <div class="nav-sep"></div>
  <div class="nav-dropdown">
    <span class="nav-mod">Pessoas</span>
    <div class="nav-dropdown-menu">
      <a href="gestao.html">EXP.projetos</a>
      <a href="apoio.html">EXP.apoio</a>
      <a href="contatos.html">EXP.contatos</a>
      <div class="nd-sep nd-soc" id="nd-sep-soc" style="display:none"></div>
      <a href="calc.html" class="nd-soc" id="nd-calc" style="display:none">EXP.calculadora</a>
      <a href="crm.html" class="nd-soc" id="nd-crm" style="display:none">EXP.comercial</a>
      <a href="financeiro.html" class="nd-soc" id="nd-fin" style="display:none">EXP.financeiro</a>
      <a href="analise.html" class="nd-soc" id="nd-analise" style="display:none">EXP.análise</a>
      <a href="pessoas.html" class="nd-soc nav-current" id="nd-pessoas" style="display:none">EXP.pessoas</a>
    </div>
  </div>
  <div class="nav-right">
    <div class="conn-dot" id="conn-dot" title="Verificando conexão..."></div>
    <div class="user-pill-wrap">
      <div class="user-chip" id="user-chip">
        <div class="user-av" id="user-av"></div>
        <div>
          <div class="u-nome" id="user-nome">—</div>
          <div class="u-role" id="user-cargo">—</div>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="ps-wrap">

  <div class="ps-header">
    <div class="ps-header-left">
      <div class="ps-title">Pessoas</div>
      <div class="ps-sub" id="ps-sub">Carregando colaboradores…</div>
    </div>
  </div>

  <div class="ps-layout">

    <!-- SIDEBAR -->
    <div class="ps-sidebar">
      <div class="ps-search-wrap">
        <input class="ps-search" type="text" id="ps-busca" placeholder="Buscar…" oninput="filtrarLista()">
      </div>
      <div class="ps-filtros">
        <button class="ps-filtro ativo" onclick="setFiltro(this,'todos')">Todos</button>
        <button class="ps-filtro" onclick="setFiltro(this,'ativo')">Ativos</button>
        <button class="ps-filtro" onclick="setFiltro(this,'inativo')">Inativos</button>
      </div>
      <div class="ps-lista" id="ps-lista">
        <div class="ps-lista-empty">Carregando…</div>
      </div>
    </div>

    <!-- PAINEL DETALHE -->
    <div class="ps-detalhe" id="ps-detalhe">
      <div class="ps-empty" style="padding:60px 20px">
        <div class="ps-empty-icon">👥</div>
        <div class="ps-empty-text">Selecione um colaborador para ver os detalhes.</div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL OCORRÊNCIA -->
<div class="ps-modal-overlay" id="modal-ocorr" onclick="fecharModal('modal-ocorr',event)">
  <div class="ps-modal" onclick="event.stopPropagation()">
    <div class="ps-modal-hdr">
      <div class="ps-modal-title">Registrar ocorrência</div>
      <button class="ps-modal-close" onclick="fecharModal('modal-ocorr')">&times;</button>
    </div>
    <div class="ps-modal-body">
      <div class="ps-field-modal">
        <label>Tipo</label>
        <select id="ocorr-tipo">
          <option value="desempenho">Desempenho</option>
          <option value="advertencia">Advertência</option>
          <option value="conflito">Conflito</option>
        </select>
      </div>
      <div class="ps-field-modal">
        <label>Status</label>
        <select id="ocorr-status">
          <option value="aberta">Aberta</option>
          <option value="resolvida">Resolvida</option>
          <option value="encerrada">Encerrada</option>
        </select>
      </div>
      <div class="ps-field-modal">
        <label>Descrição</label>
        <textarea id="ocorr-desc" rows="4" placeholder="Descreva a ocorrência…"></textarea>
      </div>
    </div>
    <div class="ps-modal-footer">
      <button class="ps-btn-sm" onclick="fecharModal('modal-ocorr')">Cancelar</button>
      <button class="ps-btn-sm" style="background:var(--terracota);color:#fff;border-color:var(--terracota)" onclick="salvarOcorrencia()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL FEEDBACK -->
<div class="ps-modal-overlay" id="modal-fb" onclick="fecharModal('modal-fb',event)">
  <div class="ps-modal" onclick="event.stopPropagation()">
    <div class="ps-modal-hdr">
      <div class="ps-modal-title">Registrar feedback</div>
      <button class="ps-modal-close" onclick="fecharModal('modal-fb')">&times;</button>
    </div>
    <div class="ps-modal-body">
      <div class="ps-field-modal">
        <label>Tipo</label>
        <select id="fb-tipo">
          <option value="positivo">Positivo</option>
          <option value="corretivo">Corretivo</option>
          <option value="desenvolvimento">Desenvolvimento</option>
        </select>
      </div>
      <div class="ps-field-modal">
        <label>Texto</label>
        <textarea id="fb-texto" rows="5" placeholder="Escreva o feedback…"></textarea>
      </div>
    </div>
    <div class="ps-modal-footer">
      <button class="ps-btn-sm" onclick="fecharModal('modal-fb')">Cancelar</button>
      <button class="ps-btn-sm" style="background:var(--terracota);color:#fff;border-color:var(--terracota)" onclick="salvarFeedback()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL EVOLUÇÃO -->

/* ── SUPABASE ─────────────────────────────────────────────── */

/* ── ESTADO ───────────────────────────────────────────────── */
const G = {

const ROLES_LABEL = {

  coordenador: 'Coordenador', colaborador: 'Colaborador',
  admin: 'Administrador', estagiario: 'Estagiário', estagio: 'Estagiário',
};
const isSocio = r => ['socio','socio_adm','socio_admin'].includes((r||'').toLowerCase());
const roleLabel = r => ROLES_LABEL[r] || r || 'Usuário';
const badgeClass = r => {

};

/* ── UTILIDADES ───────────────────────────────────────────── */
function diffHoras(ini, fim) {
  if (!ini || !fim) return 0;
  const [hi, mi] = ini.split(':').map(Number);
  const [hf, mf] = fim.split(':').map(Number);
  return Math.max(0, (hf * 60 + mf - hi * 60 - mi) / 60);
}
function fmtH(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return `${hh}h${mm > 0 ? String(mm).padStart(2,'0') : ''}`;
}
function fmtData(iso) {
  if (!iso) return '—';
  const d = iso.slice(0,10).split('-');
  return `${d[2]}/${d[1]}/${d[0]}`;
}
function fmtDataCurta(iso) {
  if (!iso) return '—';
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const d = new Date(iso + 'T12:00:00');
  return `${meses[d.getMonth()]}/${d.getFullYear()}`;
}
function avatarEl(u, size = 34) {
  const el = document.createElement('div');
  el.className = 'ps-av';
  el.style.cssText = `width:${size}px;height:${size}px;font-size:${Math.round(size*.35)}px;background:${u.cor||'#888'}`;
  if (u.avatar_url) {
    const img = document.createElement('img');
    img.src = u.avatar_url;
    img.alt = u.nome;
    el.appendChild(img);
  } else {
    el.textContent = u.iniciais || '?';
  }
  return el;
}

/* ── AUTH + INIT ──────────────────────────────────────────── */
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  G.sessao = session;

  const { data: usr } = await sb.from('usuarios')
    .select('id,nome,iniciais,cor,role,avatar_url,email_login,email,is_platform_manager,ativo')
    .eq('auth_id', session.user.id).single();
  if (!usr) { window.location.href = 'index.html'; return; }
  G.usuarioLogado = usr;

  if (!isSocio(usr.role) && !usr.is_platform_manager) {
    window.location.href = 'app.html';
    return;
  }

  renderNavUser(usr);
  exibirModulosSocio();
  await carregarUsuarios();

  document.getElementById('conteudo').style.display = 'block';
}

function renderNavUser(u) {

    av.appendChild(img);

}

async function verificarConexao() {
  const dot = document.getElementById('conn-dot');

}

/* ── CARREGAR USUÁRIOS ────────────────────────────────────── */
async function carregarUsuarios() {
  const { data, error } = await sb.from('usuarios')
    .select('id,nome,iniciais,cor,role,avatar_url,email_login,email,ativo,status_acesso')
    .order('ativo', { ascending: false })
    .order('nome');

  if (error || !data) {
    document.getElementById('ps-lista').innerHTML = '<div class="ps-lista-empty">Erro ao carregar usuários.</div>';
    return;
  }

  G.usuarios = data;
  const total = data.length;
  const ativos = data.filter(u => u.ativo !== false).length;
  document.getElementById('ps-sub').textContent =
    `${total} colaborador${total !== 1 ? 'es' : ''} · ${ativos} ativo${ativos !== 1 ? 's' : ''}`;

  renderLista();
}

/* ── LISTA ────────────────────────────────────────────────── */
function renderLista() {
  const busca = (document.getElementById('ps-busca').value || '').toLowerCase().trim();
  const lista = document.getElementById('ps-lista');
  const visíveis = G.usuarios.filter(u => {
    const matchQ = !busca || (u.nome||'').toLowerCase().includes(busca) || (u.role||'').toLowerCase().includes(busca);
    const ativo = u.ativo !== false;
    const matchF = G.filtro === 'todos' || (G.filtro === 'ativo' && ativo) || (G.filtro === 'inativo' && !ativo);
    return matchQ && matchF;
  });

  if (!visíveis.length) {
    lista.innerHTML = '<div class="ps-lista-empty">Nenhum colaborador encontrado.</div>';
    return;
  }

  lista.innerHTML = '';
  visíveis.forEach(u => {
    const ativo = u.ativo !== false;
    const item = document.createElement('div');
    item.className = 'ps-item' + (ativo ? '' : ' inativo') + (G.selecionado?.id === u.id ? ' sel' : '');
    item.dataset.id = u.id;
    item.onclick = () => selecionarColab(u);

    const av = avatarEl(u, 34);
    const info = document.createElement('div');
    info.className = 'ps-item-info';
    info.innerHTML = `
      <div class="ps-item-nome">${u.nome || '—'}</div>
      <div class="ps-item-cargo">${roleLabel(u.role)}</div>
      <div class="ps-item-badges">
        <span class="badge ${ativo ? 'ativo' : 'inativo'}">${ativo ? 'Ativo' : 'Inativo'}</span>
        <span class="badge ${badgeClass(u.role)}">${roleLabel(u.role)}</span>
      </div>`;

    item.appendChild(av);
    item.appendChild(info);
    lista.appendChild(item);
  });
}

function setFiltro(el, f) {
  document.querySelectorAll('.ps-filtro').forEach(b => b.classList.remove('ativo'));
  el.classList.add('ativo');
  G.filtro = f;
  renderLista();
}
function filtrarLista() { renderLista(); }

const TABS = ['dados','jornada','financeiro','evolucao','ocorrencias','feedbacks'];
function mudarTab(tab) {

  TABS.forEach((t, i) => {

  G._tabAtiva = tab;
  renderTabContent(tab);

  if (!u) return;
  const body = document.getElementById('ps-tab-body');

  body.innerHTML = '<div class="ps-loading-tab">Carregando…</div>';

/* ── TAB: JORNADA ─────────────────────────────────────────── */
async function renderJornada(u, body) {
  const hoje = new Date();
  const iniMes = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-01`;
  const fimMes = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;

  const { data: horas, error } = await sb.from('horas_lancadas')
    .select('hora_inicio,hora_fim,tipo,data_lancamento')
    .eq('usuario_id', u.id)
    .gte('data_lancamento', iniMes)
    .lte('data_lancamento', fimMes);

  if (error) {
    body.innerHTML = `<div class="ps-sem-tabela">Erro ao carregar horas: ${error.message}</div>`;
    return;
  }

  const totalH = (horas||[]).reduce((s,l) => s + diffHoras(l.hora_inicio, l.hora_fim), 0);
  const porTipo = {};
  (horas||[]).forEach(l => {
    const t = l.tipo || 'outros';
    porTipo[t] = (porTipo[t]||0) + diffHoras(l.hora_inicio, l.hora_fim);
  });

  const tipoLabel = { projeto:'Projeto', reuniao:'Reunião', interno:'Interno', outros:'Outros' };
  const tiposHtml = Object.entries(porTipo).sort((a,b) => b[1]-a[1]).map(([t,h]) => {
    const pct = totalH > 0 ? Math.round(h/totalH*100) : 0;
    return `<div class="ps-barra-wrap">
      <div class="ps-barra-label"><span>${tipoLabel[t]||t}</span><strong>${fmtH(h)} (${pct}%)</strong></div>
      <div class="ps-barra-bg"><div class="ps-barra-fill azul" style="width:${pct}%"></div></div>
    </div>`;
  }).join('') || '<div class="ps-empty-text" style="color:#bbb;font-size:11px">Nenhum lançamento neste mês.</div>';

  const mesNome = hoje.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});

  body.innerHTML = `
    <div class="ps-sec">
      <div class="ps-sec-title">Resumo — ${mesNome}</div>
      <div class="ps-grid cols2">
        <div class="ps-metric"><div class="ps-metric-label">Total lançado</div><div class="ps-metric-val">${fmtH(totalH)}</div><div class="ps-metric-sub">até hoje</div></div>
        <div class="ps-metric"><div class="ps-metric-label">Lançamentos</div><div class="ps-metric-val">${(horas||[]).length}</div><div class="ps-metric-sub">registros</div></div>
      </div>
    </div>
    <div class="ps-sec">
      <div class="ps-sec-title">Distribuição por tipo</div>
      ${tiposHtml}
    </div>
    <div class="ps-sec" style="color:#aaa;font-size:10px;line-height:1.6">
      Os dados de jornada contratada, horas extras e controle de férias serão exibidos aqui conforme cadastro no módulo financeiro e no EXP.gestão.
    </div>`;
}

    .select('*').eq('usuario_id', u.id).order('criado_em', { ascending: false });

  let avisoSql = '';
  if (error?.code === '42P01') {
    avisoSql = `<div class="ps-sem-tabela">A tabela <code>pessoas_feedbacks</code> ainda não existe. Execute o script de migração para ativar este recurso.</div>`;
  }

  const registros = data || [];
  const html = registros.map(r => `
    <div class="ps-reg-card">
      <div class="ps-reg-head">
        <span class="ps-reg-tipo ${r.tipo||''}">${r.tipo||'—'}</span>
        <span class="ps-reg-data">${fmtData(r.criado_em?.slice(0,10))}</span>
      </div>
      <div class="ps-reg-text">${r.texto||''}</div>
      <div class="ps-reg-actions">
        <button class="ps-btn-sm danger" onclick="excluirFeedback('${r.id}')">Excluir</button>
      </div>
    </div>`).join('');

  body.innerHTML = `
    ${avisoSql}
    <button class="ps-add-btn" onclick="abrirModal('modal-fb')">+ Registrar feedback</button>
    ${html || '<div class="ps-empty"><div class="ps-empty-icon">💬</div><div class="ps-empty-text">Nenhum feedback registrado.</div></div>'}`;
}

/* ── MODAIS ───────────────────────────────────────────────── */
function abrirModal(id) { document.getElementById(id).classList.add('open'); }
function fecharModal(id, ev) {
  if (ev && ev.target.id !== id) return;
  document.getElementById(id).classList.remove('open');
}

/* ── SALVAR OCORRÊNCIA ────────────────────────────────────── */
async function salvarOcorrencia() {
  const u = G.selecionado;
  if (!u) return;
  const tipo   = document.getElementById('ocorr-tipo').value;
  const status = document.getElementById('ocorr-status').value;
  const desc   = document.getElementById('ocorr-desc').value.trim();
  if (!desc) { alert('Descreva a ocorrência.'); return; }

  const { error } = await sb.from('pessoas_ocorrencias').insert({
    usuario_id: u.id, tipo, status, descricao: desc,
    criado_por: G.usuarioLogado.id
  });
  if (error) { alert('Erro ao salvar: ' + error.message); return; }
  document.getElementById('ocorr-desc').value = '';
  fecharModal('modal-ocorr');
  await renderTabContent('ocorrencias');
}

/* ── SALVAR FEEDBACK ──────────────────────────────────────── */
async function salvarFeedback() {
  const u = G.selecionado;
  if (!u) return;
  const tipo  = document.getElementById('fb-tipo').value;
  const texto = document.getElementById('fb-texto').value.trim();
  if (!texto) { alert('Escreva o feedback.'); return; }

  const { error } = await sb.from('pessoas_feedbacks').insert({
    usuario_id: u.id, tipo, texto,
    criado_por: G.usuarioLogado.id
  });
  if (error) { alert('Erro ao salvar: ' + error.message); return; }
  document.getElementById('fb-texto').value = '';
  fecharModal('modal-fb');
  await renderTabContent('feedbacks');
}

/* ── SALVAR EVOLUÇÃO ──────────────────────────────────────── */
async function salvarEvolucao() {
  const u = G.selecionado;
  if (!u) return;
  const titulo = document.getElementById('evol-titulo').value.trim();
  if (!titulo) { alert('Informe o título.'); return; }

  const { error } = await sb.from('pessoas_evolucao').insert({
    usuario_id: u.id,
    tipo:       document.getElementById('evol-tipo').value,
    cor:        document.getElementById('evol-cor').value,
    titulo,
    descricao:  document.getElementById('evol-desc').value.trim() || null,
    data_evento: document.getElementById('evol-data').value || null,
    criado_por: G.usuarioLogado.id
  });
  if (error) { alert('Erro ao salvar: ' + error.message); return; }
  document.getElementById('evol-titulo').value = '';
  document.getElementById('evol-desc').value = '';
  fecharModal('modal-evol');
  await renderTabContent('evolucao');
}

/* ── EXCLUIR ──────────────────────────────────────────────── */
async function excluirOcorrencia(id) {
  if (!confirm('Excluir esta ocorrência?')) return;
  await sb.from('pessoas_ocorrencias').delete().eq('id', id);
  await renderTabContent('ocorrencias');
}
async function excluirFeedback(id) {
  if (!confirm('Excluir este feedback?')) return;
  await sb.from('pessoas_feedbacks').delete().eq('id', id);
  await renderTabContent('feedbacks');
}
async function excluirEvolucao(id) {
  if (!confirm('Excluir este registro?')) return;
  await sb.from('pessoas_evolucao').delete().eq('id', id);
  await renderTabContent('evolucao');
}

/* ── START ────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
