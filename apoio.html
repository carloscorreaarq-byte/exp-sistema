<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXP · Apoio</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="exp-design-system.css">
<link rel="stylesheet" href="shared/exp-nav.css">
<script>
  (function(){
    var saved = localStorage.getItem('exp-theme');
    var sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if(saved === 'dark' || (!saved && sys)) {
      document.documentElement.setAttribute('data-theme','dark');
    } else {
      document.documentElement.setAttribute('data-theme','light');
    }
  })();
</script>
<style>
.secao-shell{
  background:var(--branco);
  border:1px solid var(--cinza);
  padding:18px 20px;
  margin-bottom:14px;
  border-radius:8px;
}

.secao-shell-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}

.secao-shell-title{
  font-size:13px;
  font-weight:700;
  letter-spacing:-.1px;
}

.secao-shell-sub{
  font-size:10px;
  color:#888;
  margin-top:3px;
}

.secao-shell-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

.secao-shell-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:9px;
  font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:#999;
}

.knowledge-callout{
  border:1px dashed var(--cinza);
  background:var(--off);
  padding:12px 14px;
  margin-bottom:14px;
  border-radius:8px;
}

.knowledge-callout-title{
  font-size:10px;
  font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:#777;
  margin-bottom:4px;
}

.knowledge-callout-text{
  font-size:11px;
  color:#666;
  line-height:1.7;
}

.saiba-mais{
  border:1px solid var(--cinza);
  border-radius:8px;
  background:var(--branco);
  overflow:hidden;
}
.saiba-mais summary{
  padding:11px 16px;
  font-size:10px;
  font-weight:700;
  letter-spacing:.4px;
  text-transform:uppercase;
  color:#888;
  cursor:pointer;
  user-select:none;
  list-style:none;
  display:flex;
  align-items:center;
  gap:6px;
}
.saiba-mais summary::-webkit-details-marker{display:none}
.saiba-mais summary::before{content:'▸';font-size:9px;color:#bbb;transition:transform .15s}
.saiba-mais[open] summary::before{transform:rotate(90deg)}
.saiba-mais summary:hover{color:var(--apoio-ac)}
.saiba-mais > div{padding:0 16px 4px}

.rich-body{
  font-size:12px;
  color:var(--text-muted);
  line-height:1.8;
}

.rich-body h3{
  font-size:10px;
  font-weight:700;
  letter-spacing:.7px;
  text-transform:uppercase;
  color:#777;
  margin:16px 0 6px;
}

.rich-body p{
  margin:0 0 10px;
}

.rich-body ul{
  margin:0 0 12px 18px;
  padding:0;
}

.rich-body li{
  margin-bottom:4px;
}

.knowledge-empty{
  border:1px dashed var(--cinza);
  background:var(--off);
  padding:18px;
  font-size:11px;
  color:#999;
  border-radius:8px;
}

.knowledge-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.knowledge-mini-card{
  background:var(--branco);
  border:1px solid var(--cinza);
  padding:14px;
  border-radius:8px;
}

.knowledge-mini-card-title{
  font-size:11px;
  font-weight:700;
  margin-bottom:6px;
}

.knowledge-mini-card-text{
  font-size:11px;
  color:#666;
  line-height:1.7;
}

.knowledge-subtabs{
  display:flex;
  gap:0;
  border-bottom:1px solid var(--cinza);
  margin-bottom:18px;
  overflow:auto;
}

.knowledge-subtab{
  padding:8px 14px;
  font-size:9px;
  font-weight:700;
  letter-spacing:.55px;
  text-transform:uppercase;
  color:#999;
  cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;
}

.knowledge-subtab:hover{
  color:var(--preto);
}

.knowledge-subtab.active{
  color:var(--preto);
  border-bottom-color:var(--apoio-ac);
}

.norma-tabs{
  display:flex;
  gap:8px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.norma-tab{
  border:1px solid var(--cinza);
  padding:6px 10px;
  font-size:10px;
  font-weight:600;
  cursor:pointer;
  background:var(--branco);
  color:#777;
  border-radius:6px;
}

.norma-tab.active{
  border-color:var(--preto);
  color:var(--preto);
  background:var(--off);
}

/* tema-hdr dentro de card não recebe o indent externo */
.secao-shell .tema-hdr{padding-left:0}

/* Sidebar: botão de adicionar sub-área */
.sb-add-sub{padding:6px 12px 6px 32px;display:flex;align-items:center}
.sb-add-sub button{background:none;border:none;font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#ccc;cursor:pointer;font-family:var(--f);padding:0;transition:color .12s}
.sb-add-sub button:hover{color:var(--apoio-ac)}

/* NORMA GUIDE — two-panel */
.norma-guide{display:flex;gap:0;border-top:1px solid var(--cinza2);margin-top:0}
.norma-guide-left{width:220px;flex-shrink:0;border-right:1px solid var(--cinza2);padding:6px 0;overflow-y:auto}
.norma-guide-right{flex:1;padding:20px 22px;min-width:0}
.norma-menu-cat{padding:8px 14px 4px;font-size:8px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:#bbb}
.norma-menu-item{padding:9px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.norma-menu-item:hover{background:var(--off)}
.norma-menu-item.active{border-left-color:var(--apoio-ac);background:var(--off)}
.norma-menu-code{font-family:var(--fm);font-size:9px;font-weight:700;color:#aaa;margin-bottom:2px;letter-spacing:.2px}
.norma-menu-title{font-size:10px;color:#777;line-height:1.35}
.norma-menu-item.active .norma-menu-code{color:var(--apoio-ac)}
.norma-menu-item.active .norma-menu-title{color:var(--preto);font-weight:600}
/* MARCO REGULATÓRIO grid */
.marco-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-top:14px}
.marco-col-title{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#999;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--cinza2)}

.knowledge-meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.knowledge-meta-item{
  border:1px solid var(--cinza2);
  background:var(--off);
  padding:5px 8px;
  font-size:10px;
  color:#777;
  border-radius:4px;
}

.veg-toolbar{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.veg-toolbar-main{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.veg-count{
  font-size:10px;
  color:#777;
}

.veg-filter-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.veg-filter label,
.knowledge-form-grid label{
  display:block;
  font-size:8px;
  font-weight:700;
  letter-spacing:.65px;
  text-transform:uppercase;
  color:#999;
  margin-bottom:5px;
}

.veg-filter input,
.veg-filter select,
.knowledge-form-grid input,
.knowledge-form-grid select,
.knowledge-form-grid textarea{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--cinza);
  background:var(--branco);
  font-family:var(--f);
  font-size:11px;
  color:var(--preto);
  outline:none;
  border-radius:6px;
  box-sizing:border-box;
}

.veg-filter input:focus,
.veg-filter select:focus,
.knowledge-form-grid input:focus,
.knowledge-form-grid select:focus,
.knowledge-form-grid textarea:focus{
  border-color:var(--preto);
}

.knowledge-form-grid textarea{
  min-height:110px;
  resize:vertical;
}

.knowledge-form-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

.knowledge-form-grid .full{
  grid-column:1 / -1;
}

.veg-table-wrap{
  border:1px solid var(--cinza);
  background:var(--branco);
  overflow:auto;
  border-radius:8px;
}

.veg-table{
  width:100%;
  border-collapse:collapse;
  min-width:980px;
}

.veg-table th{
  position:sticky;
  top:0;
  background:var(--off);
  z-index:1;
  font-size:8px;
  font-weight:700;
  letter-spacing:.7px;
  text-transform:uppercase;
  color:#888;
  text-align:left;
  padding:10px 12px;
  border-bottom:1px solid var(--cinza);
}

.veg-table td{
  padding:10px 12px;
  border-bottom:1px solid var(--cinza2);
  font-size:11px;
  vertical-align:top;
}

.veg-table tr:last-child td{
  border-bottom:none;
}

.veg-main-name{
  font-weight:700;
  color:var(--preto);
}

.veg-sci-name{
  display:block;
  font-size:10px;
  color:#888;
  margin-top:2px;
  font-style:italic;
}

.veg-pills{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.veg-pill{
  display:inline-flex;
  align-items:center;
  padding:3px 7px;
  border:1px solid var(--cinza2);
  background:var(--off);
  font-size:9px;
  color:#777;
  border-radius:20px;
}

.veg-actions{
  display:flex;
  gap:4px;
  justify-content:flex-end;
  align-items:center;
  flex-wrap:nowrap;
}

.btn-veg-icon{
  width:22px;
  height:22px;
  border-radius:4px;
  border:1px solid var(--cinza);
  background:var(--branco);
  cursor:pointer;
  font-size:11px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  color:#888;
  transition:all .12s;
  font-family:var(--f);
  flex-shrink:0;
}
.btn-veg-icon:hover{
  border-color:var(--preto);
  color:var(--preto);
}
.btn-veg-icon.validado{
  color:var(--verde);
  border-color:var(--cinza2);
  background:var(--verde-bg);
}
.btn-veg-icon.validado:hover{
  border-color:var(--tc);
  color:var(--tc);
  background:var(--tc-bg);
}

.veg-validado-badge{
  display:inline-flex;
  align-items:center;
  gap:3px;
  font-size:9px;
  font-weight:700;
  letter-spacing:.4px;
  text-transform:uppercase;
  color:var(--verde);
  background:var(--verde-bg);
  border:1px solid var(--cinza2);
  border-radius:4px;
  padding:2px 7px;
  white-space:nowrap;
}

.veg-validado-nome{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:9px;
  font-weight:700;
  color:var(--verde);
  background:var(--verde-bg);
  border:1px solid var(--cinza2);
  border-radius:4px;
  padding:1px 6px;
  margin-left:6px;
  vertical-align:middle;
}

.veg-note{
  font-size:10px;
  color:#888;
}


/* ── Memorial de plantas ─────────────────────────────────────────── */
.veg-sel-bar{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--grafite);color:#fff;border-radius:30px;padding:10px 20px;
  display:flex;align-items:center;gap:14px;font-size:12px;font-family:var(--f);
  box-shadow:0 4px 24px rgba(0,0,0,.28);z-index:300;white-space:nowrap;
}
.veg-sel-bar-count{font-weight:700;font-family:var(--font-mono,monospace);}
.veg-sel-bar .btn{background:#fff;color:var(--grafite);border:none;}
.veg-sel-bar-cancel{
  background:transparent;color:#bbb;border:1px solid #555;font-size:11px;
  padding:5px 12px;border-radius:20px;cursor:pointer;font-family:var(--f);
}
.veg-sel-bar-cancel:hover{color:#fff;border-color:#fff;}
.veg-check-cell{width:36px;text-align:center;vertical-align:middle !important;padding:6px 4px !important;}
.veg-check-cell input[type="checkbox"]{width:14px;height:14px;cursor:pointer;accent-color:var(--grafite);}
tr.veg-row-selected td{background:rgba(45,74,45,.06);}
.mem-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.mem-item-list{display:flex;flex-direction:column;gap:7px;max-height:320px;overflow-y:auto;margin-top:8px;padding-right:4px;}
.mem-item-row{display:grid;grid-template-columns:170px 1fr 1fr 1fr;gap:8px;align-items:center;padding:9px 10px;background:var(--off);border-radius:6px;border:1px solid var(--cinza);}
.mem-item-name{font-size:11px;display:flex;align-items:center;gap:7px;}
.mem-item-name b{display:block;font-weight:700;color:var(--preto);}
.mem-item-name i{display:block;font-size:10px;color:#888;font-style:italic;}
.mem-input{width:100%;padding:6px 8px;border:1px solid var(--cinza);border-radius:5px;font-size:11px;font-family:var(--f);background:var(--branco);color:var(--preto);}
.mem-input:focus{border-color:var(--preto);outline:none;}
.mem-section-lbl{font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#bbb;margin:14px 0 6px;font-family:var(--f);}

#modal-edit[data-size="medium"] .modal-box{
  width:min(720px,90vw);
}

#modal-edit[data-size="wide"] .modal-box{
  width:min(1040px,94vw);
}

#modal-edit[data-size="xwide"] .modal-box{
  width:min(1320px,96vw);
}

@media (max-width: 900px){
  .knowledge-form-grid{
    grid-template-columns:1fr;
  }

  .knowledge-form-grid .full{
    grid-column:auto;
  }
}
:root{
  /* ── aliases → design system ── */
  --preto:  var(--grafite);
  --az:     var(--azul);
  --am:     var(--ouro);
  --tc:     var(--terracota);
  --f:      var(--font-ui);
  --fm:     var(--font-mono);
  /* --verde, --cinza, --off, --branco → herdados do design system */

  /* ── variáveis locais ── */
  --cinza2:      #ECEAE4;
  --verde-l:     #2D9E6B;
  --verde-bg:    #EAF5EE;
  --az-bg:       #EAF0FB;
  --am-bg:       #FBF3E8;
  --tc-bg:       #FBF0EE;
  --roxo:        #6B4FA0;
  --urb:         #5280CA;
  --urb-bg:      #ECF1FA;
  --pai-inc:     #2A5239;
  --pai-hor:     #45865D;
  --pai-res:     #6AA87D;
  --pai-urb:     #9CC4A8;
  --pai-bg:      #EAF5EE;
  --consul:      #C36247;
  --consul-bg:   #FAF0EE;
  --esp:         #D19931;
  --esp-bg:      #FAF4E8;
  /* Cor de acento do apoio: terracota em vez de verde */
  --apoio-ac:    var(--tc);
  /* Identidade no nav — demarca o módulo ativo no dropdown */
  --nav-active:  var(--terracota);
  /* Texto secundário — usado onde a cor não tem token no design system */
  --text-muted:  #555;
  --text-sub:    #888;
}

/* ── SCROLLBAR — slim, consistente com design system ──────── */
*{scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
[data-theme="dark"] *{scrollbar-color:rgba(255,255,255,.12) transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.28)}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12)}
[data-theme="dark"] ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22)}
/* body — herdado de exp-design-system.css */

/* LOADING */
#loading{position:fixed;inset:0;background:var(--off);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loading-logo{height:30px;display:block;mix-blend-mode:multiply}
[data-theme="dark"] .loading-logo{filter:invert(1) brightness(0.85);mix-blend-mode:screen}
.loading-bar{width:120px;height:2px;background:var(--cinza);border-radius:2px;overflow:hidden;position:relative;margin-top:4px}
.loading-bar::after{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:var(--grafite);border-radius:2px;animation:ldbar 1.4s ease-in-out infinite}
@keyframes ldbar{0%{transform:translateX(-150%)}100%{transform:translateX(350%)}}

/* body::before — padrão de linhas convergentes definido em exp-design-system.css */

/* ═══════════════════════════════════════════════════
   NOVO LAYOUT — cards flutuando no background
═══════════════════════════════════════════════════ */
body{height:100vh;overflow:hidden;display:flex;flex-direction:column}
[data-theme="dark"] body{background:#161615}

/* Layout principal — mesmo padrão dos outros módulos */
#ap-app{
  display:none; /* JS seta flex após carregar */
  flex:1; min-height:0; padding:20px 72px; gap:11px;
  align-items:stretch; position:relative; z-index:1;
}

/* Timer: centralizado na nav (exp-nav.css já define, mas override garante posição) */
#exp-timer-widget{left:calc(72px + (66px / 2) - 23px) !important;bottom:34px !important;z-index:9998 !important}

/* Card sidebar */
#ap-sidebar{
  width:340px;flex-shrink:0;
  background:var(--branco,#fff);
  border:1px solid var(--cinza2,#ECEAE4);
  border-radius:14px;
  display:flex;flex-direction:column;overflow:hidden;
}
[data-theme="dark"] #ap-sidebar{background:#1E1E1D;border-color:#2E2D2B}

.ap-sb-head{padding:12px 14px 10px;border-bottom:1px solid var(--cinza2,#ECEAE4);flex-shrink:0}
[data-theme="dark"] .ap-sb-head{border-bottom-color:#2E2D2B}
.ap-sb-head-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}

.ap-sb-logo{height:auto;max-height:20px;width:auto;object-fit:contain;opacity:.5;mix-blend-mode:multiply;display:block;margin-right:auto}
[data-theme="dark"] .ap-sb-logo{filter:invert(1) brightness(.7);mix-blend-mode:screen;opacity:.45}

.ap-sb-icon-btn{
  width:28px;height:28px;border-radius:7px;border:none;
  background:var(--off,#F7F6F3);color:var(--grafite,#111110);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .12s;flex-shrink:0;
}
.ap-sb-icon-btn:hover{background:var(--cinza2,#ECEAE4)}
[data-theme="dark"] .ap-sb-icon-btn{background:#252523;color:#F0EDE6}
[data-theme="dark"] .ap-sb-icon-btn:hover{background:#2E2D2B}

/* User chip no header da sidebar */
.ap-user-chip{display:flex;align-items:center;gap:7px;cursor:pointer;border-radius:8px;padding:3px 6px 3px 3px;transition:background .12s;position:relative;flex-shrink:0}
.ap-user-chip:hover{background:var(--cinza2,#ECEAE4)}
[data-theme="dark"] .ap-user-chip:hover{background:rgba(255,255,255,.07)}
.ap-user-av{
  width:24px;height:24px;border-radius:50%;
  background:var(--cinza,#D0CFC9);color:#fff;
  font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;overflow:hidden;
}
.ap-user-av img{width:100%;height:100%;object-fit:cover}
.ap-user-info{display:flex;flex-direction:column;min-width:0}
.ap-user-nome{font-size:11px;font-weight:700;color:var(--grafite,#111110);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
[data-theme="dark"] .ap-user-nome{color:#F0EDE6}
.ap-user-role{font-size:9px;color:#888;white-space:nowrap}

/* Search na sidebar */
.ap-sb-search{
  display:flex;align-items:center;gap:6px;
  padding:5px 8px;margin:0 0 0;
  background:var(--off,#F7F6F3);
  border:1px solid var(--cinza2,#ECEAE4);
  border-radius:9px;
}
[data-theme="dark"] .ap-sb-search{background:#252523;border-color:#2E2D2B}
.ap-sb-search input{flex:1;border:none;background:none;font-family:var(--f,'Raleway',sans-serif);font-size:12px;color:var(--preto,#111110);outline:none}
[data-theme="dark"] .ap-sb-search input{color:#F0EDE6}
.ap-sb-search input::placeholder{color:var(--cinza,#D0CFC9)}

/* Lista de temas dentro da sidebar */
.ap-sb-body{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:8px}
.sb-section-lbl{padding:10px 14px 4px;font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#bbb}
.sb-theme-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:400;color:#666;transition:all .12s;border-left:3px solid transparent;user-select:none}
.sb-theme-item:hover{background:var(--off,#F7F6F3);color:var(--preto,#111110)}
[data-theme="dark"] .sb-theme-item:hover{background:rgba(255,255,255,.05);color:#F0EDE6}
.sb-theme-item.active{background:var(--off,#F7F6F3);color:var(--preto,#111110);font-weight:600;border-left-color:var(--apoio-ac,#3E7858)}
[data-theme="dark"] .sb-theme-item.active{background:rgba(255,255,255,.07);color:#F0EDE6}
.sb-icon{font-size:10px;flex-shrink:0;opacity:.7}
.sb-chevron{font-size:13px;color:#ccc;margin-left:auto;transition:transform .2s;flex-shrink:0;line-height:1;font-weight:300}
.sb-theme-item.open .sb-chevron{transform:rotate(90deg)}
.sb-submenu{display:none;flex-direction:column;background:var(--off,#F7F6F3)}
[data-theme="dark"] .sb-submenu{background:rgba(255,255,255,.03)}
.sb-submenu.open{display:flex}
.sb-sub-item{padding:7px 14px 7px 32px;font-size:11px;color:#888;cursor:pointer;transition:all .12s;border-left:3px solid transparent;border-bottom:1px solid var(--cinza2,#ECEAE4)}
.sb-sub-item:last-child{border-bottom:none}
.sb-sub-item:hover{color:var(--preto,#111110);background:var(--cinza2,#ECEAE4)}
[data-theme="dark"] .sb-sub-item:hover{color:#F0EDE6;background:rgba(255,255,255,.07)}
.sb-sub-item.active{color:var(--apoio-ac,#3E7858);font-weight:600;border-left-color:var(--apoio-ac,#3E7858)}

/* Card de conteúdo */
#apoio-content{
  flex:1;min-width:0;
  background:var(--branco,#fff);
  border:1px solid var(--cinza2,#ECEAE4);
  border-radius:14px;
  overflow-y:auto;padding:24px 28px;
}
[data-theme="dark"] #apoio-content{background:#1E1E1D;border-color:#2E2D2B}

/* TEMA HEADER */
.tema-hdr{margin-bottom:28px;padding-left:22px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.tema-hdr-left{flex:1;min-width:0}
.tema-nome{font-size:28px;font-weight:700;letter-spacing:-.5px;color:var(--grafite);margin-bottom:6px;line-height:1.15}
.tema-desc{font-size:13px;color:#888;font-weight:300;line-height:1.6;max-width:680px}
[data-theme="dark"] .tema-desc{color:#777}

/* ADD CARD BUTTON */
.apoio-add-card-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:14px 0 0;padding:9px 18px;border:1px dashed var(--cinza);background:transparent;border-radius:6px;color:#bbb;font-size:10px;font-weight:700;letter-spacing:.4px;font-family:var(--f);cursor:pointer;transition:all .12s;width:100%}
.apoio-add-card-btn:hover{border-color:var(--apoio-ac);color:var(--apoio-ac);background:var(--tc-bg)}

/* INDICAÇÕES CARDS */
.ind-card{background:var(--branco);border:1px solid var(--cinza);border-radius:8px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .12s}
.ind-card:hover{border-color:var(--grafite)}
.ind-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.ind-card-titulo{font-size:12px;font-weight:700;color:var(--grafite);margin-bottom:2px}
.ind-card-autor{font-size:10px;color:#888;margin-bottom:8px}
.ind-card-tags{display:flex;gap:5px;flex-wrap:wrap}
.ind-tag{display:inline-flex;align-items:center;padding:2px 8px;border:1px solid var(--cinza2);background:var(--off);font-size:9px;font-weight:700;letter-spacing:.3px;color:#888;border-radius:20px}
.ind-card-body{margin-top:12px;border-top:1px solid var(--cinza2);padding-top:10px;font-size:11px;color:#666;line-height:1.7;display:none}
.ind-card.expanded .ind-card-body{display:block}
.ind-card-chevron{font-size:16px;color:#ccc;transition:transform .2s;flex-shrink:0;line-height:1;margin-top:2px;font-weight:300}
.ind-card.expanded .ind-card-chevron{transform:rotate(90deg)}
.ind-card-actions{display:flex;gap:4px;margin-left:8px}

/* NORMAS */
.norma-item{background:var(--branco);border:1px solid var(--cinza);border-radius:8px;padding:14px 16px;margin-bottom:8px;position:relative}
.norma-item-top{display:flex;align-items:flex-start;gap:10px}
.norma-item-code{font-family:var(--fm);font-size:10px;font-weight:700;color:#888;flex-shrink:0;padding-top:1px}
.norma-item-title{font-size:12px;font-weight:700;color:var(--grafite);flex:1}
.norma-item-desc{font-size:11px;color:#666;line-height:1.65;margin-top:6px}
.norma-item-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0}

/* JARDIM SUBCARD */
.jv-subcard{background:var(--off);border:1px solid var(--cinza2);border-radius:6px;padding:11px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.jv-subcard-body{flex:1;min-width:0}
.jv-subcard-title{font-size:11px;font-weight:700;color:var(--grafite);margin-bottom:3px}
.jv-subcard-desc{font-size:11px;color:#666;line-height:1.6}
.jv-subcard-actions{display:flex;gap:4px;flex-shrink:0}

/* DRAG HANDLE */
.drag-handle{cursor:grab;color:#ccc;font-size:14px;padding:0 4px;flex-shrink:0;line-height:1;user-select:none;transition:color .1s}
.drag-handle:hover{color:#888}
.drag-handle:active{cursor:grabbing}

/* AREA TABS */
.area-tabs{display:flex;gap:0;border-bottom:1px solid var(--cinza);margin-bottom:18px}
.area-tab{padding:7px 14px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;user-select:none}
.area-tab:hover{color:var(--preto)}
.area-tab.active{color:var(--preto)}
.area-tab.active[data-area="paisagismo"]{border-bottom-color:var(--pai-hor)}
.area-tab.active[data-area="urbanismo"]{border-bottom-color:var(--urb)}
.area-tab.active[data-area="consultorias"]{border-bottom-color:var(--consul)}
.area-tab.active[data-area="especiais"]{border-bottom-color:var(--esp)}

/* CONTENT HEADER */
.content-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.content-hdr-left{}
.content-title{font-size:14px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px}
.content-sub{font-size:11px;color:#999}
.content-hdr-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* TIPO GRID */
.tipos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

/* TIPO CARD */
.tipo-card{background:var(--branco);border:1px solid var(--cinza);position:relative;border-radius:8px;overflow:hidden}
.tipo-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--pai-hor)}
.tipo-card-hdr{padding:10px 14px 10px 17px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .12s}
.tipo-card-hdr:hover{background:var(--off)}
.tipo-card-nome{font-size:11px;font-weight:700;flex:1;letter-spacing:.1px}
.tipo-card-chevron{font-size:14px;color:#ccc;transition:transform .2s;flex-shrink:0;line-height:1;font-weight:300}
.tipo-card.expanded .tipo-card-chevron{transform:rotate(90deg)}

/* TIPO BODY */
.tipo-body{display:none;border-top:1px solid var(--cinza2)}
.tipo-card.expanded .tipo-body{display:block}

/* TIPO DESCRICAO */
.tipo-descricao-wrap{padding:12px 14px 12px 17px;border-bottom:1px solid var(--cinza2);position:relative}
.tipo-descricao-wrap:hover .edit-trigger{opacity:1}
.tipo-descricao-txt{font-size:12px;line-height:1.65;color:var(--text-muted)}
.edit-trigger{position:absolute;top:8px;right:10px;opacity:0;transition:opacity .12s}
.edit-btn{background:var(--branco);border:1px solid var(--cinza);padding:3px 7px;cursor:pointer;font-size:10px;color:#888;font-family:var(--f);transition:all .1s;display:inline-flex;align-items:center;gap:3px;border-radius:4px}
.edit-btn:hover{border-color:var(--preto);color:var(--preto)}

/* ETAPAS LISTA */
.etapas-lista{padding:10px 14px 14px 17px;display:flex;flex-direction:column;gap:4px}
.etapas-lista-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.etapas-lista-label{font-size:8px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:#bbb}
.recolher-btn{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#ccc;background:none;border:none;cursor:pointer;padding:0;transition:color .1s;font-family:var(--f)}
.recolher-btn:hover{color:#888}

/* ETAPA ROW */
.etapa-row{border:1px solid var(--cinza2);background:var(--off);border-radius:6px;overflow:hidden}
.etapa-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;user-select:none;transition:background .1s}
.etapa-hdr:hover{background:var(--cinza2)}
.etapa-num{font-family:var(--fm);font-size:9px;color:#bbb;width:14px;flex-shrink:0;text-align:right}
.etapa-nome{font-size:11px;font-weight:600;flex:1}
.etapa-prazo{font-family:var(--fm);font-size:9px;color:#bbb;white-space:nowrap}
.etapa-chevron{font-size:13px;color:#ccc;transition:transform .2s;flex-shrink:0;margin-left:2px;line-height:1;font-weight:300}
.etapa-row.expanded .etapa-chevron{transform:rotate(90deg)}
.etapa-body{display:none;border-top:1px solid var(--cinza2);padding:10px 10px 12px 32px}
.etapa-row.expanded .etapa-body{display:block}

/* ETAPA DESCRICAO */
.etapa-descricao-wrap{position:relative;margin-bottom:10px}
.etapa-descricao-wrap:hover .edit-trigger{opacity:1}
.etapa-descricao-txt{font-size:11px;line-height:1.65;color:#555}

/* ENTREGAVEIS */
.entregaveis-label{font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#ccc;margin-bottom:5px}
.entregaveis-lista{display:flex;flex-direction:column;gap:3px}

/* ENTREGAVEL ROW */
.entregavel-row{border-left:2px solid var(--cinza2)}
.entregavel-hdr{display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer;user-select:none;transition:background .1s}
.entregavel-hdr:hover{background:var(--cinza2)}
.entregavel-nome{font-size:11px;font-weight:500;flex:1}
.entregavel-chevron{font-size:13px;color:#ccc;transition:transform .2s;flex-shrink:0;line-height:1;font-weight:300}
.entregavel-row.expanded .entregavel-chevron{transform:rotate(90deg)}
.entregavel-body{display:none;padding:6px 8px 10px 18px}
.entregavel-row.expanded .entregavel-body{display:block}

/* ENTREGAVEL DESCRICAO */
.entregavel-descricao-wrap{position:relative;margin-bottom:8px}
.entregavel-descricao-wrap:hover .edit-trigger{opacity:1}
.entregavel-descricao-txt{font-size:11px;line-height:1.65;color:#555}

/* CHECKLIST */
.checklist-label{font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#ccc;margin-bottom:5px}
.checklist-lista{display:flex;flex-direction:column;gap:3px}
.checklist-item{display:flex;align-items:flex-start;gap:6px;font-size:11px;line-height:1.5;color:#555}
.checklist-dot{width:4px;height:4px;border-radius:50%;background:var(--cinza);margin-top:6px;flex-shrink:0}
.checklist-vazio{font-size:10px;color:#bbb;font-style:italic}

/* INLINE EDIT */
.editando-area{margin-top:4px}
.editando-textarea{width:100%;padding:8px;border:1px solid var(--am);background:var(--branco);font-family:var(--f);font-size:11px;line-height:1.6;color:var(--preto);font-weight:300;resize:vertical;outline:none;min-height:80px}
.editando-actions{display:flex;gap:6px;margin-top:6px;align-items:center}
.editando-hint{font-size:9px;color:#bbb;margin-left:auto}

/* PRAZO EDITAR */
.prazo-edit-wrap{display:inline-flex;align-items:center;gap:4px;margin-left:4px}
.prazo-input{width:38px;padding:1px 5px;border:1px solid var(--cinza);font-family:var(--fm);font-size:9px;text-align:center;outline:none;background:var(--branco)}
.prazo-input:focus{border-color:var(--am)}
.prazo-tipo-select{padding:1px 4px;border:1px solid var(--cinza);font-family:var(--f);font-size:9px;outline:none;background:var(--branco)}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-family:var(--f);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--cinza);background:var(--branco);color:#888;cursor:pointer;transition:all .12s;white-space:nowrap;border-radius:6px}
.btn:hover{border-color:var(--preto);color:var(--preto)}
.btn.verde{background:var(--verde);border-color:var(--verde);color:#fff}
.btn.verde:hover{background:var(--verde-l);border-color:var(--verde-l)}
.btn.sm{padding:3px 8px;font-size:8px}
.btn.tc{background:var(--tc);border-color:var(--tc);color:#fff}
.btn.am{background:var(--am);border-color:var(--am);color:#fff}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 7px;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;border-radius:4px}
.b-pai{background:var(--pai-bg);color:var(--pai-inc)}
.b-urb{background:var(--urb-bg);color:var(--urb)}
.b-consul{background:var(--consul-bg);color:var(--consul)}
.b-esp{background:var(--esp-bg);color:var(--esp)}
.b-gr{background:var(--cinza2);color:#777}

/* PLACEHOLDER TEMA */
.tema-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;text-align:center;gap:10px}
.tema-placeholder-icon{font-size:28px;opacity:.25}
.tema-placeholder-title{font-size:13px;font-weight:600;color:#bbb}
.tema-placeholder-sub{font-size:11px;color:#ccc;max-width:300px;line-height:1.6}
.tema-placeholder-badge{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 10px;background:var(--cinza2);color:#aaa;margin-top:4px}

/* SETUP NOTICE */
.setup-notice{background:var(--branco);border:1px solid var(--am);padding:20px 24px;margin-bottom:16px;position:relative}
.setup-notice::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--am)}
.setup-notice-title{font-size:11px;font-weight:700;color:var(--am);margin-bottom:8px;letter-spacing:.3px;padding-left:10px}
.setup-notice-text{font-size:11px;color:#666;line-height:1.7;margin-bottom:12px;padding-left:10px}
.setup-sql{background:var(--off);border:1px solid var(--cinza2);padding:10px 14px;font-family:var(--fm);font-size:10px;line-height:1.8;color:#555;margin-bottom:12px;overflow-x:auto;white-space:pre;margin-left:10px}
.setup-actions{display:flex;gap:8px;align-items:center;padding-left:10px}
.seed-spinner{width:14px;height:14px;border:2px solid var(--verde-bg);border-top-color:var(--verde);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* feedback-popover — estilos canônicos em exp-design-system.css */

/* SEARCH RESULTS */
.search-results-wrap{background:var(--branco);border:1px solid var(--cinza)}
.search-results-hdr{padding:8px 14px;border-bottom:1px solid var(--cinza2);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#999}
.search-result-item{padding:8px 14px;cursor:pointer;border-bottom:1px solid var(--cinza2);transition:background .1s}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--off)}
.sr-path{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#bbb;margin-bottom:2px}
.sr-titulo{font-size:11px;font-weight:600;margin-bottom:2px}
.sr-snippet{font-size:10px;color:#888;line-height:1.4}
.search-empty{padding:24px;text-align:center;font-size:11px;color:#bbb}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:200;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--branco);border:1px solid var(--cinza);width:520px;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;border-radius:8px;overflow:hidden}
.modal-hdr{padding:12px 16px;border-bottom:1px solid var(--cinza);display:flex;align-items:center;gap:8px;background:var(--branco)}
.modal-title{font-size:11px;font-weight:700;letter-spacing:.3px;flex:1;color:var(--preto)}
.modal-close{background:none;border:none;cursor:pointer;font-size:16px;color:#999;padding:0;line-height:1;transition:color .1s;font-family:var(--f)}
.modal-close:hover{color:var(--preto)}
.modal-body{padding:16px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;background:var(--branco)}
.modal-field label{display:block;font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#999;margin-bottom:5px;font-family:var(--f)}
.modal-field textarea,.modal-field input[type=text],.modal-field input[type=number],.modal-field select{width:100%;padding:8px 10px;border:1px solid var(--cinza);font-family:var(--f);font-size:12px;font-weight:300;color:var(--preto);outline:none;background:var(--branco);border-radius:6px;box-sizing:border-box}
.modal-field textarea:focus,.modal-field input:focus,.modal-field select:focus{border-color:var(--preto)}
.modal-field textarea{resize:vertical;min-height:100px}
.modal-checklist-lista{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.modal-checklist-item{display:flex;align-items:center;gap:6px}
.modal-checklist-item input[type=text]{flex:1;padding:7px 9px;border:1px solid var(--cinza);border-radius:6px;font-family:var(--f);font-size:12px;font-weight:300;color:var(--preto);outline:none;background:var(--branco);box-sizing:border-box}
.modal-checklist-item input[type=text]:focus{border-color:var(--preto)}
.modal-checklist-item .btn-remove{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:0 2px;transition:color .1s;line-height:1}
.modal-checklist-item .btn-remove:hover{color:var(--tc)}
.modal-hint{font-size:10px;color:#bbb;line-height:1.5}
.modal-footer{padding:10px 16px;border-top:1px solid var(--cinza);display:flex;gap:6px;justify-content:flex-end;background:var(--branco)}

/* BREADCRUMB */
.breadcrumb{font-size:10px;color:#bbb;margin-bottom:14px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.breadcrumb .bc-sep{color:#ddd}
.breadcrumb .bc-active{color:#888}

/* LOADING INLINE */
.loading-inline{display:flex;align-items:center;justify-content:center;padding:40px;gap:10px;color:#bbb;font-size:11px}
.loading-inline-spinner{width:16px;height:16px;border:2px solid var(--cinza2);border-top-color:var(--cinza);border-radius:50%;animation:spin .6s linear infinite}

/* PROJETOS TWO-PANEL */
.proj-body{display:flex;gap:0;border-top:1px solid var(--cinza2)}
.tipo-menu{width:176px;flex-shrink:0;border-right:1px solid var(--cinza2);padding:8px 0}
.tipo-menu-item{padding:9px 14px 9px 16px;font-size:11px;font-weight:400;cursor:pointer;border-left:2px solid transparent;color:#999;transition:color .12s,border-color .12s;user-select:none;line-height:1.4}
.tipo-menu-item:hover{color:var(--preto);border-left-color:var(--cinza)}
.tipo-menu-item.active{border-left-color:var(--pai-hor);color:var(--preto);font-weight:600}
.tipo-menu-item.active[data-area="urbanismo"]{border-left-color:var(--urb)}
.tipo-menu-item.active[data-area="consultorias"]{border-left-color:var(--consul)}
.tipo-menu-item.active[data-area="especiais"]{border-left-color:var(--esp)}
.tipo-detail{flex:1;padding:16px 20px 24px;overflow:auto}
.tipo-detail-vazio{display:flex;align-items:center;justify-content:center;min-height:200px;color:#ccc;font-size:11px}
.tipo-detail-nome{font-size:14px;font-weight:700;letter-spacing:-.2px;margin-bottom:8px}
.tipo-detail-desc{font-size:12px;line-height:1.7;color:var(--text-muted);margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--cinza2)}
.tipo-detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;position:relative}
.tipo-detail-edit{position:absolute;top:-2px;right:0}

/* STATIC CONTENT */
.apoio-section{margin-bottom:28px}
.apoio-section-title{font-size:12px;font-weight:700;letter-spacing:.1px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--cinza2);color:var(--preto)}
.apoio-section-intro{font-size:12px;line-height:1.8;color:var(--text-muted);margin-bottom:14px}
.apoio-card{background:var(--branco);border:1px solid var(--cinza);padding:14px 14px 14px 20px;margin-bottom:8px;position:relative;border-radius:8px;overflow:hidden}
.apoio-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.apoio-card.verde::before{background:var(--verde)}
.apoio-card.az::before{background:var(--az)}
.apoio-card.am::before{background:var(--am)}
.apoio-card.tc::before{background:var(--tc)}
.apoio-card.roxo::before{background:var(--roxo)}
.apoio-card.cinza::before{background:var(--cinza)}
.apoio-card-title{font-size:11px;font-weight:700;letter-spacing:.2px;color:var(--preto);margin-bottom:5px}
.apoio-card-text{font-size:12px;line-height:1.75;color:var(--text-muted)}
.apoio-ul{list-style:none;padding:0;margin:6px 0 0}
.apoio-ul li{font-size:12px;line-height:1.7;color:#555;padding:2px 0 2px 16px;position:relative}
.apoio-ul li::before{content:'—';position:absolute;left:0;color:#ccc}
.apoio-kv{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-bottom:14px}
.apoio-kv-item{background:var(--branco);border:1px solid var(--cinza2);padding:12px 14px;border-radius:8px}
.apoio-kv-label{font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#bbb;margin-bottom:5px}
.apoio-kv-value{font-size:12px;line-height:1.6;color:var(--preto);font-weight:400}
.apoio-highlight{font-size:13px;line-height:1.65;color:var(--preto);font-weight:300;padding:14px 18px;border-left:3px solid var(--apoio-ac);background:var(--branco);margin-bottom:14px;border-radius:8px}
.apoio-content-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}

/* SUBTEMA NAV */
.subtema-nav{display:flex;gap:0;border-bottom:1px solid var(--cinza);margin-bottom:20px}
.subtema-tab{padding:7px 14px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;user-select:none}
.subtema-tab:hover{color:var(--preto)}
.subtema-tab.active{color:var(--preto);border-bottom-color:var(--apoio-ac)}

/* CAREER PLAN */
.career-track{display:flex;align-items:center;gap:0;padding:16px 0 20px;overflow-x:auto;margin-bottom:24px}
.career-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.career-level{padding:7px 11px;font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;border:1px solid transparent}
.career-level.estag{background:var(--cinza2);color:#777;border-color:#ddd}
.career-level.junior{background:var(--verde-bg);color:var(--verde);border-color:#c0e8d0}
.career-level.pleno{background:var(--az-bg);color:var(--az);border-color:#bdd4f5}
.career-level.senior{background:var(--am-bg);color:var(--am);border-color:#f0d8b0}
.career-level.diretor{background:var(--tc-bg);color:var(--tc);border-color:#f0c8c0}
.career-connector{width:14px;height:2px;background:var(--cinza);flex-shrink:0}
.career-class-separator{width:6px;height:2px;background:transparent;flex-shrink:0}
.career-class-label{font-size:8px;color:#bbb;font-weight:600;letter-spacing:.4px;text-transform:uppercase;text-align:center;margin-top:5px;white-space:nowrap}

/* NUCLEOS DIAGRAM */
.nucleos-outer{display:grid;grid-template-columns:1fr auto;gap:14px;margin-bottom:16px}
.nucleo-block{background:var(--branco);border:1px solid var(--cinza);padding:14px;border-radius:8px}
.nucleo-block-title{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#bbb;margin-bottom:10px}
.nucleo-inner-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.nucleo-col{}
.nucleo-col-title{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:4px 10px;margin-bottom:6px;display:inline-block}
.nucleo-col-title.urb{background:var(--urb-bg);color:var(--urb)}
.nucleo-col-title.pai{background:var(--pai-bg);color:var(--pai-inc)}
.nucleo-setor{padding:5px 10px;font-size:11px;background:var(--off);border:1px solid var(--cinza2);margin-bottom:4px;color:#555;font-weight:400;border-radius:4px}
.nucleo-consul-list{display:flex;flex-direction:column;gap:5px;min-width:148px}
.nucleo-consul-item{padding:5px 10px;font-size:11px;background:var(--consul-bg);border:1px solid #f0d8d3;color:var(--consul);border-radius:4px}
.nucleo-consul-item.especial{background:var(--esp-bg);border-color:#e8dcc0;color:var(--esp)}

/* VEG PROMPT */
.prompt-box{background:var(--off);border:1px solid var(--cinza2);padding:14px 16px;font-family:var(--fm);font-size:10px;line-height:1.85;color:#555;white-space:pre-wrap;position:relative;margin-top:10px;border-radius:8px}
.prompt-copy-btn{position:absolute;top:8px;right:8px;background:var(--branco);border:1px solid var(--cinza);padding:3px 10px;font-family:var(--f);font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#888;cursor:pointer;transition:all .1s;border-radius:4px}
.prompt-copy-btn:hover{border-color:var(--preto);color:var(--preto)}

/* ── DARK MODE — variáveis locais ─────────────────────────── */
[data-theme="dark"]{
  --cinza2:      #2A2A28;
  --text-muted:  #999;
  --text-sub:    #777;
  --verde-l:   #52A676;
  --verde-bg:  #1A2B22;
  --az-bg:     #1A2232;
  --am-bg:     #2A2212;
  --tc-bg:     #2A1A14;
  --pai-bg:    #1A2B22;
  --urb-bg:    #1A2232;
  --consul-bg: #2A1A16;
  --esp-bg:    #2A2010;
}

/* ── DARK MODE — componentes ──────────────────────────────── */
/* Nota: componentes que usam var(--branco) / var(--off) / var(--cinza)
   têm dark mode resolvido automaticamente pelo token cascade.
   Aqui ficam apenas overrides que não são cobertos pelos tokens. */

[data-theme="dark"] #loading{background:var(--off)}

/* sidebar — superfície mais escura que card, por isso override explícito */
[data-theme="dark"] .apoio-sidebar{background:var(--off);border-color:var(--cinza)}
[data-theme="dark"] .sb-search input{background:var(--branco);color:var(--grafite)}
[data-theme="dark"] .sb-theme-item:hover{background:var(--branco)}
[data-theme="dark"] .sb-theme-item.active{background:var(--branco)}
[data-theme="dark"] .sb-submenu{background:var(--off)}
[data-theme="dark"] .sb-sub-item:hover{background:var(--cinza2);color:var(--grafite)}

/* componentes com hover bg que não usam token */
[data-theme="dark"] .tipo-card-hdr:hover{background:var(--branco)}
[data-theme="dark"] .tipo-descricao-txt,[data-theme="dark"] .etapa-descricao-txt,[data-theme="dark"] .entregavel-descricao-txt{color:#999}
[data-theme="dark"] .edit-btn{color:#777}
[data-theme="dark"] .edit-btn:hover{border-color:#888;color:var(--grafite)}
/* etapa-row usa var(--off) no light → dark token já aplica; hover é explícito */
[data-theme="dark"] .etapa-hdr:hover,[data-theme="dark"] .entregavel-hdr:hover{background:var(--cinza2)}

/* apoio-ul li — não usa --text-muted (é lista, cor própria) */
[data-theme="dark"] .apoio-ul li{color:#888}

/* nucleo-setor — usa var(--off) mas hover explicit */
[data-theme="dark"] .nucleo-setor{background:var(--branco);color:#888}

/* btn-veg-icon — hover e validado */
[data-theme="dark"] .btn-veg-icon{color:#888}
[data-theme="dark"] .btn-veg-icon:hover{border-color:#888;color:var(--grafite)}
/* .btn-veg-icon.validado, .veg-validado-badge, .veg-validado-nome — dark mode coberto pelos tokens var(--verde) e var(--verde-bg) */

/* tabela — hover row */
[data-theme="dark"] .veg-table tr:hover td{background:var(--branco)}

/* inputs de formulário — fundo diferenciado de card para leiturabilidade */
[data-theme="dark"] .veg-filter input,[data-theme="dark"] .veg-filter select,
[data-theme="dark"] .knowledge-form-grid input,[data-theme="dark"] .knowledge-form-grid select,
[data-theme="dark"] .knowledge-form-grid textarea,
[data-theme="dark"] .mem-input{background:var(--branco);border-color:var(--cinza);color:var(--grafite)}

/* norma-tab — cor de texto (bg já é var(--branco)) */
[data-theme="dark"] .norma-tab{color:#666}
[data-theme="dark"] .norma-tab.active{background:var(--branco);border-color:#666;color:var(--grafite)}
/* norma-guide two-panel */
[data-theme="dark"] .norma-menu-item:hover{background:var(--branco)}
[data-theme="dark"] .norma-menu-item.active{background:var(--branco)}
[data-theme="dark"] .norma-menu-title{color:#777}
[data-theme="dark"] .norma-menu-item.active .norma-menu-title{color:var(--grafite)}
[data-theme="dark"] .marco-col-title{border-bottom-color:var(--cinza2)}

/* knowledge-meta-item — usa var(--off) em light, ok no dark; hover explícito */
[data-theme="dark"] .knowledge-meta-item{background:var(--branco)}

/* prompt-box — superfície diferente de card */
[data-theme="dark"] .prompt-box{background:var(--off)}

/* setup-sql — fundo de código */
[data-theme="dark"] .setup-sql{background:var(--off);color:#999}

/* search — hover row */
[data-theme="dark"] .search-result-item:hover{background:var(--branco)}

/* modal — dark mode */
[data-theme="dark"] .modal-hdr{background:var(--branco)}
[data-theme="dark"] .modal-body{background:var(--branco)}
[data-theme="dark"] .modal-footer{background:var(--branco)}
[data-theme="dark"] .modal-title{color:var(--grafite)}
[data-theme="dark"] .modal-close{color:#666}
[data-theme="dark"] .modal-field label{color:#AAA}
[data-theme="dark"] .modal-field textarea,[data-theme="dark"] .modal-field input,[data-theme="dark"] .modal-field select{background:var(--branco);border-color:var(--cinza);color:var(--grafite);color-scheme:dark}
[data-theme="dark"] .modal-checklist-item input[type=text]{background:var(--branco);border-color:var(--cinza);color:var(--grafite);color-scheme:dark}

/* tipo-menu */
[data-theme="dark"] .tipo-menu-item{color:#888}
[data-theme="dark"] .tipo-menu-item:hover{color:var(--grafite)}
[data-theme="dark"] .tipo-menu-item.active{color:var(--grafite)}
[data-theme="dark"] .tipo-detail-desc{color:#AAA}

/* btn — color override (bg já é var(--branco)) */
[data-theme="dark"] .btn{color:#888}
[data-theme="dark"] .btn:hover{border-color:#888;color:var(--grafite)}
/* botões coloridos não perdem o texto branco no dark */
[data-theme="dark"] .btn.verde{color:#fff}
[data-theme="dark"] .btn.verde:hover{color:#fff;background:var(--verde-l);border-color:var(--verde-l)}
[data-theme="dark"] .btn.am{color:#fff}
[data-theme="dark"] .btn.am:hover{color:#fff}
[data-theme="dark"] .btn.tc{color:#fff}
[data-theme="dark"] .btn.tc:hover{color:#fff}

/* texto — contraste dark */
[data-theme="dark"] .secao-shell-sub{color:#888}
[data-theme="dark"] .knowledge-callout-text{color:#999}
/* .rich-body color — coberto por var(--text-muted) no dark mode */
[data-theme="dark"] .rich-body h3{color:#777}
[data-theme="dark"] .knowledge-mini-card-text{color:#888}
[data-theme="dark"] .content-sub{color:#888}
[data-theme="dark"] .checklist-item{color:#999}
[data-theme="dark"] .checklist-vazio{color:#666}
[data-theme="dark"] .veg-sci-name{color:#888}
[data-theme="dark"] .veg-pill{color:#999;background:rgba(255,255,255,.04);border-color:var(--cinza)}
[data-theme="dark"] .veg-count,[data-theme="dark"] .veg-note{color:#888}
[data-theme="dark"] .veg-filter label,[data-theme="dark"] .knowledge-form-grid label{color:#888}
[data-theme="dark"] .knowledge-empty{color:#777}
[data-theme="dark"] .entregaveis-label,[data-theme="dark"] .checklist-label,[data-theme="dark"] .etapas-lista-label{color:#666}
[data-theme="dark"] .veg-table th{color:#777}
[data-theme="dark"] .veg-main-name{color:var(--grafite)}
/* veg-sel-bar — força dark shelf em qualquer tema */
[data-theme="dark"] .veg-sel-bar{background:#1a1a18;color:#f0efec}
[data-theme="dark"] .veg-sel-bar .btn{background:#f0efec;color:#1a1a18}
[data-theme="dark"] .knowledge-subtab{color:#777}
[data-theme="dark"] .knowledge-subtab:hover,[data-theme="dark"] .knowledge-subtab.active{color:var(--grafite)}
[data-theme="dark"] .sb-section-lbl{color:#555}
[data-theme="dark"] .sb-theme-item{color:#888}
[data-theme="dark"] .sb-sub-item{color:#777}
/* plano de gente — dark mode */
[data-theme="dark"] .pg-card{background:var(--branco) !important;border-color:var(--cinza) !important}
[data-theme="dark"] .pg-card-title{color:var(--grafite) !important}
[data-theme="dark"] .pg-card-desc{color:#AAA !important}
[data-theme="dark"] .pg-criterio{background:var(--off) !important;border-color:var(--cinza) !important}
[data-theme="dark"] .pg-criterio-title{color:var(--grafite) !important}
[data-theme="dark"] .pg-criterio-text{color:#AAA !important}
[data-theme="dark"] .pg-track-card{border-color:var(--cinza) !important}
[data-theme="dark"] .pg-track-card:nth-child(1){background:rgba(62,120,88,.12) !important}
[data-theme="dark"] .pg-track-card:nth-child(3){background:rgba(74,114,181,.12) !important}
[data-theme="dark"] .pg-track-card:nth-child(5){background:rgba(196,154,39,.12) !important}
[data-theme="dark"] .pg-track-label{opacity:.9}
[data-theme="dark"] .pg-connector{color:#555 !important}
[data-theme="dark"] .pg-nucleos-box{border-color:var(--cinza) !important}
/* carga de terra — dark mode */
[data-theme="dark"] .ct-formula-box{background:var(--off) !important;border-color:var(--cinza) !important}
[data-theme="dark"] .ct-formula-label{color:#777 !important}
[data-theme="dark"] .ct-example{color:#999 !important}
[data-theme="dark"] .ct-chip{background:var(--branco) !important;border-color:var(--cinza) !important;color:var(--grafite) !important}
[data-theme="dark"] #ct-resultado{background:var(--verde-bg) !important;border-color:var(--verde) !important}
[data-theme="dark"] #ct-resultado span{color:var(--grafite) !important;opacity:.7}
[data-theme="dark"] #ct-resultado-sub{color:#777 !important}
[data-theme="dark"] #ct-vaso-resultado{background:var(--az-bg) !important;border-color:var(--azul) !important}
[data-theme="dark"] #ct-vaso-resultado span{color:var(--grafite) !important;opacity:.7}
[data-theme="dark"] #ct-nota{background:var(--off) !important;border-color:var(--cinza) !important;color:#AAA !important}
[data-theme="dark"] #ct-peso-esp,[data-theme="dark"] #ct-altura,
[data-theme="dark"] #ct-vaso-peso,[data-theme="dark"] #ct-vaso-terra,[data-theme="dark"] #ct-vaso-planta{
  background:var(--branco) !important;border-color:var(--cinza) !important;color:var(--grafite) !important}
/* CADASTROS E SENHAS — base */
.cs-shell{display:flex;flex-direction:column;gap:16px}
.cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1100px){.cs-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:720px){.cs-grid{grid-template-columns:1fr}}
.cs-item{background:var(--branco);border:1px solid var(--cinza);border-radius:8px;padding:8px 12px}
.cs-item-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.cs-item-left{flex:1;min-width:0}
.cs-item-title-row{display:flex;align-items:center;gap:5px}
.cs-link-arrow{font-size:13px;color:var(--grafite);text-decoration:none;line-height:1;transition:opacity .12s;flex-shrink:0;opacity:.4}
.cs-link-arrow:hover{opacity:.9}
.cs-item-title{font-size:13px;font-weight:700;line-height:1.2;color:var(--preto)}
.cs-item-sub{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.cs-badge-wrap{position:relative;flex-shrink:0}
.cs-badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:999px;border:1px solid var(--cinza);font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;cursor:default}
.cs-badge-tooltip{position:absolute;top:calc(100% + 6px);right:0;min-width:220px;background:var(--branco);border:1px solid var(--cinza);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:500;overflow:hidden}
.cs-badge-tooltip-hd{font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#aaa;padding:6px 10px;border-bottom:1px solid var(--cinza2)}
.cs-badge-tooltip-row{display:flex;justify-content:space-between;gap:8px;padding:5px 10px;border-bottom:1px solid var(--cinza2);font-size:10px}
.cs-badge-tooltip-row:last-child{border-bottom:none}
.cs-badge-tooltip-empty{padding:10px;font-size:10px;color:#bbb;text-align:center}
.cs-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cs-meta-box{background:var(--off);border:1px solid var(--cinza2);border-radius:6px;padding:7px 9px;position:relative}
.cs-meta-label{font-size:8px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:#999;margin-bottom:5px}
.cs-secret-row{display:flex;align-items:center;gap:6px}
.cs-secret-value{font-size:11px;color:var(--preto);font-family:var(--fm);word-break:break-all;min-width:0;flex:1;letter-spacing:.03em}
.cs-copy-box-btn{position:absolute;top:6px;right:7px;background:none;border:none;padding:0;font-size:13px;color:#ccc;cursor:pointer;line-height:1;transition:color .12s;display:none;align-items:center;justify-content:center}
.cs-copy-box-btn:hover{color:var(--preto)}
.cs-icon-btn{width:24px;height:24px;border-radius:5px;border:1px solid var(--cinza);background:var(--branco);cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .12s}
.cs-icon-btn:hover{border-color:var(--preto)}
.cs-copy{font-size:10px;color:#888;line-height:1.5;margin-top:3px}
.cs-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;justify-content:flex-end}
.cs-btn-icon{width:26px;height:26px;border-radius:6px;border:1px solid var(--cinza);background:var(--branco);cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;color:#888;transition:all .12s;font-family:var(--f)}
.cs-btn-icon:hover{border-color:var(--preto);color:var(--preto)}
.cs-btn-icon.danger:hover{border-color:var(--tc);color:var(--tc);background:var(--tc-bg)}
.cs-form{background:var(--off);border:1px solid var(--cinza);border-radius:10px;padding:20px;margin-bottom:16px}
.cs-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.cs-form-grid .full{grid-column:1/-1}
.cs-form-grid label{display:block;font-size:8px;font-weight:700;letter-spacing:.65px;text-transform:uppercase;color:#999;margin-bottom:5px}
.cs-form-grid input,.cs-form-grid textarea,.cs-form-grid select{width:100%;padding:9px 10px;border:1px solid var(--cinza);border-radius:6px;font-family:var(--f);font-size:11px;outline:none;box-sizing:border-box;color:var(--preto);background:var(--branco)}
.cs-form-grid input:focus,.cs-form-grid textarea:focus,.cs-form-grid select:focus{border-color:var(--preto)}
.cs-form-btns{display:flex;gap:8px;justify-content:flex-end}
.cs-form-help{font-size:10px;color:#888;line-height:1.5;margin-top:-4px;margin-bottom:8px}
@media(max-width:720px){.cs-meta-grid,.cs-form-grid{grid-template-columns:1fr}}
/* cadastros e senhas — dark mode */
[data-theme="dark"] .cs-item{background:var(--branco);border-color:var(--cinza)}
[data-theme="dark"] .cs-item-sub{color:#888}
[data-theme="dark"] .cs-meta-box{background:var(--off);border-color:var(--cinza)}
[data-theme="dark"] .cs-meta-label{color:#777}
[data-theme="dark"] .cs-secret-value{color:var(--grafite)}
[data-theme="dark"] .cs-copy{color:#888}
[data-theme="dark"] .cs-icon-btn{background:var(--off);border-color:var(--cinza);color:var(--grafite)}
[data-theme="dark"] .cs-icon-btn:hover{border-color:#888}
[data-theme="dark"] .cs-btn-icon{background:var(--off);border-color:var(--cinza);color:#888}
[data-theme="dark"] .cs-btn-icon:hover{border-color:#888;color:var(--grafite)}
[data-theme="dark"] .cs-btn-icon.danger:hover{border-color:var(--terracota);color:var(--terracota);background:var(--tc-bg)}
[data-theme="dark"] .cs-form{background:var(--off);border-color:var(--cinza)}
[data-theme="dark"] .cs-form-grid input,[data-theme="dark"] .cs-form-grid textarea,[data-theme="dark"] .cs-form-grid select{background:var(--branco);border-color:var(--cinza);color:var(--grafite);color-scheme:dark}
[data-theme="dark"] .cs-badge-tooltip{background:var(--branco);border-color:var(--cinza)}
/* matriz plano gente — dark mode */
[data-theme="dark"] .matriz-sec-main{background:var(--branco) !important;border-color:var(--cinza) !important}
[data-theme="dark"] .matriz-grid-wrap{background:var(--branco) !important;border-color:var(--cinza) !important}

const CADASTROS_SENHAS_SETUP_SQL = `begin;

create schema if not exists private;

grant usage on schema private to authenticated;

create or replace function private.current_exp_role()
returns text
language sql
stable
security definer
set search_path = public
as $$
  select coalesce(
    (
      select u.role::text
      from public.usuarios u
      where u.auth_id = auth.uid()
      limit 1
    ),
    'anonymous'
  );
$$;

create or replace function private.is_authenticated_user()
returns boolean
language sql
stable
security definer
set search_path = public
as $$
  select auth.role() = 'authenticated' and auth.uid() is not null;
$$;

create or replace function private.is_socio()
returns boolean
language sql
stable
security definer
set search_path = public
as $$
  select private.current_exp_role() in ('socio', 'socio_admin');
$$;

create or replace function private.can_edit_apoio()
returns boolean
language sql
stable
security definer
set search_path = public
as $$
  select private.is_socio();
$$;

create or replace function private.current_exp_user_name()
returns text
language sql
stable
security definer
set search_path = public
as $$
  select u.nome
  from public.usuarios u
  where u.auth_id = auth.uid()
  limit 1
$$;

create or replace function private.is_apoio_admin()
returns boolean
language sql
stable
security definer
set search_path = public
as $$
  select exists (
    select 1
    from public.usuarios u
    where u.auth_id = auth.uid()
      and coalesce(lower(u.role), '') = 'socio_admin'
  );
$$;

create or replace function private.cadastro_access_rank(p_nivel text)
returns integer
language sql
stable
security definer
set search_path = public
as $$
  select case coalesce(lower(p_nivel), 'socio')
    when 'colaborador' then 1
    when 'socio' then 2
    when 'administrador' then 3
    else 99
  end;
$$;

create or replace function private.current_cadastro_access_rank()
returns integer
language sql
stable
security definer
set search_path = public
as $$
  select case
    when private.is_apoio_admin() then 3
    when private.is_socio() then 2
    when private.is_authenticated_user() then 1
    else 0
  end;
$$;

create or replace function private.can_view_cadastro_plataforma(p_nivel text)
returns boolean
language sql
stable
security definer
set search_path = public
as $$
  select private.current_cadastro_access_rank() >= private.cadastro_access_rank(p_nivel);
$$;

create or replace function private.can_view_cadastro_plataforma_by_id(p_plataforma_id uuid)
returns boolean
language sql
stable
security definer
set search_path = public
as $$
  select exists (
    select 1
    from public.cadastros_plataformas p
    where p.id = p_plataforma_id
      and private.can_view_cadastro_plataforma(p.nivel_acesso)
  );
$$;

create or replace function public.cs_reveal_credential(p_plataforma_id uuid)
returns table(login text, senha text)
language plpgsql
security definer
set search_path = public
as $$
declare
  v_nivel text;
begin
  select nivel_acesso
    into v_nivel
  from public.cadastros_plataformas
  where id = p_plataforma_id;

  if v_nivel is null then
    raise exception 'Plataforma nao encontrada.';
  end if;

  if not private.can_view_cadastro_plataforma(v_nivel) then
    raise exception 'Voce nao tem permissao para visualizar esta credencial.';
  end if;

  return query
  select s.login, s.senha
  from public.cadastros_plataformas_secret s
  where s.plataforma_id = p_plataforma_id;
end;
$$;

create or replace function public.cs_upsert_credential(
  p_plataforma_id uuid,
  p_login text,
  p_senha text
)
returns void
language plpgsql
security definer
set search_path = public
as $$
begin
  if not private.can_edit_apoio() then
    raise exception 'Voce nao tem permissao para salvar esta credencial.';
  end if;

  insert into public.cadastros_plataformas_secret (
    plataforma_id,
    login,
    senha,
    updated_at
  )
  values (
    p_plataforma_id,
    nullif(trim(coalesce(p_login, '')), ''),
    nullif(trim(coalesce(p_senha, '')), ''),
    now()
  )
  on conflict (plataforma_id) do update
  set
    login = excluded.login,
    senha = excluded.senha,
    updated_at = now();
end;
$$;

create or replace function public.cs_save_plataforma(
  p_id uuid,
  p_numero integer,
  p_nome text,
  p_nivel_acesso text,
  p_uso text,
  p_clientes text,
  p_cofre_link text,
  p_observacoes text,
  p_login text,
  p_senha text
)
returns uuid
language plpgsql
security definer
set search_path = public
as $$
declare
  v_id uuid;
  v_nivel text;
  v_login text;
  v_senha text;
  v_login_final text;
  v_senha_final text;
begin
  if not private.can_edit_apoio() then
    raise exception 'Voce nao tem permissao para salvar esta plataforma.';
  end if;

  if nullif(trim(coalesce(p_nome, '')), '') is null then
    raise exception 'Informe o nome da plataforma.';
  end if;

  v_nivel := case coalesce(lower(trim(p_nivel_acesso)), 'socio')
    when 'colaborador' then 'colaborador'
    when 'administrador' then 'administrador'
    else 'socio'
  end;

  if p_id is null then
    insert into public.cadastros_plataformas (
      numero,
      nome,
      nivel_acesso,
      uso,
      clientes,
      cofre_link,
      observacoes
    )
    values (
      greatest(coalesce(p_numero, 1), 1),
      trim(p_nome),
      v_nivel,
      nullif(trim(coalesce(p_uso, '')), ''),
      nullif(trim(coalesce(p_clientes, '')), ''),
      nullif(trim(coalesce(p_cofre_link, '')), ''),
      nullif(trim(coalesce(p_observacoes, '')), '')
    )
    returning id into v_id;
  else
    update public.cadastros_plataformas
    set
      numero = greatest(coalesce(p_numero, numero, 1), 1),
      nome = trim(p_nome),
      nivel_acesso = v_nivel,
      uso = nullif(trim(coalesce(p_uso, '')), ''),
      clientes = nullif(trim(coalesce(p_clientes, '')), ''),
      cofre_link = nullif(trim(coalesce(p_cofre_link, '')), ''),
      observacoes = nullif(trim(coalesce(p_observacoes, '')), ''),
      updated_at = now()
    where id = p_id
    returning id into v_id;

    if v_id is null then
      raise exception 'Plataforma nao encontrada.';
    end if;
  end if;

  if nullif(trim(coalesce(p_login, '')), '') is not null
     or nullif(trim(coalesce(p_senha, '')), '') is not null then
    select s.login, s.senha
      into v_login, v_senha
    from public.cadastros_plataformas_secret s
    where s.plataforma_id = v_id;

    v_login_final := coalesce(nullif(trim(coalesce(p_login, '')), ''), v_login);
    v_senha_final := coalesce(nullif(trim(coalesce(p_senha, '')), ''), v_senha);

    insert into public.cadastros_plataformas_secret (
      plataforma_id,
      login,
      senha,
      updated_at
    )
    values (
      v_id,
      v_login_final,
      v_senha_final,
      now()
    )
    on conflict (plataforma_id) do update
    set
      login = excluded.login,
      senha = excluded.senha,
      updated_at = now();
  end if;

  return v_id;
end;
$$;

async function enviarToolFeedback() {
  const tipo = document.getElementById('tool-feedback-type')?.value || 'problema';
  const mensagem = document.getElementById('tool-feedback-message')?.value?.trim();
  const statusEl = document.getElementById('tool-feedback-status');
  if (!mensagem) { if(statusEl) statusEl.textContent = 'Escreva uma mensagem antes de enviar.'; return; }
  if(statusEl) statusEl.textContent = 'Enviando…';
  try {
    const { error } = await sb.from('plataforma_feedback').insert({
      tipo, mensagem, modulo: 'apoio', usuario_id: G.usuario?.id, usuario_nome: G.usuario?.nome
    });
    if (error) throw error;
    if(statusEl) statusEl.textContent = 'Enviado! Obrigado pelo registro.';
    document.getElementById('tool-feedback-message').value = '';
    setTimeout(fecharToolFeedbackPopover, 1800);
  } catch(err) {
    if(statusEl) statusEl.textContent = 'Erro ao enviar: ' + (err.message || 'tente novamente.');
  }
}

async function checkExpRoomStatus() {
  try {
    const { data } = await sb.from('exp_config').select('updated_at,value').eq('key','exp_room_active').maybeSingle();
    const btn = document.getElementById('exp-room-btn');
    if (!btn) return;
    if (data?.updated_at && (Date.now() - new Date(data.updated_at).getTime()) / 60000 <= 30) {
      btn.classList.add('active');
      const mins = Math.floor((Date.now() - new Date(data.updated_at).getTime()) / 60000);
      const quem = (data.value && data.value !== 'true') ? data.value : 'Alguém';
      btn.setAttribute('data-tooltip', `${quem} · ${mins === 0 ? 'agora mesmo' : `há ${mins} min`}`);
    } else {
      btn.classList.remove('active');
      btn.removeAttribute('data-tooltip');
    }
  } catch(e) {}
}

// ── CARREGAR DADOS ──────────────────────────────────────────
async function carregarDados() {
  // Tenta carregar da tabela base_tipo_projeto
  const {data, error} = await sb.from('base_tipo_projeto').select('*').order('area').order('ordem');
  if(error && error.code === '42P01') {
    // Tabelas não existem
    G.tablesOk = false;
    G.tipos = [];
    return;
  }
  G.tablesOk = true;

  if(!data || data.length === 0) {
    // Tabelas existem mas vazias — seed automático
    if(isSocio()) await seedDados();
    else {
      G.tipos = [];
      return;
    }
  } else {
    G.tipos = data;
  }

  // Carrega etapas, entregáveis e checklists
  const [resE, resEnt, resCk] = await Promise.all([
    sb.from('base_etapa').select('*').order('tipo_id').order('ordem'),
    sb.from('base_entregavel').select('*').order('etapa_id').order('ordem'),
    sb.from('base_checklist_item').select('*').order('entregavel_id').order('ordem'),
  ]);
  G.etapas = resE.data || [];
  G.entregaveis = resEnt.data || [];
  G.checklists = resCk.data || [];
}

// ── SEED ────────────────────────────────────────────────────
async function seedDados(mostrarFeedback=false) {
  if(mostrarFeedback){
    document.getElementById('apoio-content').innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:40px;font-size:12px;color:var(--verde)">
        <div class="seed-spinner"></div>
        Carregando dados iniciais de Paisagismo...
      </div>`;
  }

  for(const tipo of [...SEED_PAISAGISMO, ...SEED_URBANISMO]) {
    const {data:t, error:te} = await sb.from('base_tipo_projeto').insert({
      nome:tipo.nome, area:tipo.area, descricao:tipo.descricao, ordem:tipo.ordem
    }).select().single();
    if(te || !t) continue;

    for(const etapa of tipo.etapas) {
      const {data:e, error:ee} = await sb.from('base_etapa').insert({
        tipo_id:t.id, nome:etapa.nome, descricao:etapa.descricao,
        ordem:etapa.ordem, prazo_dias:etapa.prazo_dias, prazo_tipo:etapa.prazo_tipo
      }).select().single();
      if(ee || !e) continue;

      for(const entregavel of etapa.entregaveis) {
        const {data:ent, error:ente} = await sb.from('base_entregavel').insert({
          etapa_id:e.id, nome:entregavel.nome, descricao:entregavel.descricao, ordem:entregavel.ordem
        }).select().single();
        if(ente || !ent) continue;

        if(entregavel.checklist && entregavel.checklist.length > 0) {
          const ckItems = entregavel.checklist.map((texto,i) => ({
            entregavel_id:ent.id, texto, ordem:i+1
          }));
          await sb.from('base_checklist_item').insert(ckItems);
        }
      }
    }
  }

  await carregarDados();
}

// ── RENDER TEMA ─────────────────────────────────────────────
function toggleSbGroup(tema) {
  const submenu = document.getElementById('sb-sub-' + tema);
  const item = document.querySelector('.sb-theme-item[data-tema="' + tema + '"]');
  if(!submenu) { setTema(tema); return; }
  const isOpen = submenu.classList.contains('open');
  document.querySelectorAll('.sb-submenu').forEach(el => {
    if(el.id !== 'sb-sub-' + tema) el.classList.remove('open');
  });
  document.querySelectorAll('.sb-theme-item').forEach(el => {
    if(el.dataset.tema !== tema) el.classList.remove('open');
  });
  if(isOpen) {
    submenu.classList.remove('open');
    if(item) item.classList.remove('open');
  } else {
    submenu.classList.add('open');
    if(item) item.classList.add('open');
    setTema(tema);
  }
}

function setSubtema(tema, sub) {
  G.temaAtivo = tema;
  G.subtemaCustom = null;
  document.querySelectorAll('.sb-submenu').forEach(el => {
    el.classList.toggle('open', el.id === 'sb-sub-' + tema);
  });
  document.querySelectorAll('.sb-theme-item').forEach(el => {
    if(el.dataset.tema) el.classList.toggle('open', el.dataset.tema === tema);
  });
  const submenu = document.getElementById('sb-sub-' + tema);
  const item = document.querySelector('.sb-theme-item[data-tema="' + tema + '"]');
  if(submenu && !submenu.classList.contains('open')) {
    submenu.classList.add('open');
    if(item) item.classList.add('open');
  }
  if(tema === 'organizacao') { G.subtemaOrg = sub; }
  else if(tema === 'projetos') { G.areaAtiva = sub; G.tipoAtivoId = null; }
  else if(tema === 'apoio') { G.subtemaConhecimento = sub; }
  syncSidebarFull();
  renderTema();
}

function syncSidebarFull() {
  document.querySelectorAll('.sb-theme-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tema === G.temaAtivo);
  });
  // Sync sub-items
  document.querySelectorAll('.sb-sub-item').forEach(el => {
    const t = el.dataset.tema;
    const s = el.dataset.sub;
    let isActive = false;
    if(t === G.temaAtivo) {
      if(t === 'organizacao') isActive = s === G.subtemaOrg;
      else if(t === 'projetos') isActive = s === G.areaAtiva;
      else if(t === 'apoio') isActive = s === G.subtemaConhecimento;
    }
    el.classList.toggle('active', isActive);
  });
}

function setTema(tema) {
  G.temaAtivo = tema;
  G.subtemaCustom = null;
  document.querySelectorAll('.sb-submenu').forEach(el => {
    el.classList.remove('open');
  });
  document.querySelectorAll('.sb-theme-item').forEach(el => {
    el.classList.remove('open');
  });
  syncSidebarFull();
  renderTema();
}

function renderTema() {
  const el = document.getElementById('apoio-content');
  if(G.temaAtivo === 'projetos') renderProjetos(el);
  else if(G.temaAtivo === 'organizacao') renderOrganizacao(el);
  else if(G.temaAtivo === 'cultura') renderCultura(el);
  else if(G.temaAtivo === 'plano-gente') renderPlanoPessoas(el);
  else if(G.temaAtivo === 'vegetacao') renderVegetacao(el);

}

function getMatrizPlanoData() {
  return G.matrizPlanoCache?.secoes?.length ? G.matrizPlanoCache : MATRIZ_PLANO_GENTE_DADOS;
}

function getMatrizPlanoSecao(secaoKey) {
  const matrizData = getMatrizPlanoData();
  return matrizData.secoes.find(secao => secao.key === secaoKey) || matrizData.secoes[0];
}

function getSenioridadeLabel(colunaKey) {
  const labels = {
    E1: 'Estagiario 1',
    E2: 'Estagiario 2',
    J1: 'Junior 1',
    J2: 'Junior 2',
    J3: 'Junior 3',
    P1: 'Pleno 1',
    P2: 'Pleno 2',
    P3: 'Pleno 3',
    S1: 'Senior 1',
    S2: 'Senior 2',
    S3: 'Senior 3'
  };
  return labels[colunaKey] || colunaKey;
}

function getMatrizProximoPasso(colunaKey) {
  const idx = PLANO_GENTE_SENIORIDADES.findIndex(item => item.key === colunaKey);
  if(idx === -1 || idx === PLANO_GENTE_SENIORIDADES.length - 1) return null;
  return PLANO_GENTE_SENIORIDADES[idx + 1];
}

function getMatrizColumnState(colunaKey) {
  const focus = G.matrizPlanoFocoColuna;
  if(focus) {
    if(colunaKey === focus) return 'focus';
    if(getMatrizProximoPasso(focus)?.key === colunaKey) return 'next';
    return 'dim';
  }
  return 'default';
}

function renderMatrizStatusTexto() {
  const focus = G.matrizPlanoFocoColuna;
  const hover = G.matrizPlanoHoverColuna;
  if(focus) {
    const next = getMatrizProximoPasso(focus);
    if(next) {
      return `Foco atual: ${focus} · ${getSenioridadeLabel(focus)} | Próximo passo: ${next.key} · ${next.label}`;
    }
    return `Foco atual: ${focus} · ${getSenioridadeLabel(focus)} | Última faixa da trilha`;
  }
  if(hover) {
    return `Faixa em leitura: ${hover} · ${getSenioridadeLabel(hover)}`;
  }
  return 'Passe o mouse sobre uma faixa para ver a senioridade correspondente.';
}

function renderMatrizStatusTextoV2() {
  const focus = G.matrizPlanoFocoColuna;
  if(focus) {
    const next = getMatrizProximoPasso(focus);
    if(next) {
      return `Foco atual: ${focus} - ${getSenioridadeLabel(focus)} | Proximo passo: ${next.key} - ${getSenioridadeLabel(next.key)}`;
    }
    return `Foco atual: ${focus} - ${getSenioridadeLabel(focus)} | Ultima faixa da trilha`;
  }
  return 'Clique no topo de uma coluna para focar a senioridade e visualizar o proximo passo.';
}

function renderMatrizTabs() {
  return getMatrizPlanoData().secoes.map(secao => `
    <button
      class="matriz-tab${G.matrizPlanoSecaoAtiva === secao.key ? ' active' : ''}"
      onclick="setMatrizPlanoSecao('${secao.key}')">
      ${secao.titulo}
    </button>
  `).join('');
}

function getMatrizValorClass(valor) {
  return `n${Number(valor) || 0}`;
}

function renderMatrizTabela(secao) {
  return `
    <div class="matriz-grid-wrap">
      <table class="matriz-grid">
        <thead>
          <tr>
            <th class="matriz-grid-label-head">Responsabilidade</th>
            ${PLANO_GENTE_SENIORIDADES.map(item => {
              const state = getMatrizColumnState(item.key);
              return `
                <th class="matriz-grid-head ${state}">
                  <button
                    class="matriz-grid-head-btn"
                    title="${item.key} · ${item.label}"
                    type="button"
                    onclick="toggleMatrizFoco('${item.key}')">
                    ${item.key}
                  </button>
                </th>
              `;
            }).join('')}
          </tr>
        </thead>
        <tbody>
          ${secao.itens.map(item => `
            <tr>
              <td class="matriz-grid-label">${item.texto}</td>
              ${PLANO_GENTE_SENIORIDADES.map(senioridade => {
                const state = getMatrizColumnState(senioridade.key);
                const valor = Number(item.valores?.[senioridade.key] ?? 0);
                return `
                  <td
                    class="matriz-grid-cell ${getMatrizValorClass(valor)} ${state}"
                    title="${senioridade.key} · ${getSenioridadeLabel(senioridade.key)} · nível ${valor}"
                    onclick="toggleMatrizFoco('${senioridade.key}')">
                    ${valor}
                  </td>
                `;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderMatrizSenioridadesStrip() {
  return PLANO_GENTE_SENIORIDADES.map(item => {
    const state = getMatrizColumnState(item.key);
    return `
      <button
        class="matriz-col-chip ${state}"
        title="${item.key} · ${item.label}"
        onmouseenter="setMatrizHover('${item.key}')"
        onmouseleave="clearMatrizHover()"
        onclick="toggleMatrizFoco('${item.key}')">

  }).join('');
}

window.toggleMatrizFoco = function(colunaKey) {
