<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXP Â· Base de Conhecimento</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.secao-shell{
  background:#fff;
  border:1px solid var(--cinza);
  padding:18px 20px;
  margin-bottom:14px;
}

.secao-shell-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
}

.secao-shell-title{
  font-size:13px;
  font-weight:700;
  letter-spacing:-.1px;
}

.secao-shell-sub{
  font-size:10px;
  color:#888;
  margin-top:3px;
}

.secao-shell-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

.secao-shell-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:9px;
  font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:#999;
}

.knowledge-callout{
  border:1px dashed var(--cinza);
  background:#fbfaf7;
  padding:12px 14px;
  margin-bottom:14px;
}

.knowledge-callout-title{
  font-size:10px;
  font-weight:700;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:#777;
  margin-bottom:4px;
}

.knowledge-callout-text{
  font-size:11px;
  color:#666;
  line-height:1.7;
}

.rich-body{
  font-size:12px;
  color:#444;
  line-height:1.8;
}

.rich-body h3{
  font-size:10px;
  font-weight:700;
  letter-spacing:.7px;
  text-transform:uppercase;
  color:#777;
  margin:16px 0 6px;
}

.rich-body p{
  margin:0 0 10px;
}

.rich-body ul{
  margin:0 0 12px 18px;
  padding:0;
}

.rich-body li{
  margin-bottom:4px;
}

.knowledge-empty{
  border:1px dashed var(--cinza);
  background:var(--off);
  padding:18px;
  font-size:11px;
  color:#999;
}

.knowledge-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.knowledge-mini-card{
  background:#fff;
  border:1px solid var(--cinza);
  padding:14px;
}

.knowledge-mini-card-title{
  font-size:11px;
  font-weight:700;
  margin-bottom:6px;
}

.knowledge-mini-card-text{
  font-size:11px;
  color:#666;
  line-height:1.7;
}

.knowledge-subtabs{
  display:flex;
  gap:0;
  border-bottom:1px solid var(--cinza);
  margin-bottom:18px;
  overflow:auto;
}

.knowledge-subtab{
  padding:8px 14px;
  font-size:9px;
  font-weight:700;
  letter-spacing:.55px;
  text-transform:uppercase;
  color:#999;
  cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;
}

.knowledge-subtab:hover{
  color:var(--preto);
}

.knowledge-subtab.active{
  color:var(--preto);
  border-bottom-color:var(--verde);
}

.norma-tabs{
  display:flex;
  gap:8px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.norma-tab{
  border:1px solid var(--cinza);
  padding:6px 10px;
  font-size:10px;
  font-weight:600;
  cursor:pointer;
  background:#fff;
  color:#777;
}

.norma-tab.active{
  border-color:var(--preto);
  color:var(--preto);
  background:var(--off);
}

.knowledge-meta{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.knowledge-meta-item{
  border:1px solid var(--cinza2);
  background:var(--off);
  padding:5px 8px;
  font-size:10px;
  color:#777;
}

.veg-toolbar{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.veg-toolbar-main{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.veg-count{
  font-size:10px;
  color:#777;
}

.veg-filter-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.veg-filter label,
.knowledge-form-grid label{
  display:block;
  font-size:8px;
  font-weight:700;
  letter-spacing:.65px;
  text-transform:uppercase;
  color:#999;
  margin-bottom:5px;
}

.veg-filter input,
.veg-filter select,
.knowledge-form-grid input,
.knowledge-form-grid select,
.knowledge-form-grid textarea{
  width:100%;
  padding:8px 10px;
  border:1px solid var(--cinza);
  background:#fff;
  font-family:var(--f);
  font-size:11px;
  color:var(--preto);
  outline:none;
}

.veg-filter input:focus,
.veg-filter select:focus,
.knowledge-form-grid input:focus,
.knowledge-form-grid select:focus,
.knowledge-form-grid textarea:focus{
  border-color:var(--preto);
}

.knowledge-form-grid textarea{
  min-height:110px;
  resize:vertical;
}

.knowledge-form-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

.knowledge-form-grid .full{
  grid-column:1 / -1;
}

.veg-table-wrap{
  border:1px solid var(--cinza);
  background:#fff;
  overflow:auto;
}

.veg-table{
  width:100%;
  border-collapse:collapse;
  min-width:980px;
}

.veg-table th{
  position:sticky;
  top:0;
  background:#faf9f6;
  z-index:1;
  font-size:8px;
  font-weight:700;
  letter-spacing:.7px;
  text-transform:uppercase;
  color:#888;
  text-align:left;
  padding:10px 12px;
  border-bottom:1px solid var(--cinza);
}

.veg-table td{
  padding:10px 12px;
  border-bottom:1px solid var(--cinza2);
  font-size:11px;
  vertical-align:top;
}

.veg-table tr:last-child td{
  border-bottom:none;
}

.veg-main-name{
  font-weight:700;
  color:var(--preto);
}

.veg-sci-name{
  display:block;
  font-size:10px;
  color:#888;
  margin-top:2px;
  font-style:italic;
}

.veg-pills{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.veg-pill{
  display:inline-flex;
  align-items:center;
  padding:3px 7px;
  border:1px solid var(--cinza2);
  background:var(--off);
  font-size:9px;
  color:#777;
}

.veg-actions{
  display:flex;
  gap:6px;
  justify-content:flex-end;
}

.veg-note{
  font-size:10px;
  color:#888;
}

#modal-edit[data-size="medium"] .modal-box{
  width:min(720px,90vw);
}

#modal-edit[data-size="wide"] .modal-box{
  width:min(1040px,94vw);
}

@media (max-width: 900px){
  .knowledge-form-grid{
    grid-template-columns:1fr;
  }

  .knowledge-form-grid .full{
    grid-column:auto;
  }
}
</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --preto:#111110;--off:#F7F6F3;--cinza:#D0CFC9;--cinza2:#ECEAE4;--branco:#fff;
  --verde:#1D6A4A;--verde-l:#2D9E6B;--verde-bg:#EAF5EE;
  --az:#1D4FA0;--az-bg:#EAF0FB;
  --am:#C4831A;--am-bg:#FBF3E8;
  --tc:#B84C3A;--tc-bg:#FBF0EE;
  --roxo:#6B4FA0;
  --urb:#5280CA;--urb-bg:#ECF1FA;
  --pai-inc:#2A5239;--pai-hor:#45865D;--pai-res:#6AA87D;--pai-urb:#9CC4A8;
  --pai-bg:#EAF5EE;
  --consul:#C36247;--consul-bg:#FAF0EE;
  --esp:#D19931;--esp-bg:#FAF4E8;
  --f:'Raleway',sans-serif;--fm:'DM Mono',monospace;
}
body{font-family:var(--f);background:var(--off);color:var(--preto);font-size:13px;line-height:1.5;font-weight:300}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--off);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loading-brand{font-size:22px;font-weight:700;letter-spacing:6px}
.loading-dot{display:flex;gap:6px}
.loading-dot span{width:6px;height:6px;border-radius:50%;background:var(--cinza);animation:pulse 1.2s ease-in-out infinite}
.loading-dot span:nth-child(2){animation-delay:.2s}
.loading-dot span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2}40%{opacity:1}}

body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--cinza2) 1px,transparent 1px),linear-gradient(90deg,var(--cinza2) 1px,transparent 1px);background-size:48px 48px;opacity:.5;pointer-events:none}

/* NAV */
.nav{display:flex;align-items:center;background:#fff;border-bottom:1px solid var(--cinza);padding:0 16px;position:sticky;top:0;z-index:100;height:46px;gap:0}
.nav-brand{font-size:14px;font-weight:700;letter-spacing:5px;margin-right:16px}
.nav-sep{width:1px;height:14px;background:var(--cinza);margin-right:16px}
.nav-lbl{font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#999}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-brand{text-decoration:none;color:inherit}
.nav-brand:hover{opacity:.7}
.nav-mod-wrap{position:relative;margin-right:20px}
.nav-lbl-btn{background:none;border:none;font-family:var(--f);font-size:9px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#999;cursor:pointer;padding:0;display:flex;align-items:center;gap:4px}
.nav-lbl-btn:hover{color:var(--preto)}
.nav-dropdown{display:none;position:absolute;top:calc(100% + 2px);left:0;background:#fff;border:1px solid var(--cinza);min-width:190px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.nav-dropdown.open{display:block}
.nav-dropdown a{display:block;padding:7px 14px;font-size:11px;font-weight:500;color:var(--preto);text-decoration:none;white-space:nowrap}
.nav-dropdown a:hover{background:var(--off)}
.nav-dropdown a.nd-active{font-weight:700;pointer-events:none;color:var(--tc)}
.nav-dropdown a.nd-disabled{opacity:.4;pointer-events:none}
.nd-sep{height:1px;background:var(--cinza);margin:4px 0}
.nd-lbl{padding:6px 14px 2px;font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#bbb}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0;transition:background .3s}
.conn-dot.online{background:#22c55e}
.conn-dot.offline{background:var(--tc)}
.exp-room-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:1px solid var(--verde);background:var(--verde-bg);color:var(--verde);text-decoration:none;transition:all .12s;flex-shrink:0}
.exp-room-btn:hover{background:var(--verde)}
.exp-room-dot{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse-dot 2s ease-in-out infinite}
.exp-room-btn:hover .exp-room-dot{background:#fff}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.user-pill-wrap{position:relative}
.user-pill{display:flex;align-items:center;gap:7px;padding:4px 10px;border:1px solid var(--cinza);background:#fff;font-size:11px;font-weight:500;cursor:pointer}
.user-pill:hover{border-color:var(--preto)}
.avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.user-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--cinza);min-width:150px;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.user-dropdown.open{display:block}
.user-dropdown button{display:block;width:100%;padding:9px 14px;background:none;border:none;font-family:var(--f);font-size:11px;font-weight:500;color:var(--tc);text-align:left;cursor:pointer}
.user-dropdown button:hover{background:var(--off)}

/* LAYOUT */
.apoio-layout{display:flex;height:calc(100vh - 46px);overflow:hidden}

/* SIDEBAR */
.apoio-sidebar{width:220px;flex-shrink:0;background:#fff;border-right:1px solid var(--cinza);display:flex;flex-direction:column;overflow:hidden}
.sb-search{padding:10px 12px;border-bottom:1px solid var(--cinza)}
.sb-search input{width:100%;padding:6px 10px;border:1px solid var(--cinza);background:var(--off);font-family:var(--f);font-size:11px;font-weight:300;color:var(--preto);outline:none}
.sb-search input:focus{border-color:var(--preto)}
.sb-search input::placeholder{color:#bbb}
.sb-section-lbl{padding:10px 12px 4px;font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#bbb}
.sb-theme-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:400;color:#666;transition:all .12s;border-left:3px solid transparent;user-select:none}
.sb-theme-item:hover{background:var(--off);color:var(--preto)}
.sb-theme-item.active{background:var(--off);color:var(--preto);font-weight:600;border-left-color:var(--verde)}
.sb-icon{font-size:10px;flex-shrink:0;opacity:.7}

/* CONTENT */
.apoio-content{flex:1;overflow-y:auto;padding:20px 24px;position:relative}

/* AREA TABS */
.area-tabs{display:flex;gap:0;border-bottom:1px solid var(--cinza);margin-bottom:18px}
.area-tab{padding:7px 14px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;user-select:none}
.area-tab:hover{color:var(--preto)}
.area-tab.active{color:var(--preto)}
.area-tab.active[data-area="paisagismo"]{border-bottom-color:var(--pai-hor)}
.area-tab.active[data-area="urbanismo"]{border-bottom-color:var(--urb)}
.area-tab.active[data-area="consultorias"]{border-bottom-color:var(--consul)}
.area-tab.active[data-area="especiais"]{border-bottom-color:var(--esp)}

/* CONTENT HEADER */
.content-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.content-hdr-left{}
.content-title{font-size:14px;font-weight:700;letter-spacing:-.2px;margin-bottom:2px}
.content-sub{font-size:11px;color:#999}
.content-hdr-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* TIPO GRID */
.tipos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

/* TIPO CARD */
.tipo-card{background:#fff;border:1px solid var(--cinza);position:relative}
.tipo-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--pai-hor)}
.tipo-card-hdr{padding:10px 14px 10px 17px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .12s}
.tipo-card-hdr:hover{background:var(--off)}
.tipo-card-nome{font-size:11px;font-weight:700;flex:1;letter-spacing:.1px}
.tipo-card-chevron{font-size:10px;color:#bbb;transition:transform .2s;flex-shrink:0}
.tipo-card.expanded .tipo-card-chevron{transform:rotate(90deg)}

/* TIPO BODY */
.tipo-body{display:none;border-top:1px solid var(--cinza2)}
.tipo-card.expanded .tipo-body{display:block}

/* TIPO DESCRICAO */
.tipo-descricao-wrap{padding:12px 14px 12px 17px;border-bottom:1px solid var(--cinza2);position:relative}
.tipo-descricao-wrap:hover .edit-trigger{opacity:1}
.tipo-descricao-txt{font-size:12px;line-height:1.65;color:#555}
.edit-trigger{position:absolute;top:8px;right:10px;opacity:0;transition:opacity .12s}
.edit-btn{background:#fff;border:1px solid var(--cinza);padding:3px 7px;cursor:pointer;font-size:10px;color:#888;font-family:var(--f);transition:all .1s;display:inline-flex;align-items:center;gap:3px}
.edit-btn:hover{border-color:var(--preto);color:var(--preto)}

/* ETAPAS LISTA */
.etapas-lista{padding:10px 14px 14px 17px;display:flex;flex-direction:column;gap:4px}
.etapas-lista-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.etapas-lista-label{font-size:8px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:#bbb}
.recolher-btn{font-size:8px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#ccc;background:none;border:none;cursor:pointer;padding:0;transition:color .1s;font-family:var(--f)}
.recolher-btn:hover{color:#888}

/* ETAPA ROW */
.etapa-row{border:1px solid var(--cinza2);background:var(--off)}
.etapa-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;user-select:none;transition:background .1s}
.etapa-hdr:hover{background:#ece9e3}
.etapa-num{font-family:var(--fm);font-size:9px;color:#bbb;width:14px;flex-shrink:0;text-align:right}
.etapa-nome{font-size:11px;font-weight:600;flex:1}
.etapa-prazo{font-family:var(--fm);font-size:9px;color:#bbb;white-space:nowrap}
.etapa-chevron{font-size:9px;color:#ccc;transition:transform .2s;flex-shrink:0;margin-left:2px}
.etapa-row.expanded .etapa-chevron{transform:rotate(90deg)}
.etapa-body{display:none;border-top:1px solid var(--cinza2);padding:10px 10px 12px 32px}
.etapa-row.expanded .etapa-body{display:block}

/* ETAPA DESCRICAO */
.etapa-descricao-wrap{position:relative;margin-bottom:10px}
.etapa-descricao-wrap:hover .edit-trigger{opacity:1}
.etapa-descricao-txt{font-size:11px;line-height:1.65;color:#555}

/* ENTREGAVEIS */
.entregaveis-label{font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#ccc;margin-bottom:5px}
.entregaveis-lista{display:flex;flex-direction:column;gap:3px}

/* ENTREGAVEL ROW */
.entregavel-row{border-left:2px solid var(--cinza2)}
.entregavel-hdr{display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer;user-select:none;transition:background .1s}
.entregavel-hdr:hover{background:#ece9e3}
.entregavel-nome{font-size:11px;font-weight:500;flex:1}
.entregavel-chevron{font-size:9px;color:#ccc;transition:transform .2s;flex-shrink:0}
.entregavel-row.expanded .entregavel-chevron{transform:rotate(90deg)}
.entregavel-body{display:none;padding:6px 8px 10px 18px}
.entregavel-row.expanded .entregavel-body{display:block}

/* ENTREGAVEL DESCRICAO */
.entregavel-descricao-wrap{position:relative;margin-bottom:8px}
.entregavel-descricao-wrap:hover .edit-trigger{opacity:1}
.entregavel-descricao-txt{font-size:11px;line-height:1.65;color:#555}

/* CHECKLIST */
.checklist-label{font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#ccc;margin-bottom:5px}
.checklist-lista{display:flex;flex-direction:column;gap:3px}
.checklist-item{display:flex;align-items:flex-start;gap:6px;font-size:11px;line-height:1.5;color:#555}
.checklist-dot{width:4px;height:4px;border-radius:50%;background:var(--cinza);margin-top:6px;flex-shrink:0}
.checklist-vazio{font-size:10px;color:#bbb;font-style:italic}

/* INLINE EDIT */
.editando-area{margin-top:4px}
.editando-textarea{width:100%;padding:8px;border:1px solid var(--am);background:#fff;font-family:var(--f);font-size:11px;line-height:1.6;color:var(--preto);font-weight:300;resize:vertical;outline:none;min-height:80px}
.editando-actions{display:flex;gap:6px;margin-top:6px;align-items:center}
.editando-hint{font-size:9px;color:#bbb;margin-left:auto}

/* PRAZO EDITAR */
.prazo-edit-wrap{display:inline-flex;align-items:center;gap:4px;margin-left:4px}
.prazo-input{width:38px;padding:1px 5px;border:1px solid var(--cinza);font-family:var(--fm);font-size:9px;text-align:center;outline:none;background:#fff}
.prazo-input:focus{border-color:var(--am)}
.prazo-tipo-select{padding:1px 4px;border:1px solid var(--cinza);font-family:var(--f);font-size:9px;outline:none;background:#fff}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-family:var(--f);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:1px solid var(--cinza);background:#fff;color:#888;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--preto);color:var(--preto)}
.btn.verde{background:var(--verde);border-color:var(--verde);color:#fff}
.btn.verde:hover{background:var(--verde-l);border-color:var(--verde-l)}
.btn.sm{padding:3px 8px;font-size:8px}
.btn.tc{background:var(--tc);border-color:var(--tc);color:#fff}
.btn.am{background:var(--am);border-color:var(--am);color:#fff}

/* BADGE */

// â”€â”€ CARREGAR DADOS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function carregarDados() {
  // Tenta carregar da tabela base_tipo_projeto
  const {data, error} = await sb.from('base_tipo_projeto').select('*').order('area').order('ordem');
  if(error && error.code === '42P01') {
    // Tabelas nÃ£o existem
    G.tablesOk = false;
    G.tipos = [];
    return;
  }
  G.tablesOk = true;

  if(!data || data.length === 0) {
    // Tabelas existem mas vazias â€” seed automÃ¡tico
    if(isSocio()) await seedDados();
    else {
      G.tipos = [];
      return;
    }
  } else {
    G.tipos = data;
  }

  // Carrega etapas, entregÃ¡veis e checklists
  const [resE, resEnt, resCk] = await Promise.all([
    sb.from('base_etapa').select('*').order('tipo_id').order('ordem'),
    sb.from('base_entregavel').select('*').order('etapa_id').order('ordem'),
    sb.from('base_checklist_item').select('*').order('entregavel_id').order('ordem'),
  ]);
  G.etapas = resE.data || [];
  G.entregaveis = resEnt.data || [];
  G.checklists = resCk.data || [];
}

// â”€â”€ SEED â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function seedDados(mostrarFeedback=false) {
  if(mostrarFeedback){
    document.getElementById('apoio-content').innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;padding:40px;font-size:12px;color:var(--verde)">
        <div class="seed-spinner"></div>
        Carregando dados iniciais de Paisagismo...
      </div>`;
  }

  for(const tipo of [...SEED_PAISAGISMO, ...SEED_URBANISMO]) {
    const {data:t, error:te} = await sb.from('base_tipo_projeto').insert({
      nome:tipo.nome, area:tipo.area, descricao:tipo.descricao, ordem:tipo.ordem
    }).select().single();
    if(te || !t) continue;

    for(const etapa of tipo.etapas) {
      const {data:e, error:ee} = await sb.from('base_etapa').insert({
        tipo_id:t.id, nome:etapa.nome, descricao:etapa.descricao,
        ordem:etapa.ordem, prazo_dias:etapa.prazo_dias, prazo_tipo:etapa.prazo_tipo
      }).select().single();
      if(ee || !e) continue;

      for(const entregavel of etapa.entregaveis) {
        const {data:ent, error:ente} = await sb.from('base_entregavel').insert({
          etapa_id:e.id, nome:entregavel.nome, descricao:entregavel.descricao, ordem:entregavel.ordem
        }).select().single();
        if(ente || !ent) continue;

        if(entregavel.checklist && entregavel.checklist.length > 0) {
          const ckItems = entregavel.checklist.map((texto,i) => ({
            entregavel_id:ent.id, texto, ordem:i+1
          }));
          await sb.from('base_checklist_item').insert(ckItems);
        }
      }
    }
  }

  await carregarDados();
}

function renderTema() {

  if(G.temaAtivo === 'projetos') renderProjetos(el);
  else if(G.temaAtivo === 'organizacao') renderOrganizacao(el);

function renderProjetos(el) {
  if(!G.tablesOk) {
    el.innerHTML = renderSetupNotice();
    return;
  }

  const areas = [
    {key:'paisagismo',   label:'Paisagismo'},
    {key:'urbanismo',    label:'Urbanismo'},
    {key:'consultorias', label:'Consultorias'},
    {key:'especiais',    label:'Proj. Especiais'},
  ];

  const tiposArea = G.tipos.filter(t => t.area === G.areaAtiva);

  // Auto-select first if none active or active not in area
  if(!G.tipoAtivoId || !tiposArea.find(t => t.id === G.tipoAtivoId)) {
    G.tipoAtivoId = tiposArea.length > 0 ? tiposArea[0].id : null;
  }

  const tipoAtivo = tiposArea.find(t => t.id === G.tipoAtivoId);

  const menuHtml = tiposArea.length === 0
    ? `<div style="padding:16px 12px;font-size:11px;color:#ccc">Nenhum tipo cadastrado.${isSocio()?`<br><button class="btn sm verde" style="margin-top:8px" onclick="seedManual()">Carregar dados iniciais</button>`:''}</div>`
    : tiposArea.map(t => `<div class="tipo-menu-item${t.id===G.tipoAtivoId?' active':''}" data-tipo-id="${t.id}" data-area="${t.area}" onclick="setTipoAtivo('${t.id}')">${escHtml(t.nome)}</div>`).join('');

  const detailHtml = !tipoAtivo
    ? `<div class="tipo-detail-vazio">Selecione um tipo de projeto ao lado</div>`
    : renderTipoDetalhe(tipoAtivo);

  el.innerHTML = `
    <div class="content-hdr">
      <div class="content-hdr-left">
        <div class="content-title">Base Projetual</div>
        <div class="content-sub">Tipos de projeto Â· etapas Â· entregÃ¡veis Â· checklists de conferÃªncia</div>
      </div>
    </div>
    <div class="area-tabs">
      ${areas.map(a => `<div class="area-tab${G.areaAtiva===a.key?' active':''}" data-area="${a.key}" onclick="setArea('${a.key}')">${a.label}</div>`).join('')}

      <div class="tipo-menu">${menuHtml}</div>
      <div class="tipo-detail" id="tipo-detail-panel">${detailHtml}</div>
    </div>`;
}

}

function toggleEtapa(id) {
  const row = document.getElementById('etapa-'+id);
  if(!row) return;
  if(G.expandedEtapas.has(id)){G.expandedEtapas.delete(id);row.classList.remove('expanded');}
  else{G.expandedEtapas.add(id);row.classList.add('expanded');}
}

function toggleEntregavel(id) {
  const row = document.getElementById('entregavel-'+id);
  if(!row) return;
  if(G.expandedEntregaveis.has(id)){G.expandedEntregaveis.delete(id);row.classList.remove('expanded');}

}

function recolherTudo(tipoId) {
  const etapas = G.etapas.filter(e => e.tipo_id === tipoId);
  etapas.forEach(e => {
    G.expandedEtapas.delete(e.id);
    const row = document.getElementById('etapa-'+e.id);
    if(row) row.classList.remove('expanded');
    const entregaveis = G.entregaveis.filter(ent => ent.etapa_id === e.id);
    entregaveis.forEach(ent => {
      G.expandedEntregaveis.delete(ent.id);
      const eRow = document.getElementById('entregavel-'+ent.id);
      if(eRow) eRow.classList.remove('expanded');
    });
  });
}

// â”€â”€ SALVAR MODAL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function salvarModal() {
  const ctx = G.modalCtx;
  if(!ctx) return;

  const btn = document.getElementById('modal-salvar-btn');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    if(ctx.tipo === 'tipo') {
      const descricao = document.getElementById('me-descricao').value;
      const {error} = await sb.from('base_tipo_projeto').update({
        descricao, atualizado_em:new Date().toISOString(), atualizado_por:G.usuario.id
      }).eq('id', ctx.id);
      if(error) throw error;
      const t = G.tipos.find(t => t.id === ctx.id);
      if(t) t.descricao = descricao;
      const el = document.getElementById('tipo-desc-'+ctx.id);
      if(el) el.textContent = descricao;
    }
    else if(ctx.tipo === 'etapa') {
      const descricao = document.getElementById('me-descricao').value;
      const prazo_dias = parseInt(document.getElementById('me-prazo-dias').value)||7;
      const prazo_tipo = document.getElementById('me-prazo-tipo').value;
      const {error} = await sb.from('base_etapa').update({
        descricao, prazo_dias, prazo_tipo, atualizado_em:new Date().toISOString(), atualizado_por:G.usuario.id
      }).eq('id', ctx.id);
      if(error) throw error;
      const e = G.etapas.find(e => e.id === ctx.id);
      if(e){e.descricao=descricao;e.prazo_dias=prazo_dias;e.prazo_tipo=prazo_tipo;}
      const el = document.getElementById('etapa-desc-'+ctx.id);
      if(el) el.textContent = descricao;
      // Atualiza prazo no header
      const row = document.getElementById('etapa-'+ctx.id);
      if(row){
        const prazoEl = row.querySelector('.etapa-prazo');
        if(prazoEl) prazoEl.textContent = prazo_dias ? `${prazo_dias}d ${prazo_tipo==='corridos'?'corridos':'Ãºteis'}` : '';
      }
    }
    else if(ctx.tipo === 'entregavel') {
      const nome = document.getElementById('me-nome').value;
      const descricao = document.getElementById('me-descricao').value;
      const {error} = await sb.from('base_entregavel').update({
        nome, descricao, atualizado_em:new Date().toISOString(), atualizado_por:G.usuario.id
      }).eq('id', ctx.id);
      if(error) throw error;
      const e = G.entregaveis.find(e => e.id === ctx.id);
      if(e){e.nome=nome;e.descricao=descricao;}
      const el = document.getElementById('entregavel-desc-'+ctx.id);
      if(el) el.textContent = descricao;
      const row = document.getElementById('entregavel-'+ctx.id);
      if(row){const n=row.querySelector('.entregavel-nome');if(n)n.textContent=nome;}
    }
    else if(ctx.tipo === 'add-entregavel') {
      const nome = document.getElementById('me-nome').value.trim();
      const descricao = document.getElementById('me-descricao').value;
      if(!nome){alert('Informe o nome do entregÃ¡vel.');btn.disabled=false;btn.textContent='Salvar';return;}
      const ordemMax = Math.max(0,...G.entregaveis.filter(e=>e.etapa_id===ctx.etapaId).map(e=>e.ordem));
      const {data, error} = await sb.from('base_entregavel').insert({
        etapa_id:ctx.etapaId, nome, descricao, ordem:ordemMax+1
      }).select().single();
      if(error) throw error;
      G.entregaveis.push(data);
      // Re-render etapa body
      const etapa = G.etapas.find(e => e.id === ctx.etapaId);
      if(etapa) {
        const row = document.getElementById('etapa-'+ctx.etapaId);
        if(row){
          const body = row.querySelector('.etapa-body');
          if(body) body.innerHTML = buildEtapaBodyHtml(etapa);
        }
      }
    }
    else if(ctx.tipo === 'checklist') {
      // Deleta todos os itens existentes e re-insere
      await sb.from('base_checklist_item').delete().eq('entregavel_id', ctx.entregavelId);
      const inputs = document.querySelectorAll('#ck-lista .modal-checklist-item input');
      const novos = Array.from(inputs).map((inp,i) => inp.value.trim()).filter(Boolean).map((texto,i) => ({
        entregavel_id:ctx.entregavelId, texto, ordem:i+1
      }));
      if(novos.length > 0) {
        const {data, error} = await sb.from('base_checklist_item').insert(novos).select();
        if(error) throw error;
        G.checklists = G.checklists.filter(c => c.entregavel_id !== ctx.entregavelId);
        G.checklists.push(...(data||[]));
      } else {
        G.checklists = G.checklists.filter(c => c.entregavel_id !== ctx.entregavelId);
      }
      // Re-render entregavel body
      const entregavel = G.entregaveis.find(e => e.id === ctx.entregavelId);
      if(entregavel){
        const row = document.getElementById('entregavel-'+ctx.entregavelId);
        if(row){
          const body = row.querySelector('.entregavel-body');
          if(body) body.innerHTML = buildEntregavelBodyHtml(entregavel);
        }
      }
    }

    fecharModal();
  } catch(err) {
    alert('Erro ao salvar: ' + (err.message||JSON.stringify(err)));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Salvar';
  }
}

  const entHtml = entregaveis.length === 0

let _buscarTimer = null;
function buscarDebounce(query) {
  clearTimeout(_buscarTimer);
  _buscarTimer = setTimeout(() => buscar(query), 220);
}

function buscar(query) {
  const el = document.getElementById('apoio-content');
  if(!query || query.trim().length < 2) {
    renderTema();
    return;
  }
  const q = query.toLowerCase();
  const resultados = [];

  // Busca em tipos
  G.tipos.forEach(t => {
    if(t.nome.toLowerCase().includes(q) || (t.descricao||'').toLowerCase().includes(q)) {
      resultados.push({path:`Projetos Â· ${labelArea(t.area)}`, titulo:t.nome, snippet:snip(t.descricao,q), action:`setTema('projetos');setArea('${t.area}')`});
    }
  });

  // Busca em etapas
  G.etapas.forEach(e => {
    const tipo = G.tipos.find(t => t.id === e.tipo_id);
    if(e.nome.toLowerCase().includes(q) || (e.descricao||'').toLowerCase().includes(q)) {
      resultados.push({path:`${tipo?.nome||''}`, titulo:e.nome, snippet:snip(e.descricao,q), action:`setTema('projetos');setArea('${tipo?.area||'paisagismo'}');setTimeout(()=>{if(!G.expandedTipos.has('${e.tipo_id}')){toggleTipo('${e.tipo_id}');}},100)`});
    }
  });

  // Busca em entregÃ¡veis
  G.entregaveis.forEach(ent => {
    const etapa = G.etapas.find(e => e.id === ent.etapa_id);
    const tipo = G.tipos.find(t => t.id === etapa?.tipo_id);
    if(ent.nome.toLowerCase().includes(q) || (ent.descricao||'').toLowerCase().includes(q)) {
      resultados.push({path:`${tipo?.nome||''} Â· ${etapa?.nome||''}`, titulo:ent.nome, snippet:snip(ent.descricao,q), action:`setTema('projetos');setArea('${tipo?.area||'paisagismo'}');setTimeout(()=>{if(!G.expandedTipos.has('${etapa?.tipo_id}')){toggleTipo('${etapa?.tipo_id}');}if(!G.expandedEtapas.has('${ent.etapa_id}')){toggleEtapa('${ent.etapa_id}');}},100)`});
    }
  });

  G.checklists.forEach(c => {
    if(c.texto.toLowerCase().includes(q)) {
      const ent = G.entregaveis.find(e => e.id === c.entregavel_id);
      const etapa = G.etapas.find(e => e.id === ent?.etapa_id);
      const tipo = G.tipos.find(t => t.id === etapa?.tipo_id);
      resultados.push({path:`${tipo?.nome||''} Â· ${etapa?.nome||''} Â· ${ent?.nome||''}`, titulo:c.texto, snippet:'', action:`setTema('projetos');setArea('${tipo?.area||'paisagismo'}')`});
    }
  });

  if(resultados.length === 0) {
    el.innerHTML = `<div class="search-empty">Nenhum resultado para "${escHtml(query)}".</div>`;
    return;
  }

  el.innerHTML = `
    <div class="content-hdr">
      <div class="content-hdr-left">
        <div class="content-title">Resultados para "${escHtml(query)}"</div>
        <div class="content-sub">${resultados.length} resultado${resultados.length!==1?'s':''}</div>

          ${r.snippet ? `<div class="sr-snippet">${r.snippet}</div>` : ''}
        </div>`).join('')}
    </div>`;
}

function snip(texto, q) {
  if(!texto) return '';
  const idx = texto.toLowerCase().indexOf(q);
  if(idx === -1) return texto.substring(0,80)+'â€¦';
  const start = Math.max(0, idx-30);
  const end = Math.min(texto.length, idx+q.length+50);
  return (start>0?'â€¦':'')+escHtml(texto.substring(start,end))+(end<texto.length?'â€¦':'');
}

  function normalizeText(text) {
    return String(text || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .trim();
  }

  function parseRangeCm(text) {
    const raw = String(text || '').replace(/\u00a0/g, ' ').trim().toLowerCase();
    if(!raw) return { min: null, max: null };
    const unitMatches = [...raw.matchAll(/(\d+(?:[.,]\d+)?)\s*(cm|m)\b/g)];
    if(unitMatches.length) {
      const values = unitMatches.map(match => {
        const value = parseFloat(match[1].replace(',', '.'));
        return match[2] === 'm' ? value * 100 : value;
      }).filter(value => Number.isFinite(value));
      if(values.length) return { min: Math.min(...values), max: Math.max(...values) };
    }
    const numbers = [...raw.matchAll(/(\d+(?:[.,]\d+)?)/g)]
      .map(match => parseFloat(match[1].replace(',', '.')))
      .filter(value => Number.isFinite(value));
    if(!numbers.length) return { min: null, max: null };
    const factor = raw.includes('cm') ? 1 : raw.includes('m') ? 100 : 1;
    const values = numbers.map(value => value * factor);
    return { min: Math.min(...values), max: Math.max(...values) };
  }

  function inferPorte(row) {
    const range = parseRangeCm(row.porte_final || row.porte_inicial || '');
    const ref = range.max || range.min;
    const grupo = normalizeText(row.grupo);
    if(!ref) return '';
    if(grupo.includes('arborea')) {
      if(ref <= 600) return 'pequeno';
      if(ref <= 1200) return 'medio';
      return 'grande';
    }
    if(ref <= 60) return 'baixo';
    if(ref <= 180) return 'pequeno';
    if(ref <= 500) return 'medio';
    return 'grande';
  }

  function normalizeSpecies(row) {
    const porteRange = parseRangeCm(row.porte_final || row.porte_inicial || '');
    return {
      ...row,
      _porteMin: porteRange.min,
      _porteMax: porteRange.max,
      _porteCategoria: inferPorte(row)
    };
  }

  function uniqueSorted(values) {
    return [...new Set(values.filter(Boolean).map(value => String(value).trim()))].sort((a, b) => a.localeCompare(b, 'pt-BR'));
  }

  function speciesType(row) {
    return row.tipo_vegetacao || row.familia || '';
  }

  function speciesHeight(row) {
    return row.porte_final || row.porte_inicial || '';
  }

  function matchesAltura(row, target) {
    const number = parseFloat(String(target || '').replace(',', '.'));
    if(!Number.isFinite(number)) return true;
    const min = row._porteMin;
    const max = row._porteMax;
    if(min == null && max == null) return true;
    if(min != null && max != null && number >= (min - 20) && number <= (max + 20)) return true;
    const ref = max || min;
    return Math.abs(ref - number) <= Math.max(20, ref * 0.25);
  }

  function filteredSpecies() {
    const filtros = G.vegFilters;
    return G.vegetacaoSpecies.filter(row => {
      const haystack = normalizeText([
        row.nome_popular,
        row.nome_cientifico,
        row.tipo_vegetacao,
        row.familia,
        row.bioma,
        row.insolacao,
        row.atratividade,
        row.pragas_alertas
      ].join(' '));
      if(filtros.busca && !haystack.includes(normalizeText(filtros.busca))) return false;
      if(filtros.grupo && normalizeText(row.grupo) !== normalizeText(filtros.grupo)) return false;
      if(filtros.tipo && normalizeText(speciesType(row)) !== normalizeText(filtros.tipo)) return false;
      if(filtros.insolacao && !normalizeText(row.insolacao).includes(normalizeText(filtros.insolacao))) return false;
      if(filtros.porte && row._porteCategoria !== filtros.porte) return false;
      if(filtros.altura && !matchesAltura(row, filtros.altura)) return false;
      return true;
    });
  }

      mudas_m2: document.getElementById('veg-mudas-m2').value.trim(),
      tipo_solo: document.getElementById('veg-tipo-solo').value.trim(),
      irrigacao: document.getElementById('veg-irrigacao').value.trim(),
      folhagem: document.getElementById('veg-folhagem').value.trim(),
      unidade_compra: document.getElementById('veg-unidade-compra').value.trim(),
      valor_base: document.getElementById('veg-valor-base').value.trim(),
      pragas_alertas: document.getElementById('veg-pragas-alertas').value.trim(),
      observacoes: document.getElementById('veg-observacoes').value.trim(),
      updated_at: new Date().toISOString(),
      atualizado_por: G.usuario?.id || null,
      criado_por: G.usuario?.id || null
    };
  }

  function upsertSpeciesLocal(species) {
    const normalized = normalizeSpecies(species);
    const idx = G.vegetacaoSpecies.findIndex(item => item.id === species.id);
    if(idx === -1) G.vegetacaoSpecies.unshift(normalized);
    else G.vegetacaoSpecies[idx] = normalized;
  }

  salvarModal = async function() {
    const ctx = G.modalCtx;
    if(!ctx) return;
    if(ctx.tipo !== 'apoio-secao' && ctx.tipo !== 'apoio-especie') return oldSalvarModal();

    const btn = document.getElementById('modal-salvar-btn');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      if(ctx.tipo === 'apoio-secao') {
        if(!G.apoioTables.conteudo) throw new Error('A tabela apoio_conteudo_secao ainda nÃ£o existe no Supabase.');
        const payload = readSectionPayload(ctx.slug);
        const { data, error } = await sb.from('apoio_conteudo_secao')
          .upsert(payload, { onConflict: 'slug' })
          .select()
          .single();
        if(error) throw error;
        upsertSectionLocal(data || payload);
      }

      if(ctx.tipo === 'apoio-especie') {
        if(!G.apoioTables.vegetacao) throw new Error('A tabela apoio_vegetacao_especie ainda nÃ£o existe no Supabase.');
        const payload = readSpeciesPayload(ctx.id);
        if(!payload.nome_popular) throw new Error('Informe ao menos o nome popular da espÃ©cie.');
        if(ctx.id) {
          const { data, error } = await sb.from('apoio_vegetacao_especie')
            .update(payload)
            .eq('id', ctx.id)
            .select()
            .single();
          if(error) throw error;
          upsertSpeciesLocal(data || payload);
        } else {
          const { data, error } = await sb.from('apoio_vegetacao_especie')
            .insert(payload)
            .select()
            .single();
          if(error) throw error;
          upsertSpeciesLocal(data || payload);
        }
      }

      fecharModal();
      renderTema();
    } catch(err) {
      alert('Erro ao salvar: ' + (err.message || JSON.stringify(err)));
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  };

  window.abrirSubtemaConhecimento = function(sub, norma) {
    G.temaAtivo = 'conhecimento';
    G.subtemaConhecimento = sub;
    if(norma) G.subtemaNorma = norma;
    renderTema();
  };

  window.abrirBuscaVegetacao = function(term) {
    G.temaAtivo = 'conhecimento';
    G.subtemaConhecimento = 'vegetacao';
    G.vegFilters.busca = term;
    renderTema();
  };

  let _buscarTimerPatch = null;
  buscarDebounce = function(query) {
    clearTimeout(_buscarTimerPatch);
    _buscarTimerPatch = setTimeout(() => buscar(query), 180);
  };

  function pushProjectSearchResults(resultados, q) {
    G.tipos.forEach(t => {
      if(normalizeText(t.nome).includes(q) || normalizeText(t.descricao).includes(q)) {
        resultados.push({ path: `Projetos Â· ${labelArea(t.area)}`, titulo: t.nome, snippet: snip(t.descricao, q), action: `setTema('projetos');setArea('${t.area}')` });
      }
    });
    G.etapas.forEach(e => {
      const tipo = G.tipos.find(t => t.id === e.tipo_id);
      if(normalizeText(e.nome).includes(q) || normalizeText(e.descricao).includes(q)) {
        resultados.push({ path: `${tipo?.nome || ''}`, titulo: e.nome, snippet: snip(e.descricao, q), action: `setTema('projetos');setArea('${tipo?.area || 'paisagismo'}')` });
      }
    });
    G.entregaveis.forEach(ent => {
      const etapa = G.etapas.find(e => e.id === ent.etapa_id);
      const tipo = G.tipos.find(t => t.id === etapa?.tipo_id);
      if(normalizeText(ent.nome).includes(q) || normalizeText(ent.descricao).includes(q)) {
        resultados.push({ path: `${tipo?.nome || ''} Â· ${etapa?.nome || ''}`, titulo: ent.nome, snippet: snip(ent.descricao, q), action: `setTema('projetos');setArea('${tipo?.area || 'paisagismo'}')` });
      }
    });
    G.checklists.forEach(c => {
      if(normalizeText(c.texto).includes(q)) {
        const ent = G.entregaveis.find(e => e.id === c.entregavel_id);
        const etapa = G.etapas.find(e => e.id === ent?.etapa_id);
        const tipo = G.tipos.find(t => t.id === etapa?.tipo_id);
        resultados.push({ path: `${tipo?.nome || ''} Â· ${etapa?.nome || ''} Â· ${ent?.nome || ''}`, titulo: c.texto, snippet: '', action: `setTema('projetos');setArea('${tipo?.area || 'paisagismo'}')` });
      }
    });
  }

  function pushContentSearchResults(resultados, q) {
    DEFAULT_SECOES.forEach(secao => {
      const merged = getSection(secao.slug);
      const source = normalizeText([merged.titulo, merged.resumo, merged.corpo].join(' '));
      if(!source.includes(q)) return;
      let action = `setTema('cultura')`;
      let path = 'Cultura';
      if(merged.grupo === 'organizacao') {
        action = `setTema('organizacao');setSubtemaOrg('${merged.subgrupo}')`;
        path = 'OrganizaÃ§Ã£o Interna';
      }
      if(merged.grupo === 'conhecimento') {
        if(merged.subgrupo === 'vegetacao') action = `abrirSubtemaConhecimento('vegetacao')`;
        else if(merged.subgrupo && merged.subgrupo.startsWith('normas-')) action = `abrirSubtemaConhecimento('normas-tecnicas','${merged.subgrupo.replace('normas-', '')}')`;
        else action = `abrirSubtemaConhecimento('${merged.subgrupo}')`;
        path = 'Conhecimento';
      }
      resultados.push({ path, titulo: merged.titulo, snippet: snip(merged.corpo, q), action });
    });
  }

  function pushSpeciesSearchResults(resultados, q) {
    G.vegetacaoSpecies.forEach(item => {
      const source = normalizeText([item.nome_popular, item.nome_cientifico, item.tipo_vegetacao, item.familia, item.bioma, item.insolacao].join(' '));
      if(!source.includes(q)) return;
      resultados.push({
        path: 'Conhecimento Â· VegetaÃ§Ã£o',
        titulo: item.nome_popular || 'EspÃ©cie',
        snippet: [item.nome_cientifico, item.insolacao, item.bioma].filter(Boolean).join(' Â· '),
        action: `abrirBuscaVegetacao(${jsStr(item.nome_popular || item.nome_cientifico || '')})`
      });
    });
  }

  buscar = function(query) {
    const el = document.getElementById('apoio-content');
    if(!query || query.trim().length < 2) {
      renderTema();
      return;
    }
    const q = normalizeText(query);
    const resultados = [];
    pushProjectSearchResults(resultados, q);
    pushContentSearchResults(resultados, q);
    pushSpeciesSearchResults(resultados, q);

    if(resultados.length === 0) {
      el.innerHTML = `<div class="search-empty">Nenhum resultado para "${escHtml(query)}".</div>`;
      return;
    }

    el.innerHTML = `
      <div class="content-hdr">
        <div class="content-hdr-left">
          <div class="content-title">Resultados para "${escHtml(query)}"</div>
          <div class="content-sub">${resultados.length} resultado${resultados.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="content-hdr-actions">
          <button class="btn sm" onclick="document.getElementById('sb-search-input').value='';renderTema()">Limpar</button>
        </div>
      </div>
      <div class="search-results-wrap">
        <div class="search-results-hdr">${resultados.length} ocorrÃªncia${resultados.length !== 1 ? 's' : ''}</div>
        ${resultados.map(r => `
          <div class="search-result-item" onclick="${r.action}">
            <div class="sr-path">${escHtml(r.path)}</div>
            <div class="sr-titulo">${escHtml(r.titulo)}</div>
            ${r.snippet ? `<div class="sr-snippet">${escHtml(r.snippet)}</div>` : ''}
          </div>`).join('')}
      </div>`;
  };

  syncSidebar();
})();
</script>
</body>
</html>
