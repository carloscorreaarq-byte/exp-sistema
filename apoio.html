    </div>`;
}

// ── RENDER PROJETOS ─────────────────────────────────────────
function renderProjetos(el) {
  if(!G.tablesOk) {
    el.innerHTML = renderSetupNotice();
    return;
  }

  const areas = [
    {key:'paisagismo',   label:'Paisagismo'},
    {key:'urbanismo',    label:'Urbanismo'},
    {key:'consultorias', label:'Consultorias'},
    {key:'especiais',    label:'Proj. Especiais'},
  ];

  const tiposArea = G.tipos.filter(t => t.area === G.areaAtiva);

  // Auto-select first if none active or active not in area
  if(!G.tipoAtivoId || !tiposArea.find(t => t.id === G.tipoAtivoId)) {
    G.tipoAtivoId = tiposArea.length > 0 ? tiposArea[0].id : null;
  }

  const tipoAtivo = tiposArea.find(t => t.id === G.tipoAtivoId);

  const menuHtml = tiposArea.length === 0
    ? `<div style="padding:16px 12px;font-size:11px;color:#ccc">Nenhum tipo cadastrado.${isSocio()?`<br><button class="btn sm verde" style="margin-top:8px" onclick="seedManual()">Carregar dados iniciais</button>`:''}</div>`
    : tiposArea.map(t => `<div class="tipo-menu-item${t.id===G.tipoAtivoId?' active':''}" data-tipo-id="${t.id}" data-area="${t.area}" onclick="setTipoAtivo('${t.id}')">${escHtml(t.nome)}</div>`).join('');

  const detailHtml = !tipoAtivo
    ? `<div class="tipo-detail-vazio">Selecione um tipo de projeto ao lado</div>`
    : renderTipoDetalhe(tipoAtivo);

  el.innerHTML = `
    ${(window.renderTemaHdr||function(){return ''})('projetos', 'Projetos', 'Base projetual · tipos, etapas, entregáveis e checklists de conferência')}
    <div class="secao-shell" style="padding:0;overflow:hidden">
      <div class="proj-body">
        <div class="tipo-menu">${menuHtml}</div>
        <div class="tipo-detail" id="tipo-detail-panel">${detailHtml}</div>
      </div>
    </div>`;
}

function setArea(area) {
  G.areaAtiva = area;
  G.tipoAtivoId = null;
  G.expandedTipos = new Set();
  G.expandedEtapas = new Set();
  G.expandedEntregaveis = new Set();
  renderTema();
}

function setTipoAtivo(id) {
  G.tipoAtivoId = id;
  G.expandedEtapas = new Set();
  G.expandedEntregaveis = new Set();
  document.querySelectorAll('.tipo-menu-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tipoId === id);
  });
  const panel = document.getElementById('tipo-detail-panel');
  if(panel) {
    const tipo = G.tipos.find(t => t.id === id);
    if(tipo) panel.innerHTML = renderTipoDetalhe(tipo);
  }
}

function renderTipoDetalhe(tipo) {
  const etapas = G.etapas.filter(e => e.tipo_id === tipo.id);
  const editBtn = isSocio()
    ? `<div class="tipo-detail-edit"><button class="edit-btn" onclick="abrirEditTipo('${tipo.id}')">✎ editar</button></div>` : '';
  const etapasHtml = etapas.length === 0
    ? `<div class="checklist-vazio">Nenhuma etapa cadastrada.</div>`
    : `<div class="etapas-lista-hdr">
        <span class="etapas-lista-label">Etapas (${etapas.length})</span>
        <button class="recolher-btn" onclick="recolherTudo('${tipo.id}')">Recolher tudo</button>
       </div>
       <div class="etapas-lista">${etapas.map(e => renderEtapaRow(e)).join('')}</div>`;
  return `
    <div class="tipo-detail-hdr">${editBtn}</div>
    <div class="tipo-detail-nome">${escHtml(tipo.nome)}</div>
    <div class="tipo-detail-desc" id="tipo-desc-${tipo.id}">${escHtml(tipo.descricao||'')}</div>
    ${etapasHtml}`;
}

function renderTipoCard(tipo) {

  const editTipoBtn = isSocio()

    : '';

    <div class="tipo-descricao-wrap">

      <div class="tipo-descricao-txt" id="tipo-desc-${tipo.id}">${escHtml(tipo.descricao||'')}</div>

    : `<div class="etapas-lista-hdr">
        <span class="etapas-lista-label">Etapas (${etapas.length})</span>

// ── ACCORDIONS ──────────────────────────────────────────────
function toggleTipo(id) {
  const card = document.getElementById('tipo-'+id);
  if(!card) return;
  if(G.expandedTipos.has(id)){G.expandedTipos.delete(id);card.classList.remove('expanded');}
  else{G.expandedTipos.add(id);card.classList.add('expanded');}
}

function toggleEtapa(id) {
  const row = document.getElementById('etapa-'+id);
  if(!row) return;
  if(G.expandedEtapas.has(id)){G.expandedEtapas.delete(id);row.classList.remove('expanded');}
  else{G.expandedEtapas.add(id);row.classList.add('expanded');}
}

function toggleEntregavel(id) {
  const row = document.getElementById('entregavel-'+id);
  if(!row) return;
  if(G.expandedEntregaveis.has(id)){G.expandedEntregaveis.delete(id);row.classList.remove('expanded');}
  else{G.expandedEntregaveis.add(id);row.classList.add('expanded');}
}

function recolherTudo(tipoId) {
  const etapas = G.etapas.filter(e => e.tipo_id === tipoId);
  etapas.forEach(e => {
    G.expandedEtapas.delete(e.id);
    const row = document.getElementById('etapa-'+e.id);
    if(row) row.classList.remove('expanded');
    const entregaveis = G.entregaveis.filter(ent => ent.etapa_id === e.id);
    entregaveis.forEach(ent => {
      G.expandedEntregaveis.delete(ent.id);
      const eRow = document.getElementById('entregavel-'+ent.id);
      if(eRow) eRow.classList.remove('expanded');
    });
  });
}

// ── MODAL DE EDIÇÃO ─────────────────────────────────────────
function abrirModal(titulo, bodyHtml, ctx) {
  G.modalCtx = ctx;
  document.getElementById('modal-edit-title').textContent = titulo;
  document.getElementById('modal-edit-body').innerHTML = bodyHtml;
  const footer = document.querySelector('#modal-edit .modal-footer');
  const saveBtn = document.getElementById('modal-salvar-btn');
  if(footer) footer.style.display = ctx?.hideFooter ? 'none' : '';
  if(saveBtn) {
    saveBtn.textContent = ctx?.saveLabel || 'Salvar';
    saveBtn.disabled = false;
  }
  document.getElementById('modal-edit').style.display = 'flex';
}

function fecharModal() {
  document.getElementById('modal-edit').style.display = 'none';
  const footer = document.querySelector('#modal-edit .modal-footer');
  const saveBtn = document.getElementById('modal-salvar-btn');
  if(footer) footer.style.display = '';
  if(saveBtn) {
    saveBtn.textContent = 'Salvar';
    saveBtn.disabled = false;
  }
  G.modalCtx = null;
}

function removerCkItem(btn) {
  btn.closest('.modal-checklist-item').remove();
}

function addCkItem() {
  const lista = document.getElementById('ck-lista');
  const div = document.createElement('div');
  div.className = 'modal-checklist-item';
  div.dataset.ckId = 'new';
  div.innerHTML = `<input type="text" placeholder="Item de conferência"><button class="btn-remove" onclick="removerCkItem(this)" title="Remover">×</button>`;
  lista.appendChild(div);
  div.querySelector('input').focus();
}

// ── SALVAR MODAL ────────────────────────────────────────────
async function salvarModal() {
  const ctx = G.modalCtx;
  if(!ctx) return;
  if(!isSocio()) {
    toast('Apenas sócios podem editar as bases do apoio.');
    return;
  }

  const btn = document.getElementById('modal-salvar-btn');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    if(ctx.tipo === 'tipo') {
      const descricao = document.getElementById('me-descricao').value;
      const {error} = await sb.from('base_tipo_projeto').update({
        descricao, atualizado_em:new Date().toISOString(), atualizado_por:G.usuario.id
      }).eq('id', ctx.id);
      if(error) throw error;
      const t = G.tipos.find(t => t.id === ctx.id);
      if(t) t.descricao = descricao;
      const el = document.getElementById('tipo-desc-'+ctx.id);
      if(el) el.textContent = descricao;
    }
    else if(ctx.tipo === 'etapa') {
      const descricao = document.getElementById('me-descricao').value;
      const prazo_dias = parseInt(document.getElementById('me-prazo-dias').value)||7;
      const prazo_tipo = document.getElementById('me-prazo-tipo').value;
      const {error} = await sb.from('base_etapa').update({
        descricao, prazo_dias, prazo_tipo, atualizado_em:new Date().toISOString(), atualizado_por:G.usuario.id
      }).eq('id', ctx.id);
      if(error) throw error;
      const e = G.etapas.find(e => e.id === ctx.id);
      if(e){e.descricao=descricao;e.prazo_dias=prazo_dias;e.prazo_tipo=prazo_tipo;}
      const el = document.getElementById('etapa-desc-'+ctx.id);
      if(el) el.textContent = descricao;
      // Atualiza prazo no header
      const row = document.getElementById('etapa-'+ctx.id);
      if(row){
        const prazoEl = row.querySelector('.etapa-prazo');
        if(prazoEl) prazoEl.textContent = prazo_dias ? `${prazo_dias}d ${prazo_tipo==='corridos'?'corridos':'úteis'}` : '';
      }
    }
    else if(ctx.tipo === 'entregavel') {
      const nome = document.getElementById('me-nome').value;
      const descricao = document.getElementById('me-descricao').value;
      const {error} = await sb.from('base_entregavel').update({
        nome, descricao, atualizado_em:new Date().toISOString(), atualizado_por:G.usuario.id
      }).eq('id', ctx.id);
      if(error) throw error;
      const e = G.entregaveis.find(e => e.id === ctx.id);
      if(e){e.nome=nome;e.descricao=descricao;}
      const el = document.getElementById('entregavel-desc-'+ctx.id);
      if(el) el.textContent = descricao;
      const row = document.getElementById('entregavel-'+ctx.id);
      if(row){const n=row.querySelector('.entregavel-nome');if(n)n.textContent=nome;}
    }
    else if(ctx.tipo === 'add-entregavel') {
      const nome = document.getElementById('me-nome').value.trim();
      const descricao = document.getElementById('me-descricao').value;
      if(!nome){toast('Informe o nome do entregável.');btn.disabled=false;btn.textContent='Salvar';return;}
      const ordemMax = Math.max(0,...G.entregaveis.filter(e=>e.etapa_id===ctx.etapaId).map(e=>e.ordem));
      const {data, error} = await sb.from('base_entregavel').insert({
        etapa_id:ctx.etapaId, nome, descricao, ordem:ordemMax+1
      }).select().single();
      if(error) throw error;
      G.entregaveis.push(data);
      // Re-render etapa body
      const etapa = G.etapas.find(e => e.id === ctx.etapaId);
      if(etapa) {
        const row = document.getElementById('etapa-'+ctx.etapaId);
        if(row){
          const body = row.querySelector('.etapa-body');
          if(body) body.innerHTML = buildEtapaBodyHtml(etapa);
        }
      }
    }
    else if(ctx.tipo === 'checklist') {
      // Deleta todos os itens existentes e re-insere
      await sb.from('base_checklist_item').delete().eq('entregavel_id', ctx.entregavelId);
      const inputs = document.querySelectorAll('#ck-lista .modal-checklist-item input');
      const novos = Array.from(inputs).map((inp,i) => inp.value.trim()).filter(Boolean).map((texto,i) => ({
        entregavel_id:ctx.entregavelId, texto, ordem:i+1
      }));
      if(novos.length > 0) {
        const {data, error} = await sb.from('base_checklist_item').insert(novos).select();
        if(error) throw error;
        G.checklists = G.checklists.filter(c => c.entregavel_id !== ctx.entregavelId);
        G.checklists.push(...(data||[]));
      } else {
        G.checklists = G.checklists.filter(c => c.entregavel_id !== ctx.entregavelId);
      }
      // Re-render entregavel body
      const entregavel = G.entregaveis.find(e => e.id === ctx.entregavelId);
      if(entregavel){
        const row = document.getElementById('entregavel-'+ctx.entregavelId);
        if(row){
          const body = row.querySelector('.entregavel-body');
          if(body) body.innerHTML = buildEntregavelBodyHtml(entregavel);
        }
      }
    }

    fecharModal();
  } catch(err) {
    toast('Erro ao salvar: ' + (err.message||JSON.stringify(err)));
  } finally {
    btn.disabled = false;
    btn.textContent = 'Salvar';
  }
}

function buildEtapaBodyHtml(etapa) {
  const entregaveis = G.entregaveis.filter(e => e.etapa_id === etapa.id);
  const editBtn = isSocio()
    ? `<div class="edit-trigger"><button class="edit-btn" onclick="event.stopPropagation();abrirEditEtapa('${etapa.id}')">✎ editar</button></div>` : '';
  const entHtml = entregaveis.length === 0
    ? `<span class="checklist-vazio">Nenhum entregável.${isSocio()?`<button class="btn sm" onclick="abrirAddEntregavel('${etapa.id}')"> + Adicionar</button>`:''}</span>`
    : `<div class="entregaveis-label">Entregáveis</div><div class="entregaveis-lista">${entregaveis.map(e=>renderEntregavelRow(e)).join('')}</div>${isSocio()?`<button class="btn sm" style="margin-top:6px" onclick="event.stopPropagation();abrirAddEntregavel('${etapa.id}')">+ Adicionar entregável</button>`:''}`;
  return `<div class="etapa-descricao-wrap">${editBtn}<div class="etapa-descricao-txt" id="etapa-desc-${etapa.id}">${escHtml(etapa.descricao||'')}</div></div>${entHtml}`;
}

function buildEntregavelBodyHtml(entregavel) {
  const ckItems = G.checklists.filter(c => c.entregavel_id === entregavel.id);
  const editBtn = isSocio()

// ── BUSCA ───────────────────────────────────────────────────
let _buscarTimer = null;
function buscarDebounce(query) {
  clearTimeout(_buscarTimer);
  _buscarTimer = setTimeout(() => buscar(query), 220);
}

function buscar(query) {
  const el = document.getElementById('apoio-content');
  if(!query || query.trim().length < 2) {
    renderTema();
    return;
  }
  const q = query.toLowerCase();
  const resultados = [];

  // Busca em tipos
  G.tipos.forEach(t => {
    if(t.nome.toLowerCase().includes(q) || (t.descricao||'').toLowerCase().includes(q)) {
      resultados.push({path:`Projetos · ${labelArea(t.area)}`, titulo:t.nome, snippet:snip(t.descricao,q), action:`setTema('projetos');setArea('${t.area}')`});
    }
  });

  // Busca em etapas
  G.etapas.forEach(e => {
    const tipo = G.tipos.find(t => t.id === e.tipo_id);
    if(e.nome.toLowerCase().includes(q) || (e.descricao||'').toLowerCase().includes(q)) {
      resultados.push({path:`${tipo?.nome||''}`, titulo:e.nome, snippet:snip(e.descricao,q), action:`setTema('projetos');setArea('${tipo?.area||'paisagismo'}');setTimeout(()=>{if(!G.expandedTipos.has('${e.tipo_id}')){toggleTipo('${e.tipo_id}');}},100)`});
    }
  });

  // Busca em entregáveis
  G.entregaveis.forEach(ent => {
    const etapa = G.etapas.find(e => e.id === ent.etapa_id);
    const tipo = G.tipos.find(t => t.id === etapa?.tipo_id);
    if(ent.nome.toLowerCase().includes(q) || (ent.descricao||'').toLowerCase().includes(q)) {
      resultados.push({path:`${tipo?.nome||''} · ${etapa?.nome||''}`, titulo:ent.nome, snippet:snip(ent.descricao,q), action:`setTema('projetos');setArea('${tipo?.area||'paisagismo'}');setTimeout(()=>{if(!G.expandedTipos.has('${etapa?.tipo_id}')){toggleTipo('${etapa?.tipo_id}');}if(!G.expandedEtapas.has('${ent.etapa_id}')){toggleEtapa('${ent.etapa_id}');}},100)`});
    }
  });

  // Busca em checklist
  G.checklists.forEach(c => {
    if(c.texto.toLowerCase().includes(q)) {
      const ent = G.entregaveis.find(e => e.id === c.entregavel_id);
      const etapa = G.etapas.find(e => e.id === ent?.etapa_id);
      const tipo = G.tipos.find(t => t.id === etapa?.tipo_id);
      resultados.push({path:`${tipo?.nome||''} · ${etapa?.nome||''} · ${ent?.nome||''}`, titulo:c.texto, snippet:'', action:`setTema('projetos');setArea('${tipo?.area||'paisagismo'}')`});
    }
  });

  if(resultados.length === 0) {
    el.innerHTML = `<div class="search-empty">Nenhum resultado para "${escHtml(query)}".</div>`;
    return;
  }

  el.innerHTML = `
    <div class="content-hdr">
      <div class="content-hdr-left">
        <div class="content-title">Resultados para "${escHtml(query)}"</div>
        <div class="content-sub">${resultados.length} resultado${resultados.length!==1?'s':''}</div>
      </div>
      <div class="content-hdr-actions">
        <button class="btn sm" onclick="document.getElementById('sb-search-input').value='';renderTema()">Limpar</button>
      </div>
    </div>
    <div class="search-results-wrap">
      <div class="search-results-hdr">${resultados.length} ocorrência${resultados.length!==1?'s':''}</div>
      ${resultados.map(r => `
        <div class="search-result-item" onclick="${r.action}">
          <div class="sr-path">${escHtml(r.path)}</div>
          <div class="sr-titulo">${escHtml(r.titulo)}</div>
          ${r.snippet ? `<div class="sr-snippet">${r.snippet}</div>` : ''}
        </div>`).join('')}
    </div>`;
}

function snip(texto, q) {
  if(!texto) return '';
  const idx = texto.toLowerCase().indexOf(q);
  if(idx === -1) return texto.substring(0,80)+'…';
  const start = Math.max(0, idx-30);
  const end = Math.min(texto.length, idx+q.length+50);
  return (start>0?'…':'')+escHtml(texto.substring(start,end))+(end<texto.length?'…':'');
}

      resumo: 'Base conceitual para repertório, análise e tomada de decisão em urbanismo.',
      corpo: `## Fundamentos de Urbanismo
O urbanismo é a disciplina que trata da organização, planejamento e transformação do espaço urbano. Na EXP, o repertório teórico alimenta diretamente as decisões de projeto — desde a escala do masterplan até a definição de um canteiro de passeio.

## Loteamentos e Parcelamento do Solo — ADIT
O loteamento é o parcelamento do solo para fins urbanos, regulado no Brasil pela Lei 6.766/1979 e suas atualizações. Os empreendimentos horizontais fechados (loteamentos de acesso controlado) são regidos adicionalmente pela Lei 13.465/2017.

## Estrutura do processo de loteamento
- Estudo de viabilidade: análise da legislação municipal, zoneamento, índices urbanísticos e infra existente.
- Diretrizes municipais: aprovação de diretrizes junto à prefeitura — viário proposto, áreas públicas exigidas (vias, verdes, institucionais) e percentuais mínimos.
- Projeto urbanístico: subdivisão em quadras e lotes, traçado viário, sistema de espaços livres e locação de áreas institucionais.
- Infraestrutura obrigatória: pavimentação, drenagem, água, esgoto, energia e iluminação pública (escopo varia por município).
- Registro: aprovação final e registro do parcelamento no Cartório de Imóveis, após vistoria de obras.

## Espaços públicos no loteamento
A lei exige destinação mínima de percentuais de área para espaços livres de uso público, sistema viário e equipamentos comunitários. Os valores variam por município, mas tipicamente: 15% sistema viário, 5% institucional, 10–15% áreas verdes — sobre a área bruta do terreno.

## Loteamento fechado vs. aberto
O loteamento aberto integra-se à malha urbana existente com vias de uso público. O fechado (acesso controlado) permite o controle de entrada, mas as vias e espaços internos continuam sendo públicos — administrados pela associação de moradores sob permissão de uso.

## Conexão com o projeto de paisagismo
O paisagismo de um loteamento engloba: áreas de lazer (playgrounds, quadras, academia), espaços de convivência, alamedas e canteiros centrais, áreas de amortecimento de APP, praças internas e calçadas. A qualidade desses espaços define a identidade e o valor percebido do empreendimento.

## Hierarquia viária e escala pedestre
A organização viária interna do loteamento deve equilibrar fluidez de veículos e qualidade do espaço pedestre. Ruas locais (6–8m), coletoras (8–12m) e arteriais têm funções distintas. A humanização do passeio — arborização, largura adequada, continuidade de pisos — é elemento diferenciador.

## Conceitos recorrentes
- Centralidade: polo de atração que organiza o entorno, define usos e gera permanência.
- Borda: zona de transição entre tecidos urbanos — precisa ser tratada como espaço de costura, não de ruptura.
- Espaço público de permanência: a qualidade do espaço público define se as pessoas ficam ou apenas passam.
- Interface público-privado: o cuidado com essa transição — o que o pedestre vê ao passar — define muito da identidade do projeto.`

      resumo: 'Planos inclinados, rampas, escadas externas, piscinas e rotas acessíveis.',
      corpo: `## Sobre a norma
A ABNT NBR 9050:2015 estabelece critérios e parâmetros técnicos para a acessibilidade a edificações, mobiliário, espaços e equipamentos urbanos. É a principal referência normativa de acessibilidade no Brasil, aplicável a todos os novos projetos e às reformas.

## Pisos — planos inclinados até 4,99%
Superfícies com inclinação de até 5% no sentido longitudinal são classificadas como pisos inclinados, não como rampas. Não exigem corrimãos ou guias de balizamento.

- Inclinação transversal máxima (caimento lateral): 2%.
- Inclinação longitudinal até 5%: não é considerada rampa — não requer corrimão.
- A partir de 5%: passa a ser classificada como rampa e exige tratamento específico.
- Superfície: firme, estável e antiderrapante em qualquer situação (seca ou molhada).

Nota importante para projetos de calçada e passeio: declividades de projeto no sentido da inclinação transversal da via são toleradas até 3% sem exigência de rampa. O projetista deve indicar as cotas de piso para garantir que o resultado construído não ultrapasse 5% no sentido do caminhamento.

## Rampas — parâmetros gerais
Rampas são superfícies com inclinação entre 5% e 8,33% (relação 1:12). São obrigatórias em toda a rota acessível onde houver diferença de nível, em substituição ou complemento a degraus.

Inclinações admissíveis:
- Situação ideal: até 5% (1:20) — recomendada pela norma como o máximo desejável.
- Situação admissível: de 5% a 8,33% (1:12) — exige corrimão nos dois lados.
- Situação excepcional (reformas com restrição de espaço):
  - Até 10% (1:10): admitida quando o desnível não ultrapasse 0,20m e haja corrimão.
  - Até 12,5% (1:8): admitida apenas quando o desnível não ultrapasse 0,075m.

Dimensões da rampa:
- Largura mínima livre (entre corrimãos ou paredes): 1,20m.
- Largura recomendada: 1,50m.
- Comprimento máximo do segmento de rampa sem patamar: deve respeitar projeção horizontal máxima de 9,00m (para 8,33%) ou 9,00m corridos entre patamares consecutivos. Acima disso, inserir patamar.

Patamares:
- Dimensões mínimas no início e no fim de cada segmento: 1,20m × 1,20m.
- Patamares em mudança de direção: 1,50m × 1,50m.
- A largura do patamar não pode ser inferior à largura da rampa.

Corrimãos:
- Obrigatórios nos dois lados para qualquer rampa com inclinação acima de 5%.
- Duplos: alturas de 0,70m (infantil/cadeirante) e 0,92m (adulto).
- Devem ser contínuos ao longo de todo o segmento.
- Prolongamento de 0,30m além do início e do fim da rampa.
- Extremidades devem ter terminação curvada para baixo ou para a parede, sem protuberância.

Guias de balizamento:
- Elemento com no mínimo 5cm de altura, instalado nas bordas laterais da rampa que não possuam parede ou guarda-corpo.
- Evita que rodas de cadeiras de rodas saiam da rampa.

Superfície da rampa:
- Antiderrapante em toda a extensão.
- Sinalização tátil de alerta no início e no fim de cada segmento (ver NBR 16537).

## Escadas externas
Escadas integradas à rota acessível devem atender requisitos específicos. Escadas em espaços externos estão sujeitas às mesmas exigências das internas, com atenção redobrada à drenagem e ao acabamento antiderrapante.

Dimensionamento dos degraus:
- Espelho (altura do degrau): máximo 18cm.
- Piso (profundidade do degrau): mínimo 28cm.
- Fórmula de Blondel (conforto): 2 × espelho + piso deve resultar entre 0,63m e 0,65m.
- Degraus uniformes em toda a escada — variações de altura são vedadas.
- Espelho inclinado para frente é proibido (risco de tropeço).
- Borda (nariz) do degrau: deve ter acabamento antiderrapante e contraste visual em toda a extensão. Não pode ter saliência superior a 1,5cm.

Largura mínima:
- Escadas em rotas de fuga e acesso principal: mínimo 1,20m.
- Recomendado: 1,50m.

Patamares em escadas:
- Mínimo 1,20m no sentido do tráfego (entre dois lanços consecutivos ou início/fim).
- Sem altura máxima prescrita, mas recomenda-se não ultrapassar 3,20m de desnível por lanço.

Corrimãos:
- Obrigatórios nos dois lados para escadas com 3 ou mais degraus.
- Altura: 0,92m medida verticalmente ao piso da escada; em escadas públicas ou de uso coletivo, também a 0,70m.
- Contínuos ao longo de toda a extensão, inclusive nos patamares intermediários.
- Prolongamento horizontal de 0,30m além do primeiro e do último degrau.
- Extremidades curvadas para baixo ou para a parede.

Sinalização tátil em escadas:
- Faixa de piso tátil de alerta (bolinhas) no sentido transversal à circulação:
  - Largura: 25–60cm.
  - Posição: a 28–32cm do início da descida (da borda do degrau superior), em toda a largura.
  - Também ao final da subida (borda do último degrau).

Guarda-corpo:
- Obrigatório onde o desnível lateral for superior a 0,19m.
- Altura mínima: 1,05m.
- Não deve ter elementos que permitam escalada (espaços entre elementos: máx. 0,15m).

## Piscinas — área do entorno
A norma trata piscinas no capítulo de espaços de recreação e lazer. Toda piscina de uso coletivo deve ter pelo menos uma rota acessível desde o acesso externo até a beira da piscina, e pelo menos um ponto de entrada acessível à água.

Entorno da piscina:
- Circulação ao redor: largura mínima livre de 1,50m, sem obstruções.
- Piso: firme, estável, antiderrapante mesmo quando molhado.
- Faixa de piso tátil de alerta ao longo de toda a borda da piscina: obrigatória para orientação de pessoas com deficiência visual.
- A faixa deve ser instalada a 0,50m da borda da piscina.
- Diferença de nível entre o piso do entorno e o espelho d'água: sinalizada com contraste visual e tátil.

Drenagem e piso do entorno:
- Caimento do piso de entorno: para longe da piscina (evitar que água escorra para a borda).
- Grelhas de drenagem: espaçamento máximo de 1,3cm entre barras, perpendiculares ao sentido de caminhamento.
- Ralos embutidos: embutidos no nível do piso, sem desníveis.

## Piscinas — acesso à água
A norma exige pelo menos uma entrada acessível à água para piscinas de uso coletivo. Admite três tipos de solução:

Solução 3 — Degraus com corrimão (complementar):

      resumo: 'Diretrizes de implantação de pisos táteis de alerta e direcional.',
      corpo: `## Sobre a norma
A ABNT NBR 16537:2024 — Acessibilidade — Sinalização Tátil no Piso — Diretrizes para Elaboração de Projetos e Instalação — é a norma técnica que especifica os critérios de implantação dos pisos podotáteis (de alerta e direcional) em espaços públicos e edificações.

## Tipos de piso tátil
- Piso tátil direcional: textura em barras paralelas que guiam o deslocamento de pessoas com deficiência visual, indicando a direção do caminho.
- Piso tátil de alerta: textura em bolinhas (pontos) que sinaliza situações de risco ou mudanças de direção, início/fim de percursos, obstáculos e bordas de plataformas.

## Onde implantar
- Tátil direcional: em rotas acessíveis onde não haja guia de calçada, muro ou elemento arquitetônico que sirva como referência natural ao longo do percurso.
- Tátil de alerta: início e término de escadas e rampas; rebaixamentos de calçada; obstáculos suspensos; plataformas de embarque; passagens de pedestre; portas de acesso principal.

## Dimensionamento e posicionamento
- Largura do tátil direcional: igual à largura da rota acessível, mínimo 40cm (faixa efetiva de guia).
- Tátil de alerta em escadas: faixa com mínimo 60cm de largura, no sentido transversal à circulação, a 32cm da borda do primeiro e do último degrau.
- Tátil de alerta em rebaixamento de calçada: cobre toda a largura do rebaixamento.
- Distância entre piso tátil e o obstáculo: 50cm antes do obstáculo, medidos a partir da borda do tátil.

## Materiais e cor
- Cores: o piso tátil deve contrastar cromaticamente com o piso adjacente — diferença no fator de reflexão de luz ≥ 30%.
- Cor predominante recomendada: amarelo (mais comum), mas a norma admite outras cores desde que haja contraste suficiente.
- Material: cerâmica, concreto, borracha e PVC são aceitos. O material deve ser firme, estável e antiderrapante.
- Manutenção: o piso tátil não pode ser pintado — a textura física é o que cumpre a função de sinalização.

## Erros frequentes de projeto
- Tátil direcional interrompido no meio da rota sem chegada a um destino.
- Tátil de alerta ausente no início/fim de escadas.
- Cor do tátil igual ou muito similar à do piso adjacente (sem contraste).
- Posicionamento sobre tampas de inspeção, grelhas ou juntas com desníveis.
- Tátil que termina contra obstáculo fixo sem rota alternativa indicada.

## Referência cruzada com NBR 9050
A NBR 16537 complementa a NBR 9050:2020. Os critérios de rota acessível da NBR 9050 definem onde a sinalização tátil é obrigatória; a NBR 16537 especifica como implantá-la corretamente.`

      corpo: `## Referências normativas aplicáveis

## Acessibilidade

## Casa de máquinas
- Área mínima para manutenção e operação dos equipamentos.

- Piso do deck antiderrapante e sem juntas cortantes.

      corpo: `## Referências normativas

## Faixas etárias e setorização
- 2–5 anos (Toddler): equipamentos de baixa altura, escorregadores curtos, balanços com assento fechado, superfície macia em toda a zona.
- 5–12 anos: maior complexidade, alturas de queda até 2,50m, escorregadores, trepa-trepa, tirolesa.

## Zona de queda e amortecimento
- Toda a projeção do equipamento + no mínimo 1,50–2,00m em todas as direções.

## Distâncias de segurança
- Distância mínima entre equipamentos: 1,50m.
- Distância mínima de muretas, postes e obstáculos fixos: 1,00m.

- Ao menos 50% da área do playground deve ter sombra no período das 10h às 16h.

- Equipamentos em polietileno de alta densidade (PEAD) ou madeira tratada, com certificação INMETRO.

- Sombreamento adequado sem raízes que perturbem o piso ou galhos de risco de queda.

- Cercamento da área (para crianças menores) com portão de segurança.

Temas centrais: infraestrutura verde como estruturadora do espaço urbano; cidades biofílicas; gestão de bacias hidrográficas em contexto urbano; espaço público e ecologia social; regeneração de periferias; habitação e paisagem; metabolismo urbano. O livro é referência para projetos que buscam integrar sustentabilidade ambiental com qualidade espacial e justiça urbana, especialmente relevante para projetos de parques, loteamentos de baixo impacto e espaços públicos.

## Walkscapes — O Caminhar como Prática Estética
Francesco Careri. Editora Gustavo Gili (Ed. GG).

Obra complementar a Caminhar e Parar, mais teórica e histórica. Traça uma genealogia do caminhar como prática artística e urbana — dos errantes dadaístas às déambulations surrealistas, da psicogeografia situacionista ao Stalker.

Careri argumenta que o ato de caminhar é a forma mais antiga de intervenção no território e de produção de paisagem. O livro reposiciona a deriva urbana como ferramenta de projeto e análise, especialmente valiosa para interpretar tecidos urbanos complexos, periferias e espaços não planejados.

  function jsStr(value) {
    // Must produce single-quoted JS string for use inside double-quoted HTML onclick attributes.
    // JSON.stringify produces "value" (double-quoted) which breaks the HTML attribute parser.
    const s = String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return "'" + s + "'";
  }

  function getDefaultSection(slug) {
    return DEFAULT_SECOES.find(secao => secao.slug === slug);

  function getSection(slug) {
    const base = getDefaultSection(slug) || { slug, titulo: 'Nova seção', resumo: '', corpo: '', grupo: '', subgrupo: '', ordem: 999 };
    const saved = G.apoioSecoes.find(secao => secao.slug === slug);
    if(!saved) return { ...base };
    return { ...base, ...saved, resumo: saved.resumo ?? base.resumo, corpo: saved.corpo ?? base.corpo };
  }

    const idx = G.apoioSecoes.findIndex(item => item.slug === section.slug);

  function parseRichBody(text) {
    const source = String(text || '').replace(/\r/g, '').trim();
    if(!source) return `<div class="knowledge-empty">Sem conteúdo ainda. Use o botão de edição para preencher esta seção.</div>`;
    const lines = source.split('\n');
    const blocks = [];
    let paragraph = [];
    let list = [];

    const flushParagraph = () => {
      if(!paragraph.length) return;
      blocks.push(`<p>${escHtml(paragraph.join(' '))}</p>`);
      paragraph = [];
    };

    const flushList = () => {
      if(!list.length) return;
      blocks.push(`<ul>${list.map(item => `<li>${escHtml(item)}</li>`).join('')}</ul>`);
      list = [];
    };

    lines.forEach(line => {
      const trimmed = line.trim();
      if(!trimmed) {
        flushParagraph();
        flushList();
        return;
      }
      if(trimmed.startsWith('## ')) {
        flushParagraph();
        flushList();
        blocks.push(`<h3>${escHtml(trimmed.slice(3))}</h3>`);
        return;
      }
      if(trimmed.startsWith('- ')) {
        flushParagraph();
        list.push(trimmed.slice(2));
        return;
      }
      flushList();
      paragraph.push(trimmed);
    });

    flushParagraph();
    flushList();
    return `<div class="rich-body">${blocks.join('')}</div>`;
  }

  function comporMatrizPlanoCache(categorias, campos, evolucoes) {
    const evoMap = new Map();
    (evolucoes || []).forEach(item => {
      evoMap.set(`${item.campo_id}:${item.senioridade}`, Number(item.valor || 0));
    });
    const camposPorCategoria = new Map();
    (campos || [])
      .filter(item => item.ativo !== false)
      .sort((a, b) => (a.ordem || 0) - (b.ordem || 0))
      .forEach(item => {
        if (!camposPorCategoria.has(item.categoria_id)) camposPorCategoria.set(item.categoria_id, []);
        camposPorCategoria.get(item.categoria_id).push({
          texto: item.texto,
          valores: Object.fromEntries(PLANO_GENTE_SENIORIDADES.map(level => [level.key, evoMap.get(`${item.id}:${level.key}`) ?? 0]))
        });
      });
    return {
      secoes: (categorias || [])
        .filter(item => item.ativo !== false)
        .sort((a, b) => (a.ordem || 0) - (b.ordem || 0))
        .map(item => ({
          key: item.chave,
          titulo: item.titulo,
          intro: item.intro || '',
          itens: camposPorCategoria.get(item.id) || []
        }))
    };
  }

  async function carregarDadosDinamicos() {
    const [metaRes, normasRes, indicacoesRes, jvRes, subtemasRes, matrizCategoriasRes, matrizCamposRes, matrizEvolucoesRes] = await Promise.all([
      sb.from('apoio_temas_meta').select('*'),
      sb.from('apoio_normas').select('*').order('area').order('ordem'),
      sb.from('apoio_indicacoes').select('*').order('ordem'),
      sb.from('apoio_jardim_subcards').select('*').order('secao').order('ordem'),
      sb.from('apoio_subtemas_custom').select('*').order('tema_slug').order('ordem'),
      sb.from('pessoas_matriz_categoria').select('*').order('ordem'),
      sb.from('pessoas_matriz_campo').select('*').order('categoria_id').order('ordem'),
      sb.from('pessoas_matriz_evolucao').select('*')
    ]);
    const resultados = [
      ['apoio_temas_meta', metaRes],
      ['apoio_normas', normasRes],
      ['apoio_indicacoes', indicacoesRes],
      ['apoio_jardim_subcards', jvRes],
      ['apoio_subtemas_custom', subtemasRes]
    ];
    const falhas = resultados.filter(([, res]) => res?.error);
    if (falhas.length) {
      G.dynamicTablesOk = false;
      G.dynamicTablesError = falhas.map(([nome, res]) => `${nome}: ${res.error.message || 'falha desconhecida'}`).join(' | ');
      falhas.forEach(([nome, res]) => console.warn(`Falha ao carregar ${nome}`, res.error));
    } else {
      G.dynamicTablesOk = true;
      G.dynamicTablesError = '';
    }
    if (metaRes.data) {
      metaRes.data.forEach(m => { G.temasMetaCache[m.slug] = m; });
    }
    if (normasRes.data) G.normasCache = normasRes.data;
    if (indicacoesRes.data) G.indicacoesCache = indicacoesRes.data;
    if (jvRes.data) {
      G.jardimSubcardsCache = {};
      jvRes.data.forEach(item => {
        if (!G.jardimSubcardsCache[item.secao]) G.jardimSubcardsCache[item.secao] = [];
        G.jardimSubcardsCache[item.secao].push(item);
      });
    }
    if (subtemasRes.data) {
      G.subtemasCustomCache = {};
      subtemasRes.data.forEach(item => {
        if (!G.subtemasCustomCache[item.tema_slug]) G.subtemasCustomCache[item.tema_slug] = [];
        G.subtemasCustomCache[item.tema_slug].push(item);
      });
    }
    const matrizMissing = [matrizCategoriasRes, matrizCamposRes, matrizEvolucoesRes].some(res => res?.error?.code === '42P01' || String(res?.error?.message || '').includes('Could not find the table'));
    if (matrizMissing) {
      G.matrizPlanoCache = null;
    } else if (matrizCategoriasRes.error || matrizCamposRes.error || matrizEvolucoesRes.error) {
      console.warn('Falha ao carregar base dinâmica da matriz', matrizCategoriasRes.error || matrizCamposRes.error || matrizEvolucoesRes.error);
      G.matrizPlanoCache = null;
    } else {
      G.matrizPlanoCache = comporMatrizPlanoCache(matrizCategoriasRes.data || [], matrizCamposRes.data || [], matrizEvolucoesRes.data || []);
    }
  }

  function splitRichSections(text) {
    const source = String(text || '').replace(/\r/g, '').trim();
    if (!source) return [];
    const lines = source.split('\n');
    const sections = [];
    let current = null;
    const flush = () => {
      if (!current) return;
      current.body = current.body.trim();
      sections.push(current);
    };
    lines.forEach(line => {
      const trimmed = line.trim();
      if (trimmed.startsWith('## ')) {
        flush();
        current = { heading: trimmed.slice(3).trim(), body: '' };
        return;
      }
      if (!current) current = { heading: '', body: '' };
      current.body += (current.body ? '\n' : '') + line;
    });
    flush();
    return sections;
  }

  function parsePlanoNucleos(secao) {
    return splitRichSections(secao.corpo).map(item => ({
      titulo: item.heading || 'Núcleo',
      descricao: item.body.replace(/\n+/g, ' ').trim()
    })).filter(item => item.titulo || item.descricao);
  }

  function parsePlanoTrilha(secao) {
    const defaults = {
      'júnior': { color: '#3E7858', bg: '#eaf5ee', border: '#b8d9c9' },
      'junior': { color: '#3E7858', bg: '#eaf5ee', border: '#b8d9c9' },
      'pleno': { color: '#4A72B5', bg: '#eaf0fb', border: '#b3caea' },
      'sênior': { color: '#C49A27', bg: '#fbf3e8', border: '#d9c9ae' },
      'senior': { color: '#C49A27', bg: '#fbf3e8', border: '#d9c9ae' }
    };
    return splitRichSections(secao.corpo).map(item => {
      const [labelRaw, color, bg, border] = item.heading.split('|').map(part => part.trim());
      const palette = defaults[(labelRaw || '').toLowerCase()] || { color: '#666', bg: '#f6f5f1', border: '#d8d6cf' };
      const levels = item.body.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
        const [num, focus, desc] = line.split('|').map(part => (part || '').trim());
        return { num, focus, desc };
      }).filter(level => level.num && level.focus);
      return {
        label: labelRaw || 'Trilha',
        color: color || palette.color,
        bg: bg || palette.bg,
        border: border || palette.border,
        levels
      };
    }).filter(item => item.levels.length);
  }

  function parsePlanoCriterios(secao) {
    return String(secao.corpo || '')
      .replace(/\r/g, '')
      .split('\n')
      .map(line => line.trim())
      .filter(line => line.startsWith('- '))
      .map(line => {
        const raw = line.slice(2);
        const [titulo, desc] = raw.split('|');
        return { titulo: (titulo || '').trim(), desc: (desc || '').trim() };
      })
      .filter(item => item.titulo);
  }

  // ── CARGA DE TERRA ─────────────────────────────────────────────────────────
  function renderCargaTerra() {
    return `
      <section class="secao-shell">
        <div class="secao-shell-header">
          <div>
            <div class="secao-shell-title">Carga de Terra em Jardins sobre Laje</div>
            <div class="secao-shell-sub">Critério de cálculo para comunicação técnica entre paisagismo e estrutura</div>
          </div>
        </div>

        <div class="rich-body">
          <h3>Critério de cálculo</h3>
          <p>O peso de um jardim deve ser calculado no <strong>pior cenário possível</strong>: terra completamente saturada de água, como ocorre durante uma chuva torrencial. O <strong>peso específico da terra molhada</strong> utilizado é de <strong>2.000 kg/m³</strong>.</p>
          <p>A fórmula básica é simples:</p>
        </div>

        <div class="ct-formula-box" style="background:#f5f3ee;border:1px solid #e0dbd0;border-radius:8px;padding:16px 20px;margin-bottom:16px;font-family:var(--fm)">
          <div class="ct-formula-label" style="font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#888;margin-bottom:10px">Fórmula</div>
          <div class="ct-formula-expr" style="font-size:15px;color:var(--preto);font-weight:600;letter-spacing:-.2px">
            Peso (kg/m²) = Peso específico (kg/m³) × Altura da terra (m)
          </div>
          <div style="margin-top:12px;display:flex;gap:20px;flex-wrap:wrap">
            <div class="ct-example" style="font-size:11px;color:#555">
              <span class="ct-chip" style="display:inline-block;background:var(--branco);border:1px solid var(--cinza);border-radius:4px;padding:3px 10px;font-family:var(--fm);margin-right:4px">50 cm</span>
              2.000 × 0,5 = <strong>1.000 kg/m²</strong>
            </div>
            <div class="ct-example" style="font-size:11px;color:#555">
              <span class="ct-chip" style="display:inline-block;background:var(--branco);border:1px solid var(--cinza);border-radius:4px;padding:3px 10px;font-family:var(--fm);margin-right:4px">30 cm</span>
              2.000 × 0,3 = <strong>600 kg/m²</strong>
            </div>
          </div>
        </div>

        <div class="rich-body">
          <h3>Cargas adicionais — Vasos</h3>
          <p>Quando há vasos no projeto, a carga deve ser calculada separadamente, pois geram <strong>carga pontual</strong> (não distribuída):</p>
          <ul>
            <li>Peso do jardim sobre a laje (conforme cálculo acima)</li>
            <li><strong>Carga pontual dos vasos</strong> = peso do vaso + peso da terra dentro do vaso + peso estimado da planta na sua formação final</li>
          </ul>
          <p>Esses valores devem ser informados ao estrutural para avaliação das cargas pontuais na laje.</p>

          <h3>Cargas adicionais — Árvores plantadas diretamente</h3>
          <p>Para árvores plantadas diretamente na terra (sem vasos), deve-se pontuar cargas adicionais estimando:</p>
          <ul>
            <li>Volume adicional do morrote de terra ao redor do torrão</li>
            <li>Peso estimado da árvore na formação final</li>
          </ul>

          <h3>Aplicação em projetos de incorporação</h3>
          <p>Este cálculo é essencial na <strong>comunicação entre paisagismo e estrutura</strong>. O registro técnico entregue ao final do projeto deve conter o volume da terra molhada e seu peso total, somado ao peso das plantas — especialmente quando vasos de grande porte ou árvores estão presentes.</p>
        </div>
      </section>

      <!-- CALCULADORA -->
      <section class="secao-shell">
        <div class="secao-shell-header">
          <div>
            <div class="secao-shell-title">Calculadora de Carga de Terra</div>
            <div class="secao-shell-sub">Calcule o peso por m² para informar ao estrutural</div>
          </div>
        </div>

        <!-- Carga distribuída -->
        <div style="font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#999;margin-bottom:12px">Carga distribuída — jardim sobre laje</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px">

          <div>
            <label style="display:block;font-size:8px;font-weight:700;letter-spacing:.65px;text-transform:uppercase;color:#999;margin-bottom:6px">Peso específico (kg/m³)</label>
            <input id="ct-peso-esp" type="number" value="2000" min="500" max="2500" step="50"
              oninput="calcCargaTerra()"
              style="width:100%;padding:10px 12px;border:1px solid var(--cinza);border-radius:6px;font-family:var(--fm);font-size:13px;outline:none;box-sizing:border-box;color:var(--preto)">
            <div style="font-size:9px;color:#aaa;margin-top:4px">Padrão: 2.000 kg/m³ (terra saturada)</div>
          </div>

          <div>
            <label style="display:block;font-size:8px;font-weight:700;letter-spacing:.65px;text-transform:uppercase;color:#999;margin-bottom:6px">Altura da terra (cm)</label>
            <input id="ct-altura" type="number" value="30" min="1" max="200" step="1"
              oninput="calcCargaTerra()"
              style="width:100%;padding:10px 12px;border:1px solid var(--cinza);border-radius:6px;font-family:var(--fm);font-size:13px;outline:none;box-sizing:border-box;color:var(--preto)">
            <div style="font-size:9px;color:#aaa;margin-top:4px">Ex: 30 cm = substrato raso</div>
          </div>

          <div>
            <label style="display:block;font-size:8px;font-weight:700;letter-spacing:.65px;text-transform:uppercase;color:#999;margin-bottom:6px">Resultado</label>
            <div id="ct-resultado"
              style="padding:10px 14px;border:2px solid var(--verde);border-radius:6px;background:#f0faf4;font-family:var(--fm);font-size:20px;font-weight:700;color:var(--verde);line-height:1.2">
              600 <span style="font-size:12px;font-weight:400;color:#666">kg/m²</span>
            </div>
            <div id="ct-resultado-sub" style="font-size:9px;color:#888;margin-top:4px">2.000 × 0,30 m</div>
          </div>
        </div>

        <!-- Carga de vaso -->
        <div style="border-top:1px solid var(--cinza2);padding-top:16px;margin-top:4px">
          <div style="font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#999;margin-bottom:12px">Carga pontual — vaso individual</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:16px">

            <div>
              <label style="display:block;font-size:8px;font-weight:700;letter-spacing:.65px;text-transform:uppercase;color:#999;margin-bottom:6px">Peso do vaso (kg)</label>
              <input id="ct-vaso-peso" type="number" value="0" min="0" step="0.5"
                oninput="calcCargaVaso()"
                style="width:100%;padding:10px 12px;border:1px solid var(--cinza);border-radius:6px;font-family:var(--fm);font-size:13px;outline:none;box-sizing:border-box;color:var(--preto)">
            </div>

            <div>
              <label style="display:block;font-size:8px;font-weight:700;letter-spacing:.65px;text-transform:uppercase;color:#999;margin-bottom:6px">Terra no vaso (kg)</label>
              <input id="ct-vaso-terra" type="number" value="0" min="0" step="0.5"
                oninput="calcCargaVaso()"
                style="width:100%;padding:10px 12px;border:1px solid var(--cinza);border-radius:6px;font-family:var(--fm);font-size:13px;outline:none;box-sizing:border-box;color:var(--preto)">
              <div style="font-size:9px;color:#aaa;margin-top:4px">Volume (m³) × 2.000</div>
            </div>

            <div>
              <label style="display:block;font-size:8px;font-weight:700;letter-spacing:.65px;text-transform:uppercase;color:#999;margin-bottom:6px">Peso da planta (kg)</label>
              <input id="ct-vaso-planta" type="number" value="0" min="0" step="0.5"
                oninput="calcCargaVaso()"
                style="width:100%;padding:10px 12px;border:1px solid var(--cinza);border-radius:6px;font-family:var(--fm);font-size:13px;outline:none;box-sizing:border-box;color:var(--preto)">
              <div style="font-size:9px;color:#aaa;margin-top:4px">Estimativa na formação final</div>
            </div>

            <div>
              <label style="display:block;font-size:8px;font-weight:700;letter-spacing:.65px;text-transform:uppercase;color:#999;margin-bottom:6px">Carga pontual total</label>
              <div id="ct-vaso-resultado"
                style="padding:10px 14px;border:2px solid var(--azul);border-radius:6px;background:#eef3fb;font-family:var(--fm);font-size:20px;font-weight:700;color:var(--azul);line-height:1.2">
                0 <span style="font-size:12px;font-weight:400;color:#666">kg</span>
              </div>
              <div style="font-size:9px;color:#888;margin-top:4px">por ponto de carga</div>
            </div>
          </div>
        </div>

        <!-- Nota técnica gerada -->
        <div style="border-top:1px solid var(--cinza2);padding-top:16px;margin-top:4px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#999">Nota técnica para registro</div>
            ${canEditApoio() ? `<button class="btn sm" onclick="abrirEditNotaCargaTerra()">✎ Editar base</button>` : ''}
          </div>
          <div id="ct-nota"
            style="background:var(--off);border:1px solid var(--cinza);border-radius:6px;padding:14px 16px;font-size:11px;color:#555;line-height:1.8;white-space:pre-wrap;font-family:var(--f)">—</div>
          <button onclick="copiarNotaCargaTerra()"
            style="margin-top:10px;font-size:10px;padding:6px 14px;border:1px solid var(--cinza);border-radius:6px;background:var(--branco);cursor:pointer;font-family:var(--f);color:#666;transition:all .12s"
            onmouseover="this.style.borderColor='var(--preto)';this.style.color='var(--preto)'"
            onmouseout="this.style.borderColor='var(--cinza)';this.style.color='#666'">
            Copiar nota
          </button>
        </div>
      </section>`;
  }

  // ── Funções da calculadora de carga de terra (escopo global) ─
  function _ctFmt(n) { return Number(n).toLocaleString('pt-BR', {maximumFractionDigits:1}); }

  function _ctAtualizarNota() {
    const pe      = parseFloat(document.getElementById('ct-peso-esp')?.value) || 0;
    const alt     = parseFloat(document.getElementById('ct-altura')?.value)   || 0;
    const altM    = alt / 100;
    const cargaM2 = pe * altM;
    const vaso    = parseFloat(document.getElementById('ct-vaso-peso')?.value)   || 0;
    const terra   = parseFloat(document.getElementById('ct-vaso-terra')?.value)  || 0;
    const planta  = parseFloat(document.getElementById('ct-vaso-planta')?.value) || 0;
    const totalVaso = vaso + terra + planta;
    let nota = 'CARGA DE TERRA — REGISTRO TÉCNICO\n';
    nota += '─────────────────────────────────\n';
    nota += 'Carga distribuída (jardim sobre laje):\n';
    nota += '  Peso específico utilizado: ' + _ctFmt(pe) + ' kg/m³ (terra saturada — pior cenário)\n';
    nota += '  Altura da terra: ' + _ctFmt(alt) + ' cm (' + altM.toFixed(2).replace('.',',') + ' m)\n';
    nota += '  Peso total: ' + _ctFmt(cargaM2) + ' kg/m²\n';
    if (totalVaso > 0) {
      nota += '\nCarga pontual (vaso individual):\n';
      if (vaso > 0)   nota += '  Peso do vaso:   ' + _ctFmt(vaso)   + ' kg\n';
      if (terra > 0)  nota += '  Terra no vaso:  ' + _ctFmt(terra)  + ' kg\n';
      if (planta > 0) nota += '  Peso da planta: ' + _ctFmt(planta) + ' kg\n';
      nota += '  Carga pontual total: ' + _ctFmt(totalVaso) + ' kg por ponto\n';
    }
    nota += '\nRef.: peso específico da terra molhada = 2.000 kg/m³ (máximo — NBR e prática estrutural).';
    const notaBase = G.temasMetaCache?.['carga-terra']?.nota_base || '';
    const el = document.getElementById('ct-nota');
    if (el) el.textContent = nota + (notaBase ? '\n\n' + notaBase : '');
  }

  window.calcCargaTerra = function() {
    const pe  = parseFloat(document.getElementById('ct-peso-esp')?.value) || 0;
    const alt = parseFloat(document.getElementById('ct-altura')?.value)   || 0;
    const altM = alt / 100;
    const res  = pe * altM;
    const resEl = document.getElementById('ct-resultado');
    const subEl = document.getElementById('ct-resultado-sub');
    if (resEl) resEl.innerHTML = _ctFmt(res) + ' <span style="font-size:12px;font-weight:400;color:#666">kg/m²</span>';
    if (subEl) subEl.textContent = _ctFmt(pe) + ' × ' + altM.toFixed(2).replace('.',',') + ' m';
    _ctAtualizarNota();
  };

  window.calcCargaVaso = function() {
    const vaso   = parseFloat(document.getElementById('ct-vaso-peso')?.value)   || 0;
    const terra  = parseFloat(document.getElementById('ct-vaso-terra')?.value)  || 0;
    const planta = parseFloat(document.getElementById('ct-vaso-planta')?.value) || 0;
    const total  = vaso + terra + planta;
    const el = document.getElementById('ct-vaso-resultado');
    if (el) el.innerHTML = _ctFmt(total) + ' <span style="font-size:12px;font-weight:400;color:#666">kg</span>';
    _ctAtualizarNota();
  };

  window.copiarNotaCargaTerra = function() {
    const el = document.getElementById('ct-nota');
    if (!el) return;
    navigator.clipboard.writeText(el.textContent).then(() => {
      const btn = document.querySelector('[onclick="copiarNotaCargaTerra()"]');
      if (!btn) return;
      const orig = btn.textContent;
      btn.textContent = 'Copiado ✓';
      setTimeout(() => { btn.textContent = orig; }, 1800);
    }).catch(() => {
      const range = document.createRange();
      range.selectNodeContents(el);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
      document.execCommand('copy');
    });
  };

    function csSetCopyVisible(id, visible) {
      // botões de copiar dentro de cada quadro (canto superior direito)
      const cl = document.getElementById(`cs-copy-login-${id}`);
      const cs = document.getElementById(`cs-copy-senha-${id}`);
      if(cl) cl.style.display = visible ? 'inline-flex' : 'none';

    function csAutoHide(id) {
      const loginEl = document.getElementById(`cs-login-${id}`);
      const senhaEl = document.getElementById(`cs-senha-${id}`);
      if(loginEl) { loginEl.textContent = '---------'; loginEl.dataset.revealed = 'false'; }
      if(senhaEl) { senhaEl.textContent = '---------'; senhaEl.dataset.revealed = 'false'; }
      csSetCopyVisible(id, false);
      delete window.__csTimers[id];
    }

    function csStartTimer(id) {
      if(window.__csTimers[id]) clearTimeout(window.__csTimers[id]);
      window.__csTimers[id] = setTimeout(() => csAutoHide(id), 180000);
    }

    window.csToggleReveal = async function(id) {
      const loginEl = document.getElementById(`cs-login-${id}`);
      const senhaEl = document.getElementById(`cs-senha-${id}`);
      if(!loginEl || !senhaEl) return;
      const cache = window.__csSecretsCache[id];
      if(cache) {
        loginEl.textContent = cache.login || '—';
        senhaEl.textContent = cache.senha || '—';
        loginEl.dataset.revealed = 'true';
        senhaEl.dataset.revealed = 'true';
        csSetCopyVisible(id, true);
        csStartTimer(id);
        return;
      }
      const eyeL = document.getElementById(`cs-eye-login-${id}`);
      const eyeS = document.getElementById(`cs-eye-senha-${id}`);
      if(eyeL) eyeL.style.opacity = '.4';
      if(eyeS) eyeS.style.opacity = '.4';
      const { data, error } = await sb.rpc('cs_reveal_credential', { p_plataforma_id: id });
      if(eyeL) eyeL.style.opacity = '';
      if(eyeS) eyeS.style.opacity = '';
      if(error) {
        toast('Erro ao revelar credencial: ' + error.message);
        return;
      }
      const row = Array.isArray(data) ? data[0] : data;
      window.__csSecretsCache[id] = {
        login: row?.login || '—',
        senha: row?.senha || '—'
      };
      loginEl.textContent = window.__csSecretsCache[id].login;
      senhaEl.textContent = window.__csSecretsCache[id].senha;
      loginEl.dataset.revealed = 'true';
      senhaEl.dataset.revealed = 'true';
      csSetCopyVisible(id, true);
      csStartTimer(id);
      // Registra visualização (silencioso caso a tabela não exista)
      sb.from('cadastros_plataformas_log').insert({
        plataforma_id: id,
        usuario_id:   G.usuario?.id || null,
        usuario_nome: G.usuario?.nome || null,
        visualizado_em: new Date().toISOString()
      }).then(() => {}).catch(() => {});
    };

    async function csGetCredencial(id) {
      if(window.__csSecretsCache[id]) return window.__csSecretsCache[id];
      const { data, error } = await sb.rpc('cs_reveal_credential', { p_plataforma_id: id });
      if(error) throw error;
      const row = Array.isArray(data) ? data[0] : data;
      window.__csSecretsCache[id] = { login: row?.login || '—', senha: row?.senha || '—' };
      return window.__csSecretsCache[id];
    }

    window.__csBadgeTimers = window.__csBadgeTimers || {};

      const tooltip = document.getElementById(`cs-tooltip-${id}`);

      tooltip.style.display = 'block';
      tooltip.innerHTML = `<div class="cs-badge-tooltip-hd">Últimos acessos</div><div class="cs-badge-tooltip-empty">Carregando…</div>`;
      try {
        const { data, error } = await sb
          .from('cadastros_plataformas_log')
          .select('usuario_nome, visualizado_em')
          .eq('plataforma_id', id)
          .order('visualizado_em', { ascending: false })

        if(error) throw error;
        if(!data || !data.length) {
          tooltip.innerHTML = `<div class="cs-badge-tooltip-hd">Últimos acessos</div><div class="cs-badge-tooltip-empty">Nenhum acesso registrado.</div>`;
          return;
        }
        const fmt = d => {
          const dt = new Date(d);
          return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' ' +
                 dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
        };

        const orig = btn.textContent;
        btn.textContent = '✓';
        btn.style.color = 'var(--verde)';
        btn.style.borderColor = 'var(--verde)';
        setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 1200);
      } catch(e) { toast('Não foi possível copiar o login.'); }
    };

    window.csCopiarSenha = async function(id) {
      try {
        const cred = await csGetCredencial(id);
        await navigator.clipboard.writeText(cred.senha || '');
        const btn = event.currentTarget;
        const orig = btn.textContent;
        btn.textContent = '✓';
        btn.style.color = 'var(--verde)';
        btn.style.borderColor = 'var(--verde)';
        setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 1200);
      } catch(e) { toast('Não foi possível copiar a senha.'); }

    window.csSalvar = async function() {
      if(!isSocio()) {
        toast('Apenas sócios podem editar cadastros e senhas.');
        return;
      }
      const id = document.getElementById('cs-edit-id').value;
      const payload = {
        nome: document.getElementById('cs-f-nome').value.trim(),
        numero: parseInt(document.getElementById('cs-f-numero').value) || plats.length + 1,
        nivel_acesso: document.getElementById('cs-f-nivel-acesso').value || 'socio',
        uso: document.getElementById('cs-f-uso').value.trim(),
        clientes: document.getElementById('cs-f-clientes').value.trim(),
        cofre_link: document.getElementById('cs-f-cofre-link').value.trim(),
        observacoes: document.getElementById('cs-f-observacoes').value.trim()
      };
      const credencial = {
        login: document.getElementById('cs-f-login').value.trim(),
        senha: document.getElementById('cs-f-senha').value.trim()
      };
      if(!payload.nome) {
        toast('Informe o nome da plataforma.');
        return;
      }
      const { data, error } = await sb.rpc('cs_save_plataforma', {
        p_id: id || null,
        p_numero: payload.numero,
        p_nome: payload.nome,
        p_nivel_acesso: payload.nivel_acesso,
        p_uso: payload.uso || null,
        p_clientes: payload.clientes || null,
        p_cofre_link: payload.cofre_link || null,
        p_observacoes: payload.observacoes || null,
        p_login: credencial.login || null,
        p_senha: credencial.senha || null
      });
      if(error) {
        const msg = String(error.message || '');
        if (error.code === 'PGRST202' || msg.includes('cs_save_plataforma') || msg.includes('schema cache')) {
          toast('Atualize o SQL de Cadastros e Senhas no Supabase antes de salvar alterações nesta área.');
          return;
        }
        toast('Erro ao salvar plataforma: ' + error.message);
        return;
      }
      const plataformaId = (Array.isArray(data) ? data[0] : data) || id;
      delete window.__csSecretsCache[plataformaId];
      iniciarCadastrosSenhas();
    };

    window.csDeletar = async function(id, nome) {
      if(!isSocio()) {
        toast('Apenas sócios podem editar cadastros e senhas.');
        return;
      }
      abrirPopupConfirm('Excluir plataforma', 'Excluir a plataforma "' + nome + '"?', async function() {
        const { error } = await sb.from('cadastros_plataformas').delete().eq('id', id);
        if(error) {
          toast('Erro ao excluir: ' + error.message);
          return;
        }
        delete window.__csSecretsCache[id];
        iniciarCadastrosSenhas();
      });
    };
  }

  function normalizeText(text) {
    return String(text || '')
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .toLowerCase()
      .trim();
  }

  function parseRangeCm(text) {
    const raw = String(text || '').replace(/\u00a0/g, ' ').trim().toLowerCase();
    if(!raw) return { min: null, max: null };
    const unitMatches = [...raw.matchAll(/(\d+(?:[.,]\d+)?)\s*(cm|m)\b/g)];
    if(unitMatches.length) {
      const values = unitMatches.map(match => {
        const value = parseFloat(match[1].replace(',', '.'));
        return match[2] === 'm' ? value * 100 : value;
      }).filter(value => Number.isFinite(value));
      if(values.length) return { min: Math.min(...values), max: Math.max(...values) };
    }
    const numbers = [...raw.matchAll(/(\d+(?:[.,]\d+)?)/g)]
      .map(match => parseFloat(match[1].replace(',', '.')))
      .filter(value => Number.isFinite(value));
    if(!numbers.length) return { min: null, max: null };
    const factor = raw.includes('cm') ? 1 : raw.includes('m') ? 100 : 1;
    const values = numbers.map(value => value * factor);
    return { min: Math.min(...values), max: Math.max(...values) };
  }

  function inferPorte(row) {
    const range = parseRangeCm(row.porte_final || row.porte_inicial || '');
    const ref = range.max || range.min;
    const grupo = normalizeText(row.grupo);
    if(!ref) return '';
    if(grupo.includes('arborea')) {
      if(ref <= 600) return 'pequeno';
      if(ref <= 1200) return 'medio';
      return 'grande';
    }
    if(ref <= 60) return 'baixo';
    if(ref <= 180) return 'pequeno';
    if(ref <= 500) return 'medio';
    return 'grande';
  }

  function normalizeSpecies(row) {
    const porteRange = parseRangeCm(row.porte_final || row.porte_inicial || '');
    return {
      ...row,
      _porteMin: porteRange.min,
      _porteMax: porteRange.max,
      _porteCategoria: inferPorte(row)
    };
  }

  function uniqueSorted(values) {
    return [...new Set(values.filter(Boolean).map(value => String(value).trim()))].sort((a, b) => a.localeCompare(b, 'pt-BR'));
  }

  function speciesType(row) {
    return row.tipo_vegetacao || row.familia || '';
  }

  function speciesHeight(row) {
    return row.porte_final || row.porte_inicial || '';
  }

  function matchesAltura(row, target) {
    const number = parseFloat(String(target || '').replace(',', '.'));
    if(!Number.isFinite(number)) return true;
    const min = row._porteMin;
    const max = row._porteMax;
    if(min == null && max == null) return true;
    if(min != null && max != null && number >= (min - 20) && number <= (max + 20)) return true;
    const ref = max || min;
    return Math.abs(ref - number) <= Math.max(20, ref * 0.25);
  }

  function filteredSpecies() {
    const filtros = G.vegFilters;
    return G.vegetacaoSpecies.filter(row => {
      const haystack = normalizeText([
        row.nome_popular,
        row.nome_cientifico,
        row.tipo_vegetacao,
        row.familia,
        row.bioma,
        row.insolacao,
        row.atratividade,
        row.pragas_alertas
      ].join(' '));
      if(filtros.busca && !haystack.includes(normalizeText(filtros.busca))) return false;
      if(filtros.grupo && normalizeText(row.grupo) !== normalizeText(filtros.grupo)) return false;
      if(filtros.tipo && normalizeText(speciesType(row)) !== normalizeText(filtros.tipo)) return false;
      if(filtros.insolacao && !normalizeText(row.insolacao).includes(normalizeText(filtros.insolacao))) return false;
      if(filtros.porte && row._porteCategoria !== filtros.porte) return false;
      if(filtros.altura && !matchesAltura(row, filtros.altura)) return false;
      return true;
    });
  }

  window.validarEspecie = async function(id, validar) {
    if(!canValidarVegetacao()) {
      toast('Apenas sócios podem validar espécies.');
      return;
    }
    const payload = validar
      ? { validado: true,  validado_por: G.usuario.id, validado_em: new Date().toISOString() }
      : { validado: false, validado_por: null,          validado_em: null };
    const { error } = await sb.from('apoio_vegetacao_especie').update(payload).eq('id', id);
    if(error) { toast('Erro ao validar: ' + error.message); return; }
    // Atualiza cache local
    const idx = G.vegetacaoSpecies.findIndex(s => s.id === id);
    if(idx !== -1) Object.assign(G.vegetacaoSpecies[idx], payload);
    renderTema();
  };

  function upsertSpeciesLocal(species) {
    const normalized = normalizeSpecies(species);
    const idx = G.vegetacaoSpecies.findIndex(item => item.id === species.id);
    if(idx === -1) G.vegetacaoSpecies.unshift(normalized);
    else G.vegetacaoSpecies[idx] = normalized;
  }

  salvarModal = async function() {
    const ctx = G.modalCtx;
    if(!ctx) return;
    // Handle new dynamic types (ctx.type)
    const DYNAMIC_TYPES = ['tema-hdr','nova-indicacao','edit-indicacao','nova-norma','edit-norma','novo-jv-subcard','edit-jv-subcard','edit-nota-carga','edit-norma-guide','novo-subtema','edit-subtema-custom'];
    if(ctx.type && DYNAMIC_TYPES.includes(ctx.type)) { await _handleDynamicModalSave(ctx); return; }
    if(ctx.tipo !== 'apoio-secao' && ctx.tipo !== 'apoio-especie' && ctx.tipo !== 'memorial-vegetal') return oldSalvarModal();
    if(ctx.tipo === 'memorial-vegetal') { salvarMemorialVegetal(); return; }
    if(ctx.tipo === 'apoio-secao' && !canEditApoio()) {
      toast('Apenas sócios podem editar o apoio.');
      return;
    }
    if(ctx.tipo === 'apoio-especie' && !canEditVegetacao()) {
      toast('Faça login para editar o banco vegetal.');
      return;
    }

    const btn = document.getElementById('modal-salvar-btn');
    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      if(ctx.tipo === 'apoio-secao') {
        if(!G.apoioTables.conteudo) throw new Error('A tabela apoio_conteudo_secao ainda não existe no Supabase.');
        const payload = readSectionPayload(ctx.slug);
        const { data, error } = await sb.from('apoio_conteudo_secao')
          .upsert(payload, { onConflict: 'slug' })
          .select()
          .single();
        if(error) throw error;
        upsertSectionLocal(data || payload);
      }

      if(ctx.tipo === 'apoio-especie') {
        if(!G.apoioTables.vegetacao) throw new Error('A tabela apoio_vegetacao_especie ainda não existe no Supabase.');
        const payload = readSpeciesPayload(ctx.id);
        if(!payload.nome_popular) throw new Error('Informe ao menos o nome popular da espécie.');
        if(ctx.id) {
          const { data, error } = await sb.from('apoio_vegetacao_especie')
            .update(payload)
            .eq('id', ctx.id)
            .select()
            .single();
          if(error) throw error;
          upsertSpeciesLocal(data || payload);
        } else {
          const { data, error } = await sb.from('apoio_vegetacao_especie')
            .insert(payload)
            .select()
            .single();
          if(error) throw error;
          upsertSpeciesLocal(data || payload);
        }
      }

      fecharModal();
      renderTema();
    } catch(err) {
      toast('Erro ao salvar: ' + (err.message || JSON.stringify(err)));
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  };

  async function salvarMemorialVegetal() {
    const btn = document.getElementById('modal-salvar-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
    try {
      const produtoId  = document.getElementById('mem-produto')?.value || null;
      const titulo     = document.getElementById('mem-titulo')?.value.trim() || 'Memorial Descritivo de Vegetação';
      const descricao  = document.getElementById('mem-descricao')?.value.trim() || null;

      const { data: mem, error } = await sb.from('memorial_vegetal')
        .insert({ produto_id: produtoId || null, titulo, descricao, criado_por: G.usuario?.id || null })
        .select().single();
      if (error) throw error;

      const especies = [...G.vegSelecionadas]
        .map(id => G.vegetacaoSpecies.find(s => s.id === id))
        .filter(Boolean);

      const itens = especies.map((e, i) => ({
        memorial_id:    mem.id,
        especie_id:     e.id,
        quantidade:     document.querySelector(`.mem-input[data-field="qtd"][data-id="${e.id}"]`)?.value.trim()  || null,
        area_aplicacao: document.querySelector(`.mem-input[data-field="area"][data-id="${e.id}"]`)?.value.trim() || null,
        observacao:     document.querySelector(`.mem-input[data-field="obs"][data-id="${e.id}"]`)?.value.trim()  || null,
        ordem: i
      }));

      if (itens.length) {
        const { error: errItens } = await sb.from('memorial_vegetal_item').insert(itens);
        if (errItens) throw errItens;
      }

      toast('Memorial salvo com sucesso');
      fecharModal();
      G.vegSelectionMode = false;
      G.vegSelecionadas  = new Set();
      renderTema();
    } catch(err) {
      toast('Erro: ' + (err.message || err));
      if (btn) { btn.disabled = false; btn.textContent = 'Salvar'; }
    }
  }

  function pushContentSearchResults(resultados, q) {
    DEFAULT_SECOES.forEach(secao => {
      const merged = getSection(secao.slug);
      const source = normalizeText([merged.titulo, merged.resumo, merged.corpo].join(' '));
      if(!source.includes(q)) return;
      let action = `setTema('cultura')`;
      let path = 'Cultura';
      if(merged.grupo === 'organizacao') {
        action = `setTema('organizacao');setSubtemaOrg('${merged.subgrupo}')`;
        path = 'Organização Interna';
      }
      if(merged.grupo === 'conhecimento' || merged.grupo === 'apoio') {
        if(merged.subgrupo === 'vegetacao') action = `abrirSubtemaConhecimento('vegetacao')`;
        else if(merged.subgrupo && merged.subgrupo.startsWith('normas-')) action = `abrirSubtemaConhecimento('normas-tecnicas','${merged.subgrupo.replace('normas-', '')}')`;
        else action = `abrirSubtemaConhecimento('${merged.subgrupo}')`;
        path = 'Conhecimento';
      }
      resultados.push({ path, titulo: merged.titulo, snippet: snip(merged.corpo, q), action });
    });

        titulo: item.nome_popular || 'Espécie',
        snippet: [item.nome_cientifico, item.insolacao, item.bioma].filter(Boolean).join(' · '),
        action: `abrirBuscaVegetacao(${jsStr(item.nome_popular || item.nome_cientifico || '')})`
      });
    });
  }

  buscar = function(query) {
    const el = document.getElementById('apoio-content');
    if(!query || query.trim().length < 2) {
      renderTema();
      return;
    }
    const q = normalizeText(query);
    const resultados = [];
    pushProjectSearchResults(resultados, q);
    pushContentSearchResults(resultados, q);
    pushSpeciesSearchResults(resultados, q);

    if(resultados.length === 0) {
      el.innerHTML = `<div class="search-empty">Nenhum resultado para "${escHtml(query)}".</div>`;
      return;
    }

    el.innerHTML = `
      <div class="content-hdr">
        <div class="content-hdr-left">
          <div class="content-title">Resultados para "${escHtml(query)}"</div>
          <div class="content-sub">${resultados.length} resultado${resultados.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="content-hdr-actions">
          <button class="btn sm" onclick="document.getElementById('sb-search-input').value='';renderTema()">Limpar</button>
        </div>
      </div>
      <div class="search-results-wrap">
        <div class="search-results-hdr">${resultados.length} ocorrência${resultados.length !== 1 ? 's' : ''}</div>
        ${resultados.map(r => `
          <div class="search-result-item" onclick="${r.action}">
            <div class="sr-path">${escHtml(r.path)}</div>
            <div class="sr-titulo">${escHtml(r.titulo)}</div>
            ${r.snippet ? `<div class="sr-snippet">${escHtml(r.snippet)}</div>` : ''}
          </div>`).join('')}
      </div>`;
  };

  syncSidebar();
})();
</script>

  });
