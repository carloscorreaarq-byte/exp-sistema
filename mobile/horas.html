<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3E7858">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>EXP · Horas</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./assets/exp-mobile.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./assets/exp-mobile-supabase-fallback.js"></script>
  <script src="./assets/exp-mobile-core.js"></script>
  <style>
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--gap-sm) var(--gap-md);
      background: var(--m-surface);
      border-bottom: 1px solid color-mix(in srgb, var(--m-border) 20%, transparent);
      position: sticky;
      top: calc(var(--header-h) + var(--safe-t));
      margin-top: calc(var(--header-h) + var(--safe-t));
      z-index: 50;
    }
    .week-label {
      font-size: var(--mt-body);
      font-weight: 700;
      text-align: center;
    }
    .week-sub {
      font-size: var(--mt-caption);
      color: var(--m-text-3);
      text-align: center;
      margin-top: 1px;
    }
    .week-nav-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--m-text-2);
      transition: background var(--m-transition);
      -webkit-tap-highlight-color: transparent;
      border: none; background: none; cursor: pointer;
    }
    .week-nav-btn:active { background: color-mix(in srgb, var(--m-border) 20%, transparent); }
    .week-nav-btn svg { width: 18px; height: 18px; stroke-width: 2.2; }
    .week-nav-btn:disabled { opacity: 0.3; pointer-events: none; }

    .day-group { margin-bottom: var(--gap-md); }
    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--gap-xs);
      padding: 0 var(--gap-xs);
    }
    .day-label {
      font-size: var(--mt-label);
      font-weight: var(--weight-label);
      text-transform: uppercase;
      letter-spacing: var(--label-spacing);
      color: var(--m-text-3);
    }
    .day-total {
      font-size: var(--mt-label);
      font-weight: var(--weight-label);
      color: var(--verde);
      font-family: var(--font-mono);
    }

    .lancamento-item {
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
      padding: 11px var(--gap-md);
      background: var(--m-surface);
      border: 1px solid color-mix(in srgb, var(--m-border) 22%, transparent);
      border-radius: var(--m-radius-card);
      margin-bottom: var(--gap-xs);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform var(--m-transition);
    }
    .lancamento-item:active { transform: scale(0.98); }
    .lancamento-time {
      font-size: var(--mt-caption);
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--verde);
      text-align: center;
      line-height: 1.3;
      flex-shrink: 0;
      min-width: 52px;
    }
    .lancamento-body { flex: 1; min-width: 0; }
    .lancamento-titulo {
      font-size: var(--mt-body);
      font-weight: var(--weight-semibold);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .lancamento-sub {
      font-size: var(--mt-caption);
      color: var(--m-text-2);
      margin-top: 2px;
    }
    .lancamento-dur {
      font-size: var(--mt-caption);
      font-family: var(--font-mono);
      color: var(--m-text-3);
      flex-shrink: 0;
    }
    .semana-bloqueada {
      background: var(--ouro-soft);
      border: 1px solid var(--ouro);
      border-radius: var(--m-radius-card);
      padding: var(--gap-sm) var(--gap-md);
      font-size: var(--mt-caption);
      color: var(--atencao);
      font-weight: 600;
      text-align: center;
      margin-bottom: var(--gap-md);
    }

    .fab {
      position: fixed;
      left: var(--gap-md);
      bottom: calc(var(--nav-h) + var(--safe-b) + var(--gap-md));
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--verde);
      color: var(--branco);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px color-mix(in srgb, var(--verde) 35%, transparent);
      z-index: 90;
      border: none;
      cursor: pointer;
      transition: transform var(--m-transition), opacity var(--m-transition);
      -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(0.93); opacity: 0.85; }
    .fab svg { width: 24px; height: 24px; stroke-width: 2.2; }
    .fab.hidden { pointer-events: none; opacity: 0; }
  </style>
</head>
<body>

  <header class="app-header">
    <a href="./app.html" class="header-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
      Início
    </a>
    <div class="header-title">Horas</div>
  </header>

  <!-- Navegação de semana (sticky) -->
  <div class="week-nav">
    <button class="week-nav-btn" id="btn-prev" onclick="navSemana(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div>
      <div class="week-label" id="week-label">…</div>
      <div class="week-sub" id="week-sub"></div>
    </div>
    <button class="week-nav-btn" id="btn-next" onclick="navSemana(1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="page page--no-header" style="padding-top:0">
    <div class="page-content" id="page-content" style="padding-bottom:calc(var(--nav-h) + var(--safe-b) + 72px)">
      <div class="loader-page"><div class="loader"></div></div>
    </div>
  </div>

  <!-- FAB: novo lançamento -->
  <button class="fab" id="fab" onclick="abrirNovo()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <!-- Sheet: novo / editar lançamento -->
  <div class="sheet-overlay" id="form-overlay" onclick="fecharForm()"></div>
  <div class="sheet" id="form-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="form-titulo">Novo lançamento</div>

    <div class="form-group">
      <label class="form-label">Dia da semana</label>
      <select class="form-input" id="f-dia"></select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--gap-sm);margin-top:var(--gap-md)">
      <div class="form-group">
        <label class="form-label">Início</label>
        <input type="time" class="form-input" id="f-inicio">
      </div>
      <div class="form-group">
        <label class="form-label">Fim</label>
        <input type="time" class="form-input" id="f-fim">
      </div>
    </div>
    <div class="form-group" style="margin-top:var(--gap-md)">
      <label class="form-label">Tipo</label>
      <select class="form-input" id="f-tipo" onchange="onTipoChange()">
        <option value="projeto">Projeto</option>
        <option value="organizacao">Organização Interna</option>
        <option value="sociedade">Sociedade</option>
      </select>
    </div>
    <div id="f-produto-wrap" class="form-group" style="margin-top:var(--gap-md)">
      <label class="form-label">Projeto</label>
      <select class="form-input" id="f-produto" onchange="onProdutoChange()">
        <option value="">Selecionar projeto…</option>
      </select>
    </div>
    <div id="f-etapa-wrap" class="form-group" style="display:none;margin-top:var(--gap-md)">
      <label class="form-label">Etapa</label>
      <select class="form-input" id="f-etapa">
        <option value="">Selecionar etapa…</option>
      </select>
    </div>
    <div class="form-group" style="margin-top:var(--gap-md)">
      <label class="form-label">Descrição</label>
      <input type="text" class="form-input" id="f-desc" placeholder="O que foi feito…">
    </div>

    <div style="margin-top:var(--gap-lg);display:flex;gap:var(--gap-sm)">
      <button class="btn btn-danger btn-sm" id="f-btn-excluir" style="display:none;margin-right:auto" onclick="excluirLancamento()">Excluir</button>
      <button class="btn btn-secondary" onclick="fecharForm()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" onclick="salvarLancamento()">Salvar</button>
    </div>
  </div>

  <script>
    const DIAS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const DIAS_FULL = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
    const SUBTIPOS = {
      organizacao: ['Capacitação','Reunião Semanal','Feedback','Reunião Interna'],
      sociedade:   ['Marketing','Prospecção','Administrativo','Jurídico','Reunião Societária','Consultoria','RH e Pessoas','Gestão','Outros'],
    };

    let G = {
      usuario: null,
      lancamentos: [],
      produtos: [],
      semanaOffset: 0, // 0 = atual, -1 = anterior, etc.
      semanaId: null,
      semanaFinalizada: false,
      editId: null,
      semanaRange: null,
    };

    // ── Helpers ──────────────────────────────────
    function getMondayOf(date) {
      const d = new Date(date);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      d.setHours(0,0,0,0);
      return d;
    }
    function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
    function toISO(d) { return d.toISOString().split('T')[0]; }
    function calcDur(ini, fim) {
      if (!ini || !fim) return 0;
      const [h1,m1] = ini.split(':').map(Number);
      const [h2,m2] = fim.split(':').map(Number);
      return ((h2*60+m2)-(h1*60+m1))/60;
    }
    function fmtDur(h) {
      const hrs = Math.floor(h), min = Math.round((h-hrs)*60);
      return min===0 ? `${hrs}h` : `${hrs}h${String(min).padStart(2,'0')}`;
    }
    function getSemanaRange(offset=0) {
      const base = new Date();
      base.setDate(base.getDate() + offset*7);
      const seg = getMondayOf(base);
      const dom = addDays(seg, 6);
      return { seg, dom, start: toISO(seg), end: toISO(dom) };
    }

    // ── Carregamento ─────────────────────────────
    async function loadSemana() {
      const sb = getSB();
      const range = getSemanaRange(G.semanaOffset);
      G.semanaRange = range;

      // Label da semana
      document.getElementById('week-label').textContent =
        `${range.seg.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} – ${range.dom.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}`;
      const isAtual = G.semanaOffset === 0;
      document.getElementById('week-sub').textContent = isAtual ? 'Semana atual' : G.semanaOffset === -1 ? 'Semana passada' : `${Math.abs(G.semanaOffset)} semanas atrás`;
      document.getElementById('btn-next').disabled = G.semanaOffset >= 0;

      document.getElementById('page-content').innerHTML = `<div class="loader-page"><div class="loader"></div></div>`;

      const [
        { data: lancamentos },
        { data: semanaData },
      ] = await Promise.all([
        sb.from('horas_lancadas')
          .select('id, data_lancamento, dia_semana, hora_inicio, hora_fim, tipo, subtipo, descricao, produto_id, etapa_id, produtos(nome), etapas(nome)')
          .eq('usuario_id', G.usuario.id)
          .gte('data_lancamento', range.start)
          .lte('data_lancamento', range.end)
          .order('data_lancamento').order('hora_inicio'),
        sb.from('semanas')
          .select('id, finalizada')
          .eq('usuario_id', G.usuario.id)
          .eq('data_inicio', range.start)
          .maybeSingle(),
      ]);

      G.lancamentos = lancamentos ?? [];
      G.semanaId = semanaData?.id ?? null;
      G.semanaFinalizada = semanaData?.finalizada ?? false;

      renderSemana();
    }

    function renderSemana() {
      const { lancamentos, semanaFinalizada } = G;
      const fab = document.getElementById('fab');
      fab.classList.toggle('hidden', semanaFinalizada);

      // Agrupa por dia
      const porDia = {};
      lancamentos.forEach(l => {
        const k = l.data_lancamento;
        if (!porDia[k]) porDia[k] = [];
        porDia[k].push(l);
      });

      const totalH = lancamentos.reduce((a, l) => a + calcDur(l.hora_inicio, l.hora_fim), 0);

      const dias = [];
      for (let i = 0; i < 7; i++) {
        const d = addDays(G.semanaRange.seg, i);
        dias.push(toISO(d));
      }

      const el = document.getElementById('page-content');
      el.innerHTML = `
        ${semanaFinalizada ? `<div class="semana-bloqueada">⚠ Semana finalizada — edição bloqueada</div>` : ''}

        <div class="stat-row" style="margin-bottom:var(--gap-lg)">
          <div class="stat-card" style="grid-column:span 3">
            <div class="stat-value">${fmtDur(totalH)}</div>
            <div class="stat-label">Total da semana</div>
          </div>
        </div>

        ${dias.map(iso => {
          const itens = porDia[iso] ?? [];
          if (!itens.length && semanaFinalizada) return '';
          const d = new Date(iso + 'T12:00:00');
          const diaLabel = DIAS_FULL[d.getDay()] + ', ' + d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
          const totalDia = itens.reduce((a,l) => a + calcDur(l.hora_inicio, l.hora_fim), 0);
          return `
            <div class="day-group">
              <div class="day-header">
                <span class="day-label">${diaLabel}</span>
                ${totalDia > 0 ? `<span class="day-total">${fmtDur(totalDia)}</span>` : ''}
              </div>
              ${itens.length === 0 ? `<div style="padding:var(--gap-sm) var(--gap-xs);font-size:var(--mt-caption);color:var(--m-text-3)">Sem lançamentos</div>` : ''}
              ${itens.map(l => {
                const dur = calcDur(l.hora_inicio, l.hora_fim);
                const titulo = l.descricao || l.produtos?.nome || l.subtipo || l.tipo;
                const sub = [l.produtos?.nome, l.etapas?.nome].filter(Boolean).join(' · ');
                return `
                  <div class="lancamento-item" onclick="${semanaFinalizada ? '' : `abrirEditar('${l.id}')`}">
                    <div class="lancamento-time">
                      ${l.hora_inicio?.slice(0,5)}<br>${l.hora_fim?.slice(0,5)}
                    </div>
                    <div class="lancamento-body">
                      <div class="lancamento-titulo">${titulo || '—'}</div>
                      ${sub ? `<div class="lancamento-sub">${sub}</div>` : ''}
                    </div>
                    <div class="lancamento-dur">${fmtDur(dur)}</div>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        }).join('')}
      `;
    }

    // ── Navegação de semana ───────────────────────
    function navSemana(dir) {
      G.semanaOffset += dir;
      loadSemana();
    }

    // ── Form helpers ─────────────────────────────
    function populaDias() {
      const sel = document.getElementById('f-dia');
      const { seg } = G.semanaRange;
      sel.innerHTML = '';
      for (let i = 0; i < 7; i++) {
        const d = addDays(seg, i);
        const opt = document.createElement('option');
        opt.value = toISO(d);
        opt.textContent = DIAS_FULL[(d.getDay())] + ', ' + d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        if (toISO(d) === toISO(new Date())) opt.selected = true;
        sel.appendChild(opt);
      }
    }

    function populaProdutos() {
      const sel = document.getElementById('f-produto');
      sel.innerHTML = '<option value="">Selecionar projeto…</option>';
      G.produtos.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.nome;
        sel.appendChild(opt);
      });
    }

    function onTipoChange() {
      const tipo = document.getElementById('f-tipo').value;
      document.getElementById('f-produto-wrap').style.display = tipo === 'projeto' ? '' : 'none';
      document.getElementById('f-etapa-wrap').style.display = 'none';
    }

    async function onProdutoChange() {
      const sb = getSB();
      const prodId = document.getElementById('f-produto').value;
      const etapaWrap = document.getElementById('f-etapa-wrap');
      const etapaSel = document.getElementById('f-etapa');
      if (!prodId) { etapaWrap.style.display = 'none'; return; }
      const { data: etapas } = await sb.from('etapas').select('id, nome, ordem').eq('produto_id', prodId).order('ordem');
      etapaSel.innerHTML = '<option value="">Selecionar etapa…</option>';
      (etapas ?? []).forEach(e => {
        const opt = document.createElement('option');
        opt.value = e.id; opt.textContent = e.nome;
        etapaSel.appendChild(opt);
      });
      etapaWrap.style.display = '';
    }

    function abrirNovo() {
      G.editId = null;
      document.getElementById('form-titulo').textContent = 'Novo lançamento';
      document.getElementById('f-btn-excluir').style.display = 'none';
      document.getElementById('f-tipo').value = 'projeto';
      document.getElementById('f-inicio').value = '';
      document.getElementById('f-fim').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-produto').value = '';
      document.getElementById('f-etapa-wrap').style.display = 'none';
      document.getElementById('f-produto-wrap').style.display = '';
      populaDias();
      openSheet('form');
    }

    function abrirEditar(id) {
      const l = G.lancamentos.find(x => x.id === id);
      if (!l) return;
      G.editId = id;
      document.getElementById('form-titulo').textContent = 'Editar lançamento';
      document.getElementById('f-btn-excluir').style.display = '';
      populaDias();
      document.getElementById('f-dia').value = l.data_lancamento;
      document.getElementById('f-inicio').value = l.hora_inicio?.slice(0,5) ?? '';
      document.getElementById('f-fim').value = l.hora_fim?.slice(0,5) ?? '';
      document.getElementById('f-tipo').value = l.tipo ?? 'projeto';
      document.getElementById('f-desc').value = l.descricao ?? '';
      onTipoChange();
      populaProdutos();
      document.getElementById('f-produto').value = l.produto_id ?? '';
      if (l.produto_id) onProdutoChange().then(() => {
        document.getElementById('f-etapa').value = l.etapa_id ?? '';
      });
      openSheet('form');
    }

    function fecharForm() { closeSheet('form'); }

    async function salvarLancamento() {
      const data_lancamento = document.getElementById('f-dia').value;
      const hora_inicio = document.getElementById('f-inicio').value;
      const hora_fim = document.getElementById('f-fim').value;
      const tipo = document.getElementById('f-tipo').value;
      const descricao = document.getElementById('f-desc').value.trim();
      const produto_id = document.getElementById('f-produto').value || null;
      const etapa_id = document.getElementById('f-etapa').value || null;

      if (!hora_inicio || !hora_fim) { showToast('Preencha início e fim', 'error'); return; }
      if (hora_fim <= hora_inicio) { showToast('Fim deve ser após o início', 'error'); return; }

      const d = new Date(data_lancamento + 'T12:00:00');
      const payload = {
        usuario_id: G.usuario.id,
        data_lancamento,
        dia_semana: d.getDay() === 0 ? 7 : d.getDay(),
        hora_inicio,
        hora_fim,
        tipo,
        descricao: descricao || null,
        produto_id: tipo === 'projeto' ? produto_id : null,
        etapa_id: tipo === 'projeto' ? etapa_id : null,
        semana_id: G.semanaId,
      };

      const sb = getSB();
      let error;
      if (G.editId) {
        ({ error } = await sb.from('horas_lancadas').update(payload).eq('id', G.editId));
      } else {
        ({ error } = await sb.from('horas_lancadas').insert(payload));
      }

      if (error) { showToast('Erro ao salvar', 'error'); return; }
      fecharForm();
      loadSemana();
      showToast(G.editId ? 'Lançamento atualizado' : 'Lançamento adicionado', 'success');
    }

    async function excluirLancamento() {
      if (!G.editId) return;
      const sb = getSB();
      const { error } = await sb.from('horas_lancadas').delete().eq('id', G.editId);
      if (error) { showToast('Erro ao excluir', 'error'); return; }
      fecharForm();
      loadSemana();
      showToast('Lançamento excluído');
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const u = await requireAuth('./index.html');
      if (!u) return;
      G.usuario = u;

      buildBottomNav('horas', isSocio(u));

      const sb = getSB();
      const { data: produtos } = await sb
        .from('produtos').select('id, nome').eq('status','ativo').order('nome');
      G.produtos = produtos ?? [];
      populaProdutos();

      loadSemana();
    });
  </script>

</body>
</html>
