<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3E7858">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EXP · Acesso</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="stylesheet" href="./assets/exp-mobile.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./assets/exp-mobile-supabase-fallback.js"></script>
  <script src="./assets/exp-mobile-core.js"></script>
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--gap-lg);
      padding-top: calc(var(--gap-lg) + var(--safe-t));
      padding-bottom: calc(var(--gap-lg) + var(--safe-b));
      position: relative;
      overflow: hidden;
    }
    /* Mancha verde sutil ao fundo (igual ao desktop) */
    body::after {
      content: '';
      position: fixed;
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(62,120,88,.07) 0%, transparent 70%);
      top: -120px; right: -120px;
      pointer-events: none;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    /* Marca */
    .marca {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: var(--gap-lg);
    }
    .marca-logo img {
      height: 30px; display: block;
      mix-blend-mode: multiply;
    }
    [data-theme="dark"] .marca-logo img { filter: invert(1) brightness(.85); mix-blend-mode: screen; }
    .marca-sep { width: 1px; height: 18px; background: var(--cinza); }
    .marca-sub {
      font-family: var(--font-mono);
      font-size: 10px; font-weight: 400; color: var(--m-text-3);
      letter-spacing: 1.5px; text-transform: uppercase;
    }

    /* Card */
    .login-card {
      background: var(--branco);
      border: 1px solid color-mix(in srgb, var(--m-border) 30%, transparent);
      border-radius: var(--m-radius-card);
      padding: var(--gap-lg);
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--verde);
    }

    .card-title {
      font-size: 13px; font-weight: 800;
      letter-spacing: .6px; text-transform: uppercase;
      color: var(--m-text); margin-bottom: 4px;
    }
    .card-sub {
      font-size: 13px; color: var(--m-text-3);
      margin-bottom: var(--gap-lg);
    }

    .fgroup { margin-bottom: var(--gap-md); }
    .fgroup label {
      display: block;
      font-size: 11px; font-weight: 700;
      letter-spacing: .6px; text-transform: uppercase;
      color: var(--m-text-3); margin-bottom: 6px;
    }
    .fgroup input {
      width: 100%; padding: 12px 14px;
      border: 1px solid color-mix(in srgb, var(--m-border) 35%, transparent);
      border-radius: var(--m-radius-input);
      background: color-mix(in srgb, var(--m-border) 8%, transparent);
      font-family: var(--font-ui); font-size: var(--mt-callout);
      color: var(--m-text); outline: none;
      transition: border-color var(--m-transition);
      -webkit-appearance: none;
    }
    .fgroup input:focus { border-color: var(--verde); background: var(--branco); }
    .fgroup input::placeholder { color: var(--m-text-3); }

    .pwd-wrap { position: relative; }
    .pwd-eye {
      position: absolute; right: 4px; top: 0;
      width: 46px; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--m-text-3);
    }
    .pwd-eye svg { width: 19px; height: 19px; stroke-width: 2; }

    .btn-login {
      width: 100%; padding: 13px;
      background: var(--verde); color: #fff;
      border: none; border-radius: var(--m-radius-btn);
      font-family: var(--font-ui); font-size: 12px;
      font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; margin-top: 6px;
      transition: opacity var(--m-transition);
      display: flex; align-items: center; justify-content: center;
    }
    .btn-login:active { opacity: .88; }
    .btn-login:disabled { opacity: .6; }
    .btn-login .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    .btn-login.loading .btn-txt { display: none; }
    .btn-login.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .link-esqueceu {
      display: block; width: 100%; margin-top: 14px;
      font-size: 12px; color: var(--m-text-3);
      text-align: center; background: none; border: none;
      font-weight: 600; letter-spacing: .2px;
    }
    .link-esqueceu:active { color: var(--verde); }

    .msg-erro, .msg-ok {
      display: none; margin-top: 12px;
      border-radius: var(--m-radius-input);
      padding: 10px 12px; font-size: 12px; font-weight: 600;
      line-height: 1.4;
    }
    .msg-erro {
      background: color-mix(in srgb, var(--critico) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--critico) 35%, transparent);
      color: var(--critico);
    }
    .msg-ok {
      background: var(--verde-soft);
      border: 1px solid color-mix(in srgb, var(--verde) 35%, transparent);
      color: var(--verde);
    }
    .msg-erro.show, .msg-ok.show { display: block; }

    /* Rodapé */
    .login-foot {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: var(--gap-md); padding: 0 4px;
    }
    .foot-info { font-family: var(--font-mono); font-size: 10px; color: var(--m-text-3); letter-spacing: .5px; }
    .foot-theme {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--m-text-2); background: none; border: none;
    }
    .foot-theme svg { width: 18px; height: 18px; stroke-width: 2; }
    .install-card {
      margin-top: var(--gap-md);
      background: color-mix(in srgb, var(--verde-soft) 62%, var(--branco));
      border: 1px solid color-mix(in srgb, var(--verde) 20%, transparent);
      border-radius: var(--m-radius-card);
      padding: 14px;
      box-shadow: var(--shadow-card);
    }
    .install-card[hidden] { display: none; }
    .install-title {
      font-size: 11px; font-weight: 800; letter-spacing: .6px;
      text-transform: uppercase; color: var(--verde);
    }
    .install-body {
      margin-top: 6px;
      font-size: 12px; line-height: 1.45; color: var(--m-text-2);
    }
    .install-btn {
      margin-top: 12px;
      width: 100%;
      min-height: 44px;
      border-radius: var(--m-radius-btn);
      border: 1px solid color-mix(in srgb, var(--verde) 22%, transparent);
      background: var(--branco);
      color: var(--verde);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      font-family: var(--font-ui);
    }
    .install-btn:disabled {
      opacity: .7;
      color: var(--m-text-3);
      border-color: color-mix(in srgb, var(--m-border) 35%, transparent);
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="marca">
      <div class="marca-logo"><img src="./assets/exp.png" alt="EXP"></div>
      <div class="marca-sep"></div>
      <div class="marca-sub">Sistema de gestão</div>
    </div>

    <div class="login-card">

      <!-- Login -->
      <form id="login-form" onsubmit="handleLogin(event)" novalidate>
        <div class="card-title">Acesso</div>
        <div class="card-sub">Entre com seu e-mail institucional</div>

        <div class="fgroup">
          <label for="email">E-mail</label>
          <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="seu@somosexp.com" required>
        </div>
        <div class="fgroup">
          <label for="password">Senha</label>
          <div class="pwd-wrap">
            <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
            <button type="button" class="pwd-eye" onclick="togglePwd()" tabindex="-1">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" id="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          <span class="btn-txt">Entrar</span><span class="spinner"></span>
        </button>
        <button type="button" class="link-esqueceu" onclick="showForgot()">Esqueceu a senha?</button>
        <div class="msg-erro" id="login-error"></div>
      </form>

      <!-- Recuperação -->
      <form id="forgot-form" onsubmit="handleForgot(event)" style="display:none" novalidate>
        <div class="card-title">Recuperar senha</div>
        <div class="card-sub">Enviaremos um link para criar uma nova senha.</div>

        <div class="fgroup">
          <label for="forgot-email">E-mail cadastrado</label>
          <input id="forgot-email" type="email" inputmode="email" autocomplete="email" placeholder="seu@somosexp.com" required>
        </div>

        <button type="submit" class="btn-login" id="forgot-btn">
          <span class="btn-txt">Enviar link</span><span class="spinner"></span>
        </button>
        <button type="button" class="link-esqueceu" onclick="showLogin()">← Voltar ao login</button>
        <div class="msg-ok" id="forgot-msg"></div>
      </form>

    </div>

    <div class="login-foot">
      <div class="foot-info">EXP · v2.0</div>
      <button class="foot-theme" id="theme-toggle" onclick="toggleTheme()" aria-label="Tema"></button>
    </div>

    <div class="install-card" id="install-cta" hidden></div>
  </div>

  <script>
    // Ícone do tema
    function _refreshThemeIcon() {
      const dark = document.documentElement.getAttribute('data-theme') === 'dark';
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.innerHTML = themeIcon(dark ? 'dark' : 'light');
    }
    _refreshThemeIcon();
    const _origToggle = toggleTheme;
    window.toggleTheme = function () { _origToggle(); _refreshThemeIcon(); };

    function refreshInstallCta() {
      const wrap = document.getElementById('install-cta');
      if (!wrap) return;
      const meta = getInstallMeta();
      wrap.hidden = false;
      wrap.innerHTML = `
        <div class="install-title">${meta.title}</div>
        <div class="install-body">${meta.body}</div>
        <button class="install-btn" onclick="handleInstallCta()" ${meta.disabled ? 'disabled' : ''}>
          ${meta.cta}
        </button>
      `;
    }

    async function handleInstallCta() {
      const result = await triggerInstallPrompt();
      if (result.installed) {
        showToast('EXP instalado neste dispositivo.', 'success');
      } else if (result.reason === 'dismissed') {
        showToast('Instalacao cancelada por enquanto.', 'default');
      }
      refreshInstallCta();
    }

    document.addEventListener('exp:install-state', refreshInstallCta);
    refreshInstallCta();

    // Redireciona se já autenticado
    (async () => {
      const postLoginTarget = getPostLoginTarget('./app.html');
      if (sessionStorage.getItem('exp_usuario')) { window.location.href = postLoginTarget; return; }
      const sb = initSupabase();
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;
      const { data: usuario } = await sb.from('usuarios').select('id')
        .eq('auth_id', session.user.id).maybeSingle();
      if (usuario) window.location.href = postLoginTarget;
      else await sb.auth.signOut();
    })();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.classList.add('loading'); btn.disabled = true;
      errEl.className = 'msg-erro';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const sb = initSupabase();
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        const { data: usuario, error: err2 } = await sb.from('usuarios')
          .select('id, nome, iniciais, role, cor, viewer_only')
          .eq('auth_id', data.user.id).maybeSingle();
        if (err2) throw err2;
        sessionStorage.setItem('exp_usuario', JSON.stringify(buildExpUsuarioPayload(data.user.id, usuario)));
        window.location.href = getPostLoginTarget('./app.html');
      } catch (err) {
        errEl.textContent = (err.message?.toLowerCase().includes('invalid') || err.message?.toLowerCase().includes('credentials'))
          ? 'E-mail ou senha incorretos' : 'Erro ao entrar. Tente novamente.';
        errEl.className = 'msg-erro show';
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }

    async function handleForgot(e) {
      e.preventDefault();
      const btn = document.getElementById('forgot-btn');
      const msg = document.getElementById('forgot-msg');
      btn.classList.add('loading'); btn.disabled = true;
      const email = document.getElementById('forgot-email').value.trim();
      try {
        const { error } = await initSupabase().auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
        if (error) throw error;
        msg.textContent = '✓ Link enviado! Verifique sua caixa de entrada.';
        msg.className = 'msg-ok show';
        btn.querySelector('.btn-txt').textContent = 'Enviado';
      } catch {
        msg.textContent = 'Não foi possível enviar. Verifique o e-mail.';
        msg.className = 'msg-ok show';
        msg.style.color = 'var(--critico)';
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }

    function showForgot() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('forgot-form').style.display = 'block';
    }
    function showLogin() {
      document.getElementById('forgot-form').style.display = 'none';
      document.getElementById('login-form').style.display = 'block';
    }

    function togglePwd() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }
  </script>

</body>
</html>
