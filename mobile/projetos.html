<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3E7858">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>EXP · Projetos</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/exp-mobile.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="./assets/exp-mobile-core.js"></script>
  <style>
    /* ── Toolbar (view toggle + filtros) ──────── */
    .toolbar {
      position: sticky;
      top: calc(var(--header-h) + var(--safe-t));
      z-index: 50;
      background: var(--m-bg);
      padding: var(--gap-sm) var(--gap-md);
      border-bottom: 1px solid color-mix(in srgb, var(--m-border) 20%, transparent);
      display: flex;
      gap: var(--gap-sm);
      align-items: center;
    }
    .view-toggle {
      display: flex;
      background: color-mix(in srgb, var(--m-border) 18%, transparent);
      border-radius: var(--m-radius-input);
      padding: 2px;
      flex-shrink: 0;
    }
    .view-btn {
      height: 28px;
      width: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--m-text-3);
      transition: all var(--m-transition);
      border: none;
      background: none;
      cursor: pointer;
    }
    .view-btn.active { background: var(--m-surface); color: var(--m-text); box-shadow: var(--shadow-card); }
    .view-btn svg { width: 15px; height: 15px; stroke-width: 1.8; }
    .filter-scroll {
      display: flex;
      gap: var(--gap-xs);
      overflow-x: auto;
      flex: 1;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-chip {
      height: 28px;
      border-radius: var(--m-radius-pill);
      padding: 0 10px;
      font-family: var(--font-ui);
      font-size: var(--mt-label);
      font-weight: var(--weight-label);
      letter-spacing: var(--label-spacing);
      text-transform: uppercase;
      background: color-mix(in srgb, var(--m-border) 18%, transparent);
      color: var(--m-text-2);
      border: none;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all var(--m-transition);
    }
    .filter-chip.active { background: var(--verde-soft); color: var(--verde); }

    /* ── Lista de projetos ────────────────────── */
    .projeto-card {
      background: var(--m-surface);
      border: 1px solid color-mix(in srgb, var(--m-border) 22%, transparent);
      border-radius: var(--m-radius-card);
      padding: var(--gap-md);
      margin-bottom: var(--gap-sm);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform var(--m-transition);
      display: block;
    }
    .projeto-card:active { transform: scale(0.98); }
    .projeto-card-top {
      display: flex;
      align-items: flex-start;
      gap: var(--gap-sm);
      margin-bottom: var(--gap-sm);
    }
    .nucleo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .projeto-nome {
      font-size: var(--mt-body);
      font-weight: 700;
      flex: 1;
      line-height: 1.3;
    }
    .projeto-meta {
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
      margin-bottom: var(--gap-sm);
      flex-wrap: wrap;
    }
    .projeto-etapa-row {
      display: flex;
      align-items: center;
      gap: var(--gap-xs);
      margin-top: var(--gap-xs);
    }
    .projeto-etapa-nome {
      font-size: var(--mt-caption);
      color: var(--m-text-2);
      flex: 1;
    }
    .etapa-status-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── Gantt ────────────────────────────────── */
    .gantt-page {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - var(--header-h) - var(--safe-t) - var(--nav-h) - var(--safe-b) - 52px);
    }
  </style>
</head>
<body>

  <header class="app-header">
    <a href="./gestao.html" class="header-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
      Gestão
    </a>
    <div class="header-title">Projetos</div>
  </header>

  <!-- Toolbar: toggle + filtros -->
  <div class="toolbar">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-lista" onclick="setView('lista')" title="Lista">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="view-btn" id="btn-gantt" onclick="setView('gantt')" title="Gantt">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="3" rx="1"/><rect x="3" y="10" width="12" height="3" rx="1"/><rect x="3" y="16" width="15" height="3" rx="1"/></svg>
      </button>
    </div>
    <div class="filter-scroll" id="filter-scroll">
      <button class="filter-chip active" data-nucleo="" onclick="setNucleo(this,'')">Todos</button>
      <button class="filter-chip" data-nucleo="urbanismo" onclick="setNucleo(this,'urbanismo')">Urbanismo</button>
      <button class="filter-chip" data-nucleo="paisagismo" onclick="setNucleo(this,'paisagismo')">Paisagismo</button>
      <button class="filter-chip" data-nucleo="especiais" onclick="setNucleo(this,'especiais')">Especiais</button>
      <button class="filter-chip" data-nucleo="consultorias" onclick="setNucleo(this,'consultorias')">Consultorias</button>
    </div>
  </div>

  <div class="page page--no-header" style="padding-top:0">
    <div class="page-content" id="page-lista">
      <div class="loader-page"><div class="loader"></div></div>
    </div>
    <div id="page-gantt" style="display:none"></div>
  </div>

  <nav class="bottom-nav" id="bottom-nav"></nav>

  <script>
    const NUCLEO = {
      urbanismo:    { color: 'var(--azul)',      label: 'URB' },
      paisagismo:   { color: 'var(--verde)',     label: 'PAIS' },
      especiais:    { color: 'var(--ouro)',      label: 'ESP' },
      consultorias: { color: 'var(--terracota)', label: 'CONSUL' },
    };
    const ETAPA_STATUS = {
      nao_iniciada: { color: 'var(--m-text-3)', label: 'Não iniciada' },
      em_andamento: { color: 'var(--azul)',     label: 'Em andamento' },
      em_revisao:   { color: 'var(--ouro)',     label: 'Em revisão' },
      concluida:    { color: 'var(--verde)',    label: 'Concluída' },
      pausada:      { color: 'var(--terracota)','label': 'Pausada' },
    };

    let G = { produtos: [], view: 'lista', nucleoFiltro: '', DAY_W: 36 };

    // ── Helpers ──────────────────────────────────
    function produtosFiltrados() {
      if (!G.nucleoFiltro) return G.produtos;
      return G.produtos.filter(p => p.nucleo === G.nucleoFiltro);
    }

    function etapaAtiva(produto) {
      return produto.etapas?.find(e =>
        e.status === 'em_andamento' || e.status === 'em_revisao'
      ) ?? produto.etapas?.[0] ?? null;
    }

    function progressoEtapas(produto) {
      const etapas = produto.etapas ?? [];
      if (!etapas.length) return 0;
      const concluidas = etapas.filter(e => e.status === 'concluida').length;
      return Math.round((concluidas / etapas.length) * 100);
    }

    // ── Lista ────────────────────────────────────
    function renderLista() {
      const lista = produtosFiltrados();
      const el = document.getElementById('page-lista');

      if (!lista.length) {
        el.innerHTML = `<div class="empty-state" style="margin-top:var(--gap-xl)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <div class="empty-state-title">Nenhum projeto encontrado</div>
        </div>`;
        return;
      }

      el.innerHTML = lista.map(p => {
        const n = NUCLEO[p.nucleo] ?? { color: 'var(--m-text-3)', label: p.nucleo };
        const ativa = etapaAtiva(p);
        const pct = progressoEtapas(p);
        const es = ETAPA_STATUS[ativa?.status] ?? ETAPA_STATUS.nao_iniciada;
        return `
          <a href="./projeto.html?id=${p.id}" class="projeto-card">
            <div class="projeto-card-top">
              <div class="nucleo-dot" style="background:${n.color}"></div>
              <div class="projeto-nome">${p.nome}</div>
              <div class="tag" style="background:${n.color}1a;color:${n.color};flex-shrink:0">${n.label}</div>
            </div>
            <div class="projeto-meta">
              ${p.coordenador_nome ? `<span style="font-size:var(--mt-caption);color:var(--m-text-2)">${p.coordenador_nome}</span>` : ''}
              <span class="tag tag-${p.status === 'ativo' ? 'ativo' : p.status === 'pausado' ? 'pausado' : 'encerrado'}">${p.status}</span>
            </div>
            ${ativa ? `
              <div class="projeto-etapa-row">
                <div class="etapa-status-dot" style="background:${es.color}"></div>
                <div class="projeto-etapa-nome">${ativa.nome}</div>
                ${ativa.data_estimada ? `<div style="font-size:11px;color:var(--m-text-3)">${formatDate(ativa.data_estimada)}</div>` : ''}
              </div>
            ` : ''}
            <div style="margin-top:var(--gap-sm)">
              <div class="progress-bar">
                <div class="progress-fill" style="width:${pct}%;background:${n.color}"></div>
              </div>
            </div>
          </a>
        `;
      }).join('');
    }

    // ── Gantt ────────────────────────────────────
    function getMondayOf(date) {
      const d = new Date(date);
      const day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1);
      d.setHours(0,0,0,0);
      return d;
    }

    function addDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }

    function daysBetween(a, b) {
      return Math.round((new Date(b) - new Date(a)) / 86400000);
    }

    function renderGantt() {
      const el = document.getElementById('page-gantt');
      const lista = produtosFiltrados();
      const W = G.DAY_W;

      // Janela: seg da semana passada → dom da próxima (21 dias)
      const hoje = new Date();
      const segAnterior = getMondayOf(addDays(hoje, -7));
      const totalDias = 21;

      // Semanas para o header
      const semanas = [];
      for (let s = 0; s < 3; s++) {
        const seg = addDays(segAnterior, s * 7);
        const dom = addDays(seg, 6);
        const dias = [];
        for (let d = 0; d < 7; d++) {
          const dia = addDays(seg, d);
          dias.push({ date: dia, isToday: dia.toDateString() === hoje.toDateString(), isWeekend: d >= 5 });
        }
        semanas.push({ seg, dom, dias, isCurrent: s === 1 });
      }

      const headHtml = `
        <div class="gantt-head">
          <div class="gantt-name-col">
            <div class="gantt-head-corner">Projeto</div>
          </div>
          <div class="gantt-weeks-head">
            ${semanas.map(s => `
              <div class="gantt-week-head ${s.isCurrent ? 'current' : ''}">
                <div class="gantt-week-label" style="width:${7*W}px">
                  ${s.seg.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} – ${s.dom.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}
                </div>
                <div class="gantt-days-head">
                  ${s.dias.map(d => `
                    <div class="gantt-day-head ${d.isToday ? 'today' : ''} ${d.isWeekend ? 'weekend' : ''}" style="width:${W}px">
                      ${d.date.getDate()}
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      // Linha do hoje para o track
      const todayOffset = daysBetween(segAnterior, hoje);
      const todayLeft = todayOffset >= 0 && todayOffset < totalDias ? todayOffset * W + W / 2 : -1;

      const rowsHtml = lista.length === 0
        ? `<div style="padding:var(--gap-xl);text-align:center;color:var(--m-text-3);font-size:var(--mt-caption)">Nenhum projeto</div>`
        : lista.map(p => {
          const n = NUCLEO[p.nucleo] ?? { color: 'var(--m-text-3)', label: '' };
          const etapas = p.etapas ?? [];

          // Calcular barra por etapa ativa ou a mais próxima
          const barras = etapas
            .filter(e => e.data_liberacao || e.data_estimada)
            .map(e => {
              const ini = e.data_liberacao ? new Date(e.data_liberacao) : hoje;
              const fim = e.data_estimada  ? new Date(e.data_estimada)  : addDays(ini, 7);
              const startDay = daysBetween(segAnterior, ini);
              const endDay   = daysBetween(segAnterior, fim);
              const left  = Math.max(0, startDay) * W;
              const width = Math.max(W, (Math.min(endDay, totalDias - 1) - Math.max(startDay, 0) + 1) * W);
              if (endDay < 0 || startDay >= totalDias) return null;
              const es = ETAPA_STATUS[e.status] ?? ETAPA_STATUS.nao_iniciada;
              return { left, width, nome: e.nome, color: n.color, status: e.status, es };
            })
            .filter(Boolean);

          const totalTrackW = totalDias * W;
          return `
            <div class="gantt-row">
              <div class="gantt-row-name-cell">
                <div class="gantt-row-proj">${p.nome}</div>
                ${p.nucleo ? `<div class="gantt-row-meta" style="color:${n.color}">${n.label}</div>` : ''}
              </div>
              <div class="gantt-track" style="width:${totalTrackW}px">
                ${todayLeft >= 0 ? `<div class="gantt-today-line" style="left:${todayLeft}px"></div>` : ''}
                ${barras.map(b => `
                  <div class="gantt-bar"
                    style="left:${b.left}px;width:${b.width}px;background:${b.color};opacity:${b.status==='concluida'?0.45:1}"
                    onclick="window.location.href='./projeto.html?id=${p.id}'"
                    title="${b.nome}">
                    ${b.width > 60 ? b.nome : ''}
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');

      el.innerHTML = `
        <div class="gantt-page page-content--flush">
          <div class="gantt-scroll">
            ${headHtml}
            <div style="min-width:${110 + totalDias * W}px">
              ${rowsHtml}
            </div>
          </div>
        </div>
      `;
    }

    // ── View toggle ──────────────────────────────
    function setView(view) {
      G.view = view;
      document.getElementById('page-lista').style.display = view === 'lista' ? '' : 'none';
      document.getElementById('page-gantt').style.display = view === 'gantt' ? '' : 'none';
      document.getElementById('btn-lista').classList.toggle('active', view === 'lista');
      document.getElementById('btn-gantt').classList.toggle('active', view === 'gantt');
      if (view === 'gantt') renderGantt();
    }

    function setNucleo(btn, nucleo) {
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      G.nucleoFiltro = nucleo;
      if (G.view === 'lista') renderLista();
      else renderGantt();
    }

    window.addEventListener('DOMContentLoaded', async () => {
      const u = await requireAuth('./index.html');
      if (!u) return;

      buildBottomNav('gestao', isSocio(u));

      const sb = getSB();
      const { data: produtos } = await sb
        .from('produtos')
        .select(`
          id, nome, nucleo, status, coordenador_id,
          usuarios!produtos_coordenador_id_fkey(nome),
          etapas(id, nome, status, ordem, data_liberacao, data_estimada, data_conclusao)
        `)
        .in('status', ['ativo', 'pausado'])
        .order('nome');

      G.produtos = (produtos ?? []).map(p => ({
        ...p,
        coordenador_nome: p.usuarios?.nome ?? null,
        etapas: (p.etapas ?? []).sort((a, b) => a.ordem - b.ordem),
      }));

      renderLista();
    });
  </script>

</body>
</html>
