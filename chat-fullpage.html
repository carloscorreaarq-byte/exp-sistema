<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXP · Chat</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="exp-design-system.css">
<script>
(function(){
  var saved = localStorage.getItem('exp-theme');
  var sys   = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(saved === 'dark' || (!saved && sys))
    document.documentElement.setAttribute('data-theme','dark');
  else
    document.documentElement.setAttribute('data-theme','light');
  /* cor de acento do chat */
  var color = localStorage.getItem('exp_chat_color') || 'verde';
  document.documentElement.setAttribute('data-chat-color', color);
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══════════════════════════════════════════════════
   VARIÁVEIS DE ACENTO — aplicadas sobre light/dark
══════════════════════════════════════════════════ */
:root {
  --ca:    #1D6A4A;   /* accent */
  --ca-bg: #EAF5EE;   /* accent background suave */
  --ca-mid:rgba(29,106,74,.13);
  --ca-viv:rgba(29,106,74,.22);
  --cinza2:#ECEAE4;
}
[data-chat-color="azul"] {
  --ca:    #1D4FA0;
  --ca-bg: #EAF0FB;
  --ca-mid:rgba(29,79,160,.12);
  --ca-viv:rgba(29,79,160,.22);
}
[data-chat-color="ouro"] {
  --ca:    #C4831A;
  --ca-bg: #FBF3E8;
  --ca-mid:rgba(196,131,26,.12);
  --ca-viv:rgba(196,131,26,.22);
}
[data-chat-color="terracota"] {
  --ca:    #B84C3A;
  --ca-bg: #FBF0EE;
  --ca-mid:rgba(184,76,58,.12);
  --ca-viv:rgba(184,76,58,.22);
}

/* ══════════════════════════════════════════════════
   BASE
══════════════════════════════════════════════════ */
body {
  font-family: 'Raleway', sans-serif;
  background: var(--off, #F7F6F3);
  color: var(--grafite, #111110);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
[data-theme="dark"] body { background: #161615; }

/* ── Loading ── */
#fp-loading {
  position: fixed; inset: 0;
  background: var(--off, #F7F6F3);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; flex-direction: column; gap: 10px;
}
[data-theme="dark"] #fp-loading { background: #161615; }
.fp-loading-logo { height: 26px; display: block; mix-blend-mode: multiply; }
[data-theme="dark"] .fp-loading-logo { filter: invert(1) brightness(.85); mix-blend-mode: screen; }
.fp-loading-bar { width: 110px; height: 2px; background: var(--cinza, #D0CFC9); border-radius: 2px; overflow: hidden; position: relative; margin-top: 4px; }
.fp-loading-bar::after { content: ''; position: absolute; top: 0; left: 0; width: 40%; height: 100%; background: var(--grafite, #111110); border-radius: 2px; animation: fpldbar 1.4s ease-in-out infinite; }
@keyframes fpldbar { 0%{transform:translateX(-150%)} 100%{transform:translateX(350%)} }

/* ══════════════════════════════════════════════════
   LAYOUT PRINCIPAL — cards flutuando no background
══════════════════════════════════════════════════ */
#fp-app {
  display: none; /* shown after login */
  flex: 1;
  padding: 16px 28px;   /* mais margem lateral */
  gap: 10px;
  min-height: 0;
  height: 100vh;
  align-items: stretch;
}

/* ══════════════════════════════════════════════════
   NAV LATERAL (ícones de módulos)
══════════════════════════════════════════════════ */
#fp-nav {
  width: 50px;
  background: var(--branco, #fff);
  border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0;
  gap: 2px;
  flex-shrink: 0;
  overflow: hidden;
}
[data-theme="dark"] #fp-nav { background: #1E1E1D; border-color: #2E2D2B; }

.fp-nav-logo {
  width: 50px; height: 44px;
  margin-bottom: 4px;
  display: flex; align-items: center; justify-content: center;
}
.fp-nav-logo img {
  height: 16px;
  mix-blend-mode: multiply;
  transform: rotate(-90deg);
  transform-origin: center center;
}
[data-theme="dark"] .fp-nav-logo img { filter: invert(1) brightness(.85); mix-blend-mode: screen; }

.fp-nav-sep {
  width: 28px; height: 1px;
  background: var(--cinza2, #ECEAE4);
  margin: 4px 0;
  flex-shrink: 0;
}
[data-theme="dark"] .fp-nav-sep { background: #2E2D2B; }

.fp-nav-item {
  width: 36px; height: 36px;
  border-radius: 9px;
  border: none;
  background: none;
  color: var(--cinza, #D0CFC9);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .12s, color .12s;
  text-decoration: none;
  flex-shrink: 0;
  position: relative;
}
.fp-nav-item:hover { background: var(--off, #F7F6F3); color: var(--grafite, #111110); }
[data-theme="dark"] .fp-nav-item:hover { background: rgba(255,255,255,.07); color: #F0EDE6; }
.fp-nav-item.active { background: var(--ca-bg); color: var(--ca); }
.fp-nav-item[title]:hover::after {
  content: attr(title);
  position: absolute;
  left: calc(100% + 10px);
  top: 50%; transform: translateY(-50%);
  background: var(--grafite, #111110);
  color: #fff;
  font-size: 10px; font-weight: 600;
  padding: 4px 8px; border-radius: 6px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 500;
}
[data-theme="dark"] .fp-nav-item[title]:hover::after { background: #F0EDE6; color: #111110; }

.fp-nav-spacer { flex: 1; }

/* ══════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════ */
#fp-sidebar {
  width: 308px;
  flex-shrink: 0;
  background: var(--branco, #fff);
  border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
[data-theme="dark"] #fp-sidebar { background: #1E1E1D; border-color: #2E2D2B; }

/* Cabeçalho sidebar */
.fp-sb-head {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--cinza2, #ECEAE4);
  flex-shrink: 0;
}
[data-theme="dark"] .fp-sb-head { border-bottom-color: #2E2D2B; }

.fp-sb-head-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.fp-sb-title {
  font-size: 13px; font-weight: 700;
  color: var(--grafite, #111110);
  flex: 1;
}
[data-theme="dark"] .fp-sb-title { color: #F0EDE6; }

.fp-sb-icon-btn {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: var(--off, #F7F6F3); color: var(--grafite, #111110);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
  flex-shrink: 0;
}
.fp-sb-icon-btn:hover { background: var(--cinza2, #ECEAE4); }
[data-theme="dark"] .fp-sb-icon-btn { background: #252523; color: #F0EDE6; }
[data-theme="dark"] .fp-sb-icon-btn:hover { background: #2E2D2B; }

/* Status dot no header da sidebar */
.fp-sb-status {
  display: flex; align-items: center; gap: 5px;
  cursor: pointer; padding: 3px 7px;
  background: var(--off, #F7F6F3);
  border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 20px;
  user-select: none; transition: background .12s;
  position: relative;
}
.fp-sb-status:hover { background: var(--cinza2, #ECEAE4); }
[data-theme="dark"] .fp-sb-status { background: #252523; border-color: #2E2D2B; }
.fp-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fp-status-dot.online  { background: #2D9E6B; }
.fp-status-dot.foco    { background: #1D4FA0; }
.fp-status-dot.ausente { background: #C4831A; }
.fp-sb-status-label { font-size: 10px; font-weight: 600; color: var(--grafite, #111110); }
[data-theme="dark"] .fp-sb-status-label { color: #C8C3BA; }

/* Status popover */
#fp-status-pop {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--branco, #fff);
  border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 10px;
  box-shadow: 0 8px 28px rgba(0,0,0,.16);
  padding: 5px; display: none; flex-direction: column; gap: 1px;
  min-width: 148px; z-index: 300;
}
[data-theme="dark"] #fp-status-pop { background: #252523; border-color: #2E2D2B; }
.fp-sopt-hdr { font-size: 9px; font-weight: 700; color: var(--cinza, #D0CFC9); padding: 4px 10px 6px; text-transform: uppercase; letter-spacing: .7px; }
.fp-sopt {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px; border-radius: 7px;
  border: none; background: none; cursor: pointer;
  font-family: 'Raleway', sans-serif; font-size: 12px; font-weight: 500;
  width: 100%; text-align: left; transition: background .1s;
  color: var(--grafite, #111110);
}
[data-theme="dark"] .fp-sopt { color: #F0EDE6; }
.fp-sopt:hover { background: var(--off, #F7F6F3); }
[data-theme="dark"] .fp-sopt:hover { background: rgba(255,255,255,.07); }
.fp-sopt.active { background: var(--cinza2, #ECEAE4); font-weight: 700; }
[data-theme="dark"] .fp-sopt.active { background: rgba(255,255,255,.12); }
.fp-sopt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Busca */
.fp-sb-search {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px;
  background: var(--off, #F7F6F3);
  border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 9px;
  margin-bottom: 8px;
}
[data-theme="dark"] .fp-sb-search { background: #252523; border-color: #2E2D2B; }
.fp-sb-search svg { color: var(--cinza, #D0CFC9); flex-shrink: 0; }
.fp-search-input {
  flex: 1; border: none; background: none;
  font-family: 'Raleway', sans-serif; font-size: 12px;
  color: var(--grafite, #111110); outline: none;
}
[data-theme="dark"] .fp-search-input { color: #F0EDE6; }
.fp-search-input::placeholder { color: var(--cinza, #D0CFC9); }

/* Toggles */
.fp-sb-toggles {
  display: flex; gap: 6px;
}
.fp-toggle-btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 5px 8px; border-radius: 8px; border: 1px solid var(--cinza2, #ECEAE4);
  background: none; cursor: pointer;
  font-family: 'Raleway', sans-serif; font-size: 10px; font-weight: 600;
  color: var(--cinza, #D0CFC9);
  transition: all .12s; user-select: none;
}
.fp-toggle-btn:hover { border-color: var(--ca); color: var(--ca); }
.fp-toggle-btn.active { background: var(--ca-bg); border-color: var(--ca); color: var(--ca); }
[data-theme="dark"] .fp-toggle-btn { border-color: #2E2D2B; color: #6B6860; }
[data-theme="dark"] .fp-toggle-btn.active { background: var(--ca-mid); border-color: var(--ca); color: var(--ca); }

/* Lista de conversas */
#fp-conv-list {
  flex: 1; overflow-y: auto; padding: 6px 8px 12px;
}
#fp-conv-list::-webkit-scrollbar { width: 3px; }
#fp-conv-list::-webkit-scrollbar-thumb { background: var(--cinza, #D0CFC9); border-radius: 2px; }

.fp-section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 6px 3px;
  font-size: 9px; font-weight: 700; letter-spacing: .65px;
  text-transform: uppercase; color: var(--cinza, #D0CFC9);
  cursor: pointer; border: none; background: none; width: 100%;
  font-family: 'Raleway', sans-serif; text-align: left; transition: color .12s;
}
.fp-section-hdr:hover { color: var(--grafite, #111110); }
[data-theme="dark"] .fp-section-hdr { color: #4A4845; }
[data-theme="dark"] .fp-section-hdr:hover { color: #C8C3BA; }

/* Item de conversa */
.fp-conv-item {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 8px 8px; border-radius: 9px;
  cursor: pointer; transition: background .1s;
  position: relative;
}
.fp-conv-item:hover { background: var(--off, #F7F6F3); }
[data-theme="dark"] .fp-conv-item:hover { background: rgba(255,255,255,.04); }
.fp-conv-item.active { background: var(--ca-bg); }
[data-theme="dark"] .fp-conv-item.active { background: var(--ca-mid); }
.fp-conv-item.unread .fp-conv-name { font-weight: 700; color: var(--grafite, #111110); }
[data-theme="dark"] .fp-conv-item.unread .fp-conv-name { color: #F0EDE6; }

/* Avatar na sidebar */
.fp-conv-av-wrap { position: relative; flex-shrink: 0; width: 36px; height: 36px; }
.fp-av-circle {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  font-family: 'DM Mono', monospace;
}
.fp-av-hash {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  background: var(--ca-bg); color: var(--ca);
}
.fp-av-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; display: block; }
.fp-presence-dot-sm {
  width: 9px; height: 9px; border-radius: 50%;
  position: absolute; bottom: -1px; right: -1px;
  border: 2px solid var(--branco, #fff);
}
[data-theme="dark"] .fp-presence-dot-sm { border-color: #1E1E1D; }
.fp-presence-dot-sm.online  { background: #2D9E6B; }
.fp-presence-dot-sm.foco    { background: #1D4FA0; }
.fp-presence-dot-sm.ausente { background: #C4831A; }

/* Avatares empilhados (grupos) */
.fp-av-stack { position: relative; width: 36px; height: 36px; flex-shrink: 0; }
.fp-av-stack .fp-av-s {
  position: absolute;
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 700; color: #fff;
  font-family: 'DM Mono', monospace;
  border: 2px solid var(--branco, #fff);
}
[data-theme="dark"] .fp-av-stack .fp-av-s { border-color: #1E1E1D; }
.fp-av-stack .fp-av-s:nth-child(1) { top: 0;    left: 0; z-index: 3; }
.fp-av-stack .fp-av-s:nth-child(2) { top: 10px; left: 10px; z-index: 2; }
.fp-av-stack .fp-av-s:nth-child(3) { display: none; }
.fp-av-stack.trio .fp-av-s:nth-child(2) { top: 6px;  left: 12px; z-index: 2; }
.fp-av-stack.trio .fp-av-s:nth-child(3) { top: 14px; left: 2px;  z-index: 1; display: flex; }

/* Info da conversa */
.fp-conv-body { flex: 1; min-width: 0; }
.fp-conv-top {
  display: flex; align-items: baseline; gap: 5px;
  margin-bottom: 3px;
}
.fp-conv-name {
  font-size: 12px; font-weight: 600; color: #3A3836;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
[data-theme="dark"] .fp-conv-name { color: #C8C3BA; }
.fp-conv-ts {
  font-size: 9px; font-family: 'DM Mono', monospace;
  color: var(--cinza, #D0CFC9); flex-shrink: 0;
  white-space: nowrap;
}
.fp-conv-preview {
  font-size: 11px; color: #888;
  line-height: 1.4;
  /* 2 linhas */
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
[data-theme="dark"] .fp-conv-preview { color: #6B6860; }
.fp-conv-item.unread .fp-conv-preview { color: #555; }
[data-theme="dark"] .fp-conv-item.unread .fp-conv-preview { color: #9A9590; }
.fp-conv-badge {
  background: var(--ca); color: #fff;
  font-size: 9px; font-weight: 700; font-family: 'DM Mono', monospace;
  min-width: 16px; height: 16px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 3px; flex-shrink: 0; margin-top: 2px;
}
.fp-conv-flag-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ca); flex-shrink: 0; margin-top: 4px;
  opacity: .7;
}

/* Tema de cor na sidebar */
.fp-sb-color-row {
  display: flex; gap: 5px; align-items: center;
  padding: 8px 6px 2px;
}
.fp-sb-color-lbl { font-size: 9px; font-weight: 600; color: var(--cinza, #D0CFC9); text-transform: uppercase; letter-spacing: .5px; margin-right: 2px; }
.fp-color-dot {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: transform .12s, border-color .12s;
  flex-shrink: 0;
}
.fp-color-dot:hover { transform: scale(1.2); }
.fp-color-dot.active { border-color: var(--grafite, #111110); }
[data-theme="dark"] .fp-color-dot.active { border-color: #F0EDE6; }

/* ══════════════════════════════════════════════════
   MAIN — área de chat
══════════════════════════════════════════════════ */
#fp-main {
  flex: 1;
  background: var(--branco, #fff);
  border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 12px;
  display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
}
[data-theme="dark"] #fp-main { background: #1E1E1D; border-color: #2E2D2B; }
[data-theme="dark"] #fp-chat-area { background: #1E1E1D !important; }

/* Header do canal */
#fp-chat-header {
  padding: 0 16px;
  height: 52px;
  background: var(--off, #F7F6F3);
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--cinza2, #ECEAE4);
}
[data-theme="dark"] #fp-chat-header { background: #252523; border-bottom-color: #2E2D2B; }
.fp-hdr-av { flex-shrink: 0; }
.fp-hdr-info { flex: 1; min-width: 0; }
.fp-hdr-title {
  font-size: 14px; font-weight: 700; color: var(--grafite, #111110);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
[data-theme="dark"] .fp-hdr-title { color: #F0EDE6; }
.fp-hdr-sub {
  font-size: 10px; color: #888; margin-top: 1px;
  display: flex; align-items: center; gap: 5px;
}
.fp-hdr-presence { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.fp-hdr-presence.online  { background: #2D9E6B; }
.fp-hdr-presence.foco    { background: #1D4FA0; }
.fp-hdr-presence.ausente { background: #C4831A; }
.fp-chat-icon-btn {
  width: 30px; height: 30px; border-radius: 8px; border: none;
  background: rgba(0,0,0,.06); color: var(--grafite, #111110);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s;
}
.fp-chat-icon-btn:hover { background: rgba(0,0,0,.12); }
[data-theme="dark"] .fp-chat-icon-btn { background: rgba(255,255,255,.08); color: #F0EDE6; }
[data-theme="dark"] .fp-chat-icon-btn:hover { background: rgba(255,255,255,.14); }

/* Placeholder */
#fp-placeholder {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  color: var(--cinza, #D0CFC9);
}
#fp-placeholder svg { opacity: .25; }
.fp-placeholder-text { font-size: 13px; font-weight: 500; color: #aaa; }

/* Área de mensagens */
#fp-messages {
  flex: 1; overflow-y: auto;
  padding: 16px 20px 8px;
  display: flex; flex-direction: column; gap: 0;
  scroll-behavior: smooth;
  position: relative;
}
#fp-messages::-webkit-scrollbar { width: 4px; }
#fp-messages::-webkit-scrollbar-thumb { background: var(--cinza2, #ECEAE4); border-radius: 2px; }

/* Empty / loading */
.fp-empty {
  text-align: center; color: var(--cinza, #D0CFC9);
  font-size: 12px; line-height: 1.7; margin: auto; padding: 24px;
}
.fp-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: .4; }
.fp-loading {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; margin: auto; padding: 24px;
}
.fp-loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--cinza, #D0CFC9);
  animation: fpPulse 1.2s ease-in-out infinite;
}
.fp-loading-dot:nth-child(2) { animation-delay: .2s; }
.fp-loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes fpPulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

/* Separador de data */
.fp-date-sep {
  display: flex; align-items: center; gap: 8px;
  margin: 14px 0 6px;
  color: var(--cinza, #D0CFC9); font-size: 9px;
  font-family: 'DM Mono', monospace; letter-spacing: .5px;
}
.fp-date-sep::before, .fp-date-sep::after {
  content: ''; flex: 1; height: 1px;
  background: var(--cinza2, #ECEAE4);
}
[data-theme="dark"] .fp-date-sep::before,
[data-theme="dark"] .fp-date-sep::after { background: #2A2927; }

/* ── Bloco de mensagem ────────────────────────────── */
.fp-msg-block {
  display: flex; gap: 10px;
  padding: 4px 6px; border-radius: 8px;
  transition: background .1s;
  margin-bottom: 2px;
}
.fp-msg-block:hover { background: var(--off, #F7F6F3); }
[data-theme="dark"] .fp-msg-block:hover { background: rgba(255,255,255,.03); }

/* Não lidas: fundo suave */
.fp-msg-block.unread {
  background: var(--ca-mid) !important;
}

/* Sinalizadas: fundo mais vivo */
.fp-msg-block.flagged {
  background: var(--ca-viv) !important;
  border-left: 3px solid var(--ca);
  padding-left: 9px;
}

/* Avatar da mensagem */
.fp-msg-av {
  flex-shrink: 0; width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff;
  font-family: 'DM Mono', monospace;
  margin-top: 2px;
}
.fp-msg-av img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; display: block; }

/* Mensagem agrupada (mesmo sender, sem cabeçalho) */
.fp-msg-block.grouped { padding-top: 1px; padding-bottom: 1px; }
.fp-msg-block.grouped .fp-msg-av { visibility: hidden; }

/* Mensagens próprias — alinhadas à direita */
.fp-msg-block.own { flex-direction: row-reverse; }
.fp-msg-block.own .fp-msg-content { align-items: flex-end; display: flex; flex-direction: column; }
.fp-msg-block.own .fp-msg-header  { flex-direction: row-reverse; }
.fp-msg-block.own .fp-msg-text    { text-align: right; background: var(--ca-bg); color: var(--grafite, #111110); }
[data-theme="dark"] .fp-msg-block.own .fp-msg-text { background: var(--ca-mid); color: #F0EDE6; }
.fp-msg-block.own .fp-msg-reactions { justify-content: flex-end; }
.fp-msg-block.own .fp-msg-actions  { margin-left: 0; margin-right: auto; }

/* Conteúdo da mensagem */
.fp-msg-content { flex: 1; min-width: 0; }
.fp-msg-header {
  display: flex; align-items: baseline; gap: 7px;
  margin-bottom: 3px;
}
.fp-msg-name {
  font-size: 13px; font-weight: 700; color: var(--grafite, #111110);
}
[data-theme="dark"] .fp-msg-name { color: #F0EDE6; }
.fp-msg-ts {
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: #aaa;
}
.fp-msg-text {
  font-size: 13px; line-height: 1.55; color: #333;
  word-break: break-word;
}
[data-theme="dark"] .fp-msg-text { color: #C8C3BA; }
.fp-link { color: var(--ca); text-decoration: underline; word-break: break-all; }
.fp-link:hover { opacity: .8; }

/* Imagem inline */
.fp-media-thumb {
  display: inline-block; max-width: min(400px, 60vw);
  border-radius: 10px; overflow: hidden;
  border: 1px solid rgba(0,0,0,.07);
  cursor: pointer; margin-top: 6px;
  background: var(--off, #F7F6F3);
}
[data-theme="dark"] .fp-media-thumb { background: #252523; border-color: #3A3836; }
.fp-media-thumb img { display: block; width: 100%; height: auto; max-height: 260px; object-fit: cover; }
.fp-media-expired {
  padding: 10px 14px; font-size: 11px; font-weight: 600; color: #999;
  background: var(--off, #F7F6F3); border: 1px dashed var(--cinza2, #ECEAE4);
  border-radius: 10px; margin-top: 6px; display: inline-block;
}

/* Barra de reações */
.fp-msg-reactions {
  display: flex; align-items: center; gap: 4px;
  margin-top: 5px; flex-wrap: wrap;
}
.fp-rxn-btn {
  display: flex; align-items: center; gap: 3px;
  padding: 3px 8px; border-radius: 20px;
  border: 1px solid var(--cinza2, #ECEAE4);
  background: var(--off, #F7F6F3); cursor: pointer;
  font-size: 11px; transition: border-color .1s, background .1s;
}
[data-theme="dark"] .fp-rxn-btn { background: #252523; border-color: #2E2D2B; }
.fp-rxn-btn:hover { border-color: var(--ca); }
.fp-rxn-btn.active { background: var(--ca-bg); border-color: var(--ca); }
[data-theme="dark"] .fp-rxn-btn.active { background: var(--ca-mid); }
.fp-rxn-count { font-size: 10px; font-family: 'DM Mono', monospace; color: #888; }
.fp-rxn-btn.active .fp-rxn-count { color: var(--ca); font-weight: 700; }

/* Botões de ação (aparecem no hover do bloco) */
.fp-msg-actions {
  display: none; align-items: center; gap: 2px;
  margin-left: auto; flex-shrink: 0;
  background: var(--branco, #fff);
  border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 8px; padding: 2px 3px;
  box-shadow: 0 1px 6px rgba(0,0,0,.08);
  position: relative; top: -2px;
  height: 28px;
}
[data-theme="dark"] .fp-msg-actions { background: #252523; border-color: #2E2D2B; }
.fp-msg-block:hover .fp-msg-actions { display: flex; }
.fp-action-btn {
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: none; color: #888;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .1s, color .1s;
  flex-shrink: 0; padding: 0;
}
.fp-action-btn:hover { background: var(--off, #F7F6F3); color: var(--grafite, #111110); }
[data-theme="dark"] .fp-action-btn:hover { background: rgba(255,255,255,.07); color: #F0EDE6; }
.fp-action-btn.flag-active { color: var(--ca); }

/* ── Busca dentro da conversa ────────────────────────── */
#fp-in-search-bar {
  display: none;
  align-items: center; gap: 8px;
  padding: 7px 14px;
  background: var(--off, #F7F6F3);
  border-bottom: 1px solid var(--cinza2, #ECEAE4);
  flex-shrink: 0;
}
[data-theme="dark"] #fp-in-search-bar { background: #252523; border-bottom-color: #2E2D2B; }
#fp-in-search-bar.open { display: flex; }

.fp-in-search-wrap {
  flex: 1; display: flex; align-items: center; gap: 6px;
  background: var(--branco, #fff);
  border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 8px; padding: 5px 10px;
}
[data-theme="dark"] .fp-in-search-wrap { background: #1E1E1D; border-color: #3A3836; }
.fp-in-search-wrap:focus-within { border-color: var(--ca); }
.fp-in-search-input {
  flex: 1; border: none; background: none; outline: none;
  font-family: 'Raleway', sans-serif; font-size: 12px;
  color: var(--grafite, #111110);
}
[data-theme="dark"] .fp-in-search-input { color: #F0EDE6; }
.fp-in-search-input::placeholder { color: var(--cinza, #D0CFC9); }

.fp-in-search-count {
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: var(--cinza, #D0CFC9); white-space: nowrap; flex-shrink: 0;
}
.fp-in-search-count.found { color: var(--ca); font-weight: 600; }

.fp-in-search-nav {
  width: 26px; height: 26px; border-radius: 7px; border: none;
  background: none; color: #888; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s; padding: 0; flex-shrink: 0;
}
.fp-in-search-nav:hover { background: var(--cinza2, #ECEAE4); color: var(--grafite, #111110); }
[data-theme="dark"] .fp-in-search-nav:hover { background: rgba(255,255,255,.08); color: #F0EDE6; }
.fp-in-search-close {
  width: 26px; height: 26px; border-radius: 7px; border: none;
  background: none; color: #888; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .1s; padding: 0; flex-shrink: 0;
}
.fp-in-search-close:hover { background: rgba(184,76,58,.1); color: #B84C3A; }

/* Highlight de resultado */
.fp-search-highlight {
  background: rgba(196,131,26,.35);
  border-radius: 2px;
  padding: 0 1px;
}
.fp-search-highlight.current {
  background: var(--ca);
  color: #fff;
  border-radius: 2px;
}
/* Toast nova mensagem */
.fp-new-msg-toast {
  position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
  background: var(--ca); color: #fff;
  font-size: 11px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
  animation: fpToastIn .2s ease-out; z-index: 50;
}
@keyframes fpToastIn { from{opacity:0;transform:translateX(-50%) translateY(6px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ── Input area ── */
#fp-input-area {
  padding: 10px 16px 12px;
  border-top: 1px solid var(--cinza2, #ECEAE4);
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--branco, #fff); flex-shrink: 0;
}
[data-theme="dark"] #fp-input-area { background: #1E1E1D; border-top-color: #2E2D2B; }
.fp-attach-btn {
  width: 34px; height: 34px;
  background: var(--off, #F7F6F3); border: 1px solid var(--cinza2, #ECEAE4);
  border-radius: 8px; color: var(--grafite, #111110);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: border-color .15s; padding: 0;
}
.fp-attach-btn:hover { border-color: var(--ca); }
[data-theme="dark"] .fp-attach-btn { background: #252523; border-color: #2E2D2B; color: #F0EDE6; }
#fp-input {
  flex: 1; border: 1px solid var(--cinza2, #ECEAE4); border-radius: 10px;
  padding: 8px 12px; font-family: 'Raleway', sans-serif; font-size: 13px;
  resize: none; outline: none; max-height: 120px; min-height: 34px;
  color: var(--grafite, #111110); background: var(--off, #F7F6F3);
  line-height: 1.45; transition: border-color .15s, background .15s; overflow-y: auto;
}
#fp-input::placeholder { color: var(--cinza, #D0CFC9); }
#fp-input:focus { border-color: var(--ca); background: var(--branco, #fff); }
[data-theme="dark"] #fp-input { background: #252523; border-color: #2E2D2B; color: #F0EDE6; }
[data-theme="dark"] #fp-input:focus { background: #2A2927; }
.fp-send-btn {
  width: 34px; height: 34px;
  background: var(--ca); border: none; border-radius: 8px;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: opacity .15s; padding: 0;
}
.fp-send-btn:hover { opacity: .85; }
.fp-send-btn:active { opacity: .7; }

#fp-composer-status {
  padding: 0 16px 8px; font-size: 10px; color: #888;
  background: var(--branco, #fff); display: none;
}
[data-theme="dark"] #fp-composer-status { background: #1E1E1D; }
#fp-composer-status.ok { color: var(--ca); }
#fp-composer-status.warn { color: #B84C3A; }

/* ══════════════════════════════════════════════════
   MODAL NOVO DM
══════════════════════════════════════════════════ */
#fp-members-panel {
  position: fixed; inset: 0;
  background: rgba(17,17,16,.45);
  display: none; align-items: center; justify-content: center; z-index: 400;
}
.fp-members-card {
  background: var(--branco, #fff); border-radius: 14px;
  box-shadow: 0 24px 64px rgba(0,0,0,.22);
  width: 380px; max-height: 540px;
  display: flex; flex-direction: column; overflow: hidden;
  border: 1px solid var(--cinza2, #ECEAE4);
}
[data-theme="dark"] .fp-members-card { background: #1E1E1D; border-color: #2E2D2B; }
.fp-members-hdr {
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--cinza2, #ECEAE4); flex-shrink: 0;
}
[data-theme="dark"] .fp-members-hdr { border-bottom-color: #2E2D2B; }
.fp-members-title { flex: 1; font-size: 14px; font-weight: 700; color: var(--grafite, #111110); }
[data-theme="dark"] .fp-members-title { color: #F0EDE6; }
.fp-members-close {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: rgba(0,0,0,.07); color: var(--grafite, #111110);
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  padding: 0;
}
[data-theme="dark"] .fp-members-close { background: rgba(255,255,255,.08); color: #F0EDE6; }
.fp-members-list { flex: 1; overflow-y: auto; padding: 8px; }
.fp-member-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 9px; cursor: pointer; transition: background .1s;
}
.fp-member-item:hover { background: var(--off, #F7F6F3); }
[data-theme="dark"] .fp-member-item:hover { background: rgba(255,255,255,.05); }
.fp-member-check {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--cinza2, #ECEAE4); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s;
}
.fp-member-check.sel { background: var(--grafite, #111110); border-color: var(--grafite, #111110); }
.fp-member-check.sel::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #fff; }
.fp-member-name { font-size: 12px; font-weight: 600; color: var(--grafite, #111110); }
[data-theme="dark"] .fp-member-name { color: #F0EDE6; }
.fp-member-role { font-size: 10px; color: #999; margin-top: 1px; }
.fp-members-footer {
  padding: 10px 14px; border-top: 1px solid var(--cinza2, #ECEAE4);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
[data-theme="dark"] .fp-members-footer { border-top-color: #2E2D2B; }
.fp-members-info { font-size: 11px; color: #999; }
.fp-members-confirm {
  background: var(--grafite, #111110); color: #fff; border: none;
  border-radius: 8px; padding: 7px 14px;
  font-family: 'Raleway', sans-serif; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.fp-members-confirm:hover { opacity: .8; }

/* ══════════════════════════════════════════════════
   MEDIA VIEWER
══════════════════════════════════════════════════ */
#fp-media-viewer {
  position: fixed; inset: 0;
  background: rgba(17,17,16,.65);
  display: none; align-items: center; justify-content: center;
  z-index: 500; padding: 24px;
}
.fp-mv-card {
  width: min(900px, calc(100vw - 32px));
  max-height: calc(100vh - 48px);
  background: var(--branco, #fff); border-radius: 16px;
  box-shadow: 0 24px 64px rgba(0,0,0,.28);
  display: flex; flex-direction: column; overflow: hidden;
}
[data-theme="dark"] .fp-mv-card { background: #1E1E1D; }
.fp-mv-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; background: var(--off, #F7F6F3); flex-shrink: 0;
}
[data-theme="dark"] .fp-mv-head { background: #252523; }
.fp-mv-copy { flex: 1; min-width: 0; }
.fp-mv-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--grafite, #111110); }
[data-theme="dark"] .fp-mv-title { color: #F0EDE6; }
.fp-mv-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: #999; }
.fp-mv-tools { display: flex; align-items: center; gap: 5px; }
.fp-mv-zoombtn {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1px solid var(--cinza2, #ECEAE4); background: var(--branco, #fff);
  color: var(--grafite, #111110); font-size: 14px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
}
.fp-mv-zoombtn:hover { border-color: var(--ca); color: var(--ca); }
[data-theme="dark"] .fp-mv-zoombtn { background: #2A2927; border-color: #3A3937; color: #F0EDE6; }
.fp-mv-zoomlabel { min-width: 42px; text-align: center; font-family: 'DM Mono', monospace; font-size: 10px; color: #999; }
.fp-mv-count { min-width: 40px; text-align: center; font-family: 'DM Mono', monospace; font-size: 10px; color: #999; }
.fp-mv-close {
  width: 28px; height: 28px; border-radius: 7px; border: none;
  background: rgba(0,0,0,.07); color: var(--grafite, #111110);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .12s; padding: 0;
}
[data-theme="dark"] .fp-mv-close { background: rgba(255,255,255,.08); color: #F0EDE6; }
.fp-mv-close:hover { background: rgba(0,0,0,.14); }
.fp-mv-body {
  flex: 1; padding: 16px; background: var(--off, #F7F6F3);
  display: flex; align-items: center; justify-content: center;
  min-height: 260px; overflow: auto;
}
[data-theme="dark"] .fp-mv-body { background: #252523; }
.fp-mv-stage {
  position: relative; display: flex; align-items: center; justify-content: center;
  min-height: 360px; width: 100%;
}
.fp-mv-body img { max-width: 100%; max-height: calc(100vh - 200px); border-radius: 10px; display: block; box-shadow: 0 10px 24px rgba(0,0,0,.12); }
.fp-mv-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid rgba(17,17,16,.08); background: rgba(255,255,255,.94);
  color: var(--grafite, #111110); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700;
  box-shadow: 0 4px 16px rgba(0,0,0,.1);
}
[data-theme="dark"] .fp-mv-nav { background: rgba(42,41,39,.94); border-color: #3A3937; color: #F0EDE6; }
.fp-mv-nav:hover { border-color: var(--ca); color: var(--ca); }
.fp-mv-nav.prev { left: 8px; }
.fp-mv-nav.next { right: 8px; }
.fp-mv-nav[disabled] { opacity: .3; cursor: default; pointer-events: none; }
.fp-mv-empty { font-size: 11px; color: #999; text-align: center; padding: 30px; }

/* Resultados de busca dentro da conversa */
.fp-msg-block.search-match   { background: rgba(196,131,26,.08) !important; }
.fp-msg-block.search-current { background: rgba(196,131,26,.22) !important; outline: 2px solid rgba(196,131,26,.5); outline-offset: -2px; border-radius: 8px; }

[data-theme="dark"] .fp-msg-block.search-current { background: rgba(196,131,26,.20) !important; }

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6"  y1="20" x2="6"  y2="14"/></svg>
    </a>
    <a href="pessoas.html"    class="fp-nav-item fp-nav-soc" title="Pessoas" style="display:none">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </a>
    <a href="calendario.html" class="fp-nav-item" title="Calendário">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8"  y1="2" x2="8"  y2="6"/><line x1="3"  y1="10" x2="21" y2="10"/></svg>
    </a>

    <div class="fp-nav-spacer"></div>
    <div class="fp-nav-sep"></div>

    <!-- Chat ativo -->
    <a href="chat-fullpage.html" class="fp-nav-item active" title="Chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </a>
  </nav>

  <!-- ── Sidebar ── -->
  <aside id="fp-sidebar">
    <div class="fp-sb-head">
      <div class="fp-sb-head-row">
        <span class="fp-sb-title">EXP.chat</span>
        <!-- Status -->
        <div class="fp-sb-status" id="fp-status-btn" onclick="fpChat.toggleStatusPop()">
          <span class="fp-status-dot online" id="fp-status-dot"></span>
          <span class="fp-sb-status-label" id="fp-status-label">Online</span>
          <!-- Popover -->
          <div id="fp-status-pop">
            <div class="fp-sopt-hdr" id="fp-sopt-name"></div>
            <button class="fp-sopt" data-status="online"  onclick="fpChat.setStatus('online')"><span class="fp-sopt-dot" style="background:#2D9E6B"></span>Online</button>
            <button class="fp-sopt" data-status="foco"    onclick="fpChat.setStatus('foco')"><span class="fp-sopt-dot" style="background:#1D4FA0"></span>Foco</button>
            <button class="fp-sopt" data-status="ausente" onclick="fpChat.setStatus('ausente')"><span class="fp-sopt-dot" style="background:#C4831A"></span>Ausente</button>
          </div>
        </div>
        <!-- Som -->
        <button class="fp-sb-icon-btn" id="fp-sound-btn" onclick="fpChat.toggleSound()" title="Som">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <!-- Nova mensagem -->
        <button class="fp-sb-icon-btn" onclick="fpChat.openNewDM()" title="Nova mensagem">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>

      <!-- Busca -->
      <div class="fp-sb-search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
        <input class="fp-search-input" id="fp-search-input" type="text" placeholder="Buscar conversas…" oninput="fpChat.filterConvs(this.value)">
      </div>

      <!-- Toggles -->
      <div class="fp-sb-toggles">
        <button class="fp-toggle-btn" id="fp-toggle-unread" onclick="fpChat.toggleUnreads()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
          Não lidas
        </button>
        <button class="fp-toggle-btn" id="fp-toggle-flagged" onclick="fpChat.toggleFlagged()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
          Sinalizadas
        </button>
      </div>

      <!-- Seletor de cor de tema -->
      <div class="fp-sb-color-row">
        <span class="fp-sb-color-lbl">Cor</span>
        <div class="fp-color-dot" data-color="verde"     style="background:#1D6A4A" onclick="fpChat.setColor('verde')"     title="Verde"></div>
        <div class="fp-color-dot" data-color="azul"      style="background:#1D4FA0" onclick="fpChat.setColor('azul')"      title="Azul"></div>
        <div class="fp-color-dot" data-color="ouro"      style="background:#C4831A" onclick="fpChat.setColor('ouro')"      title="Ouro"></div>
        <div class="fp-color-dot" data-color="terracota" style="background:#B84C3A" onclick="fpChat.setColor('terracota')" title="Terracota"></div>
      </div>
    </div>

    <!-- Lista de conversas -->
    <div id="fp-conv-list">
      <div class="fp-loading" style="padding:24px">
        <div class="fp-loading-dot"></div><div class="fp-loading-dot"></div><div class="fp-loading-dot"></div>
      </div>
    </div>
  </aside>

  <!-- ── Main chat ── -->
  <main id="fp-main">
    <!-- Placeholder -->
    <div id="fp-placeholder">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="fp-placeholder-text">Selecione uma conversa</span>
    </div>

    <!-- Chat área -->
    <div id="fp-chat-area" style="display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;min-width:0;background:var(--branco,#fff)">
      <div id="fp-chat-header">
        <div class="fp-hdr-av" id="fp-hdr-av"></div>
        <div class="fp-hdr-info">
          <div class="fp-hdr-title" id="fp-hdr-title">—</div>
          <div class="fp-hdr-sub"   id="fp-hdr-sub" style="display:none"></div>
        </div>
        <!-- Botão de busca dentro da conversa -->
        <button class="fp-chat-icon-btn" onclick="fpChat.toggleInSearch()" id="fp-in-search-btn" title="Buscar nesta conversa">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>

      <!-- Barra de busca dentro da conversa -->
      <div id="fp-in-search-bar">
        <div class="fp-in-search-wrap">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--cinza,#D0CFC9);flex-shrink:0"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.65" y2="16.65"/></svg>
          <input class="fp-in-search-input" id="fp-in-search-input" type="text" placeholder="Buscar nesta conversa…" oninput="fpChat.inSearchInput(this.value)" onkeydown="fpChat.inSearchKey(event)">
          <span class="fp-in-search-count" id="fp-in-search-count"></span>
        </div>
        <button class="fp-in-search-nav" onclick="fpChat.inSearchPrev()" title="Anterior">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="fp-in-search-nav" onclick="fpChat.inSearchNext()" title="Próximo">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
        <button class="fp-in-search-close" onclick="fpChat.closeInSearch()" title="Fechar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
        </button>
      </div>
      <div id="fp-messages">
        <div class="fp-loading">
          <div class="fp-loading-dot"></div><div class="fp-loading-dot"></div><div class="fp-loading-dot"></div>
        </div>
      </div>
      <div id="fp-input-area">
        <input id="fp-media-input" type="file" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="fpChat.handleMediaInput(this)">
        <button class="fp-attach-btn" onclick="fpChat.pickMedia()" title="Anexar print">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-8.49 8.49a5.5 5.5 0 0 1-7.78-7.78l8.49-8.49a3.5 3.5 0 0 1 4.95 4.95l-8.5 8.49a1.5 1.5 0 0 1-2.12-2.12l7.78-7.78"/></svg>
        </button>
        <textarea id="fp-input" placeholder="Mensagem…" rows="1" onkeydown="fpChat.handleKey(event)" oninput="fpChat.autoResize(this)"></textarea>
        <button class="fp-send-btn" onclick="fpChat.send()" title="Enviar (Enter)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div id="fp-composer-status"></div>
    </div>
  </main>

</div><!-- /#fp-app -->

<!-- Modal novo DM -->
<div id="fp-members-panel">
  <div class="fp-members-card">
    <div class="fp-members-hdr">
      <div class="fp-members-title">Nova mensagem</div>
      <button class="fp-members-close" onclick="fpChat.closeNewDM()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="fp-members-list" id="fp-members-list">
      <div class="fp-loading" style="padding:20px"><div class="fp-loading-dot"></div><div class="fp-loading-dot"></div><div class="fp-loading-dot"></div></div>
    </div>
    <div class="fp-members-footer">
      <span class="fp-members-info" id="fp-members-info">Selecione um ou mais membros</span>
      <button class="fp-members-confirm" onclick="fpChat.confirmNewDM()">Abrir →</button>
    </div>
  </div>
</div>

<!-- Media viewer -->
<div id="fp-media-viewer">
  <div class="fp-mv-card">
    <div class="fp-mv-head">
      <div class="fp-mv-copy">
        <div class="fp-mv-title" id="fp-mv-title">Print do chat</div>
        <div class="fp-mv-meta"  id="fp-mv-meta"></div>
      </div>
      <div class="fp-mv-tools">
        <span class="fp-mv-count" id="fp-mv-count">1/1</span>
        <button class="fp-mv-zoombtn" onclick="fpChat.mvZoomOut()">−</button>
        <button class="fp-mv-zoombtn" onclick="fpChat.mvZoomReset()"><span id="fp-mv-zoom-label">100%</span></button>
        <button class="fp-mv-zoombtn" onclick="fpChat.mvZoomIn()">+</button>
      </div>
      <button class="fp-mv-close" onclick="fpChat.closeMediaViewer()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="fp-mv-body">
      <div class="fp-mv-stage">
        <button class="fp-mv-nav prev" id="fp-mv-prev" onclick="fpChat.mvPrev()">&#8249;</button>
        <img id="fp-mv-img" style="display:none" alt="Print">
        <div class="fp-mv-empty" id="fp-mv-empty">Carregando…</div>
        <button class="fp-mv-nav next" id="fp-mv-next" onclick="fpChat.mvNext()">&#8250;</button>
      </div>
    </div>
  </div>
</div>

<script src="chat-fullpage.js"></script>
<script src="timer.js"></script>

<!-- Timer: reposicionar para não cobrir a nav lateral esquerda -->
<!-- O nav ocupa ~28px (padding) + 50px (largura) + 10px (gap) = ~88px do lado esquerdo -->
<!-- Movemos o timer para a direita do nav, na base do sidebar -->
<style>
  /* Timer posicionado logo à direita da nav bar, alinhado com o sidebar */
  #exp-timer-widget {
    left: 82px !important;   /* além do nav (28px padding + 50px nav + 4px gap) */
    bottom: 18px !important;
    z-index: 9998 !important; /* abaixo de modais (400+) mas acima do layout */
  }
  /* Painel do timer abre para cima — sem conflito com o layout */
  .tmr-panel {
    bottom: 52px !important;
  }
</style>
</body>
</html>
